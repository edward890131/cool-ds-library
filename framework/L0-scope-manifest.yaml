# ─────────────────────────────────────────────────────────
# L0 Scope Manifest (schema v0)
# ─────────────────────────────────────────────────────────
# 用途：DS 要交付什麼的清單；驅動完整性檢核與測試自動化。
# 形態：YAML 結構化 spec，人讀 + 機器讀雙用途。
# 規則：本檔只記錄「要做什麼」，不記錄「怎麼做」。
#       怎麼做 → 見 L1–L3（內容）與 Production Manifest（製作規範）。
# ─────────────────────────────────────────────────────────

meta:
  project: ""                       # 套用此 DS 的專案名；若為通用範本則留空
  version: 0.1.0
  updated: 2026-05-15

  # 全站 a11y 基準（一次定義，所有 component 引用）
  a11y-baseline:
    standards: [WCAG_2_0_AA]        # 對比 4.5:1
    extra: [color-blind-simulation]

  # Canonical 詞彙來源（避免 Figma / Code / WF 各說各話）
  canonical-naming:
    states: ""                      # 指向 L3 的 canonical state taxonomy（待建）
    components: ""                  # 指向 L3 的 canonical component name list（待建）

  notes: ""


