        - "error step 用 aria-label + aria-invalid=true"
    token-policy:
      allowed: [semantic.surface.*, semantic.text.*, semantic.border.*, semantic.feedback.*, semantic.action.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
