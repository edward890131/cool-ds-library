  - id: calendar
    category: complex
    view-variants: [month, week, day, year]                  # 2026-06-16 SME harvest:改名 view-variants(更清楚是 view mode、不是視覺風格)
    variants: []
    states:   [default, loading, empty]
    sizes:    [s, m, l]
    default-expansion:
      axes: [view-variant]
      formula: "4 view modes"
      figma-display: "全展四種視圖"
    composition:
      prev-button:  { uses-component: icon-button, required: yes, icon: chevron-left, variant: ghost }
      next-button:  { uses-component: icon-button, required: yes, icon: chevron-right, variant: ghost }
      month-label:  { type: text, style: zh.h6 }
      weekday-row:  { type: text-array, style: zh.h9, count: 7 }    # 七個 weekday 標籤
      day-cell:     { uses-component: calendar-day, required: yes, count: 42 }    # 7×6 = 42 個 day cells
      today-jump:   { uses-component: button, variant: text, slot: optional }     # "今天" 快速跳轉
    a11y:
      contrast: required
      keyboard: required
      aria-role: grid
      extra:
        - "日期格子用 role=gridcell；當前選中 aria-selected=true"
        - "今日格子用 aria-current=date"
        - "前後月導航按鈕須 aria-label（例：'上個月'）"
        - "鍵盤：上下左右切日、PageUp/Down 切月、Home/End 切月首末"
    token-policy:
      allowed: [semantic.surface.calendar.*, semantic.text.calendar.*, semantic.border.calendar.*, semantic.surface.feedback.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "複雜元件 / Calendar"
        url: ""
      figma: ""
      code: ""
    notes: |
      完整月 / 週 / 日視圖的日曆元件（與 date-picker 的彈出小日曆不同；本元件是「整頁」級）。
      典型用法：行程顯示、活動排程、預約日曆。

      可選功能（feature flags）：
        - with-events: 在日期格內顯示事件條
        - clickable-cells: 點擊格子觸發事件（新增 / 檢視）
        - drag-to-create: 拖拉建立事件
        - drag-to-move: 拖拉移動事件
        - holidays-marked: 標記國定假日

  - id: calendar-day                                           # 2026-06-16 SME harvest 新增:calendar 內部 day cell sub-component
    category: complex
    variants: []
    states:   [default, hover, today, selected, range-start, range-end, in-range, disabled, other-month]
    sizes:    []                                                # 同 calendar 父
    a11y:
      contrast: required
      keyboard: optional                                        # focus 在 calendar 父層處理
      aria-role: gridcell
      extra:
        - "today 用 aria-current=date"
        - "selected 用 aria-selected=true"
        - "in-range / range-start / range-end 用 aria-describedby 指向範圍標籤"
        - "disabled 用 aria-disabled=true(灰階+不可選)"
    token-policy:
      allowed: [semantic.surface.calendar.*, semantic.text.calendar.*, semantic.border.calendar.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
