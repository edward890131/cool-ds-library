        doc: "2026-06-16 SME harvest"
        section: "calendar 內部巢狀結構、states 缺漏 today/hover/range"
        url: ""
      figma: ""
      code: ""
    default-expansion:
      axes: [state]
      formula: "9 states"
      figma-display: "全展所有 state(documentation 重點)"
    composition:
      day-number: { type: text, style: zh.h8 }                  # 日期數字
      indicator:  { uses-component: icon, slot: optional, default-style: line }   # 事件圓點 / dot 指示
    notes: |
      ⚠ 2026-06-16 SME harvest 新增:過去 calendar 元件內部 day cell 用 inline frame 自由發揮,
        導致今日(today)、hover、起迄日(range)等狀態缺漏。拆獨立 sub-component 後:
        - 狀態完整可審
        - calendar 透過 INSTANCE_SWAP 引用、改 calendar-day 樣式自動同步
      rules.md 命名前綴：calendar-day/

  - id: collapse
