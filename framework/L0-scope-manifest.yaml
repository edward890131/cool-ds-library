  - id: steps
    category: basic
    variants: [dot, numbered]                       # indicator style 宣告（runtime 可切換）
    states:   [pending, active, completed, error, disabled, focus]
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: optional                            # 視是否可點選步驟
      aria-role: ""                                 # 視 variant 而定
      extra:
        - "當前步驟用 aria-current=step"
        - "整體進度資訊以 aria-label 補充"
        - "indicator-style 切換時須維持 focus 在當前步驟、不可重置"
    token-policy:
      allowed: [semantic.surface.*, semantic.text.*, semantic.border.*, semantic.feedback.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "基本元件 / Steps (進度條)"
        url: ""
      figma: ""
      code: ""
    notes: |
      rules.md 命名前綴：steps/

      variants 軸宣告可用 indicator style：dot / numbered。
      但此元件 indicator-style 與 orientation 都支援 **runtime 切換**（非靜態 variant），
      由父層透過 prop reactively 設定，component 內部處理 transition 動畫與 ARIA focus 維持。

      支援的 prop-driven 切換情境：
        - responsive：viewport < 某斷點時 numbered → dot（自動 collapse）
        - scroll-state：sticky 後 collapse 成 dot
        - 不同流程：onboarding 用 dot、purchase 用 numbered（同產品多種共存）

      orientation (horizontal / vertical) 一律是 runtime prop、不寫入 variants 軸
      （與 menu 不同；menu orientation 為全站固定，steps 為 per-usage 決定）。

      L3 spec 階段要決定的事：
        - indicator-style 切換動畫（淡入淡出 / 形變 / 即時切換）
        - 收合策略（保留首末 + 當前、保留當前 ± N、僅顯示當前 + 總數）
        - 是否可點選步驟回跳（影響 keyboard required vs optional）

      2026-06-16 SME harvest:steps 為 container/list 概念,單一 step indicator 拆 step-item sub-component。
    default-expansion:
      axes: [variant]
      formula: "2 variants(dot / numbered)"
      figma-display: "展兩 variant、每 variant 配 3-4 個 step-item demo(覆蓋各 state)"
    composition:
      step-item: { uses-component: step-item, required: yes, count: 3 }    # 預設 3 個 steps 示範
      connector: { type: visual, slot: implicit }                          # step-item 之間的連接線

