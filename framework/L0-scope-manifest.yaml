# ─────────────────────────────────────────
# Components：L3 元件清單
# ─────────────────────────────────────────
# 新增條目請透過 AI 寫入，勿手改 YAML
# token-policy 內引用的 namespace（如 semantic.action.*）為 L2 預期命名，待 L2 階段正式定案
#
# 變體欄位兩軸（two-axis variant convention）：
#   • variants  = 結構 / 風格軸（solid / outline / text / pill / contained / line ...）
#   • intents   = 語意 / 意圖軸（primary / secondary / danger / error / success / warning / info / neutral ...）
#   兩欄位都是 flat array，可只填一個。預設兩軸 cross product 都合法；
#   不合法或團隊不做的組合寫進 notes。
#
# intents 命名規約（danger vs error）：
#   • danger = 行為導向（「這個動作會破壞」）→ 用於 button / action-menu 等動作元件
#   • error  = 狀態導向（「這個東西處於錯誤狀態」）→ 用於 status / tag / alert / feedback 等狀態元件
#
# responsive-behavior 欄位（optional，per component）：
#   元件「固有 reflow 行為」(intrinsic property)，跨頁面通用。
#   結構：responsive-behavior:
#           breakpoints:
#             desktop: <render-mode>      # 例：modal / sidebar / inline / etc
#             tablet:  <render-mode>
#             mobile:  <render-mode>
#   例：modal { breakpoints: { desktop: "modal", mobile: "route" } }
#       drawer { breakpoints: { desktop: "sidebar", mobile: "bottom-sheet" } }
#   不填 = 不隨斷點變化（簡單元件如 button / icon / tag 一般不填）。
#   FE codegen 從這欄抓 per-component reflow 規則。
#   頁面層編排規則(多元件之間如何 stack/hide/reorder)在 L4 archetype.responsive-layout。
#   兩者通常映射到同一個紅色 token，但語意不同、不互換。
#
# 待團隊統一決定（marked, awaiting team alignment）：
#   • 風格軸命名：solid vs filled — 目前暫採 solid（Tailwind UI / shadcn / Chakra 風格），
#     待團隊對齊後再決定是否改為 filled（Material Design 風格）。
#   • alert pattern（橫式緊湊 inline-compact vs 直式堆疊 stacked-vertical）— 全站
#     視覺一致性決定、非 per-instance variant。對齊後寫進 alert.notes 當 canonical。
#     目前 alert.variants 只列風格變化（solid/outline/soft），不列 pattern。
#   • notification pattern — 同 alert，但複雜度更高：error toast 通常需直式多行、
#     success toast 通常單行夠；可能採「per-intent 預設 pattern」而非全站單一 pattern。
#     對齊後寫進 notification.notes 當 canonical。
components:

  # ════════════════════════════════════════
  # 類別 1：基本元件（Build Plan 第 1 大類）
  # ════════════════════════════════════════

  - id: menu
    category: basic
    variants: [horizontal, vertical]
    states: [default, hover, active, disabled, focus]
    sizes: [s, m, l]
    a11y:
      contrast: required
      keyboard: required
      aria-role: menubar
      extra:
        - "menu item 用 role=menuitem"
        - "horizontal 用左右鍵 navigation、vertical 用上下鍵"
        - "active 表示目前所在頁面，用 aria-current=page"
    token-policy:
      allowed: [semantic.surface.*, semantic.text.*, semantic.border.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "基本元件 / Menu"
        url: ""
      figma: ""
      code: ""
    notes: |
      常駐式導航選單（navbar / sidebar）。觸發浮出的動作選單請看 action-menu。

  - id: action-menu
    category: basic
    variants: [default, with-icon, with-divider]
    states: [closed, open, hover, focused, disabled]
    sizes: [s, m, l]
    a11y:
      contrast: required
      keyboard: required
      aria-role: menu
      extra:
        - "trigger 元素須有 aria-haspopup=menu 與 aria-expanded"
        - "menu item 用 role=menuitem"
        - "上下鍵 navigation、Esc 關閉、Enter/Space 觸發"
        - "open 時 focus 移入第一項、close 時 focus 回 trigger"
    token-policy:
      allowed: [semantic.surface.*, semantic.text.*, semantic.border.*, semantic.elevation.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "基本元件 / Menu (action menu 部分)"
        url: ""
      figma: ""
      code: ""
    notes: |
      觸發浮出的動作選單（右鍵選單、按鈕觸發的下拉動作列表）。
      跟 dropdown (form combobox) 不同：dropdown 是表單選值用，action-menu 是選動作執行。
      跟 menu 不同：menu 是常駐導航。

  - id: tab
    category: basic
    variants: [line, contained, pill]
    states: [default, hover, active, focus]
    sizes: [s, m, l]
    a11y:
      contrast: required
      keyboard: required
      aria-role: tab
      extra:
        - "tab 容器用 role=tablist"
        - "對應內容區用 role=tabpanel"
        - "Active tab 用 aria-selected=true"
        - "tab 內左右鍵 navigation、Home/End 跳首尾"
    token-policy:
      allowed: [semantic.surface.*, semantic.text.*, semantic.border.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "基本元件 / Tab"
        url: ""
      figma: ""
      code: ""
    notes: |
      rules.md 命名前綴：tab/
      variants 視覺差異：
        - line: 純 underline indicator，整列底部有 divider
        - contained: 所有 tab 都有獨立容器（selected 換填色）
        - pill: 只有 selected 有 filled 藥丸容器、unselected 是裸文字
      disabled state 預設不做（多數情境直接隱藏 tab）。
      若需要（如 premium-gated / progressive unlock），由專案層補。

      2026-06-16 SME harvest:tab 為 container/list 概念,單一 tab 觸發按鈕拆為 tab-item sub-component。
      tab 的 composition 含多個 tab-item INSTANCE_SWAP。
    default-expansion:
      axes: [variant]
      formula: "3 variants(line / contained / pill)"
      figma-display: "展三 variant、每 variant 配 3 個 tab-item demo"
    composition:
      tab-item: { uses-component: tab-item, required: yes, count: 3 }    # 預設 3 個 tab 示範
      indicator-line: { type: visual, slot: optional }                    # line variant 的底部 underline
      panel: { type: container, slot: implicit }                          # tab content panel(實作層、Figma 通常不展)

  - id: tab-item                                              # 2026-06-16 SME harvest 新增:單一 tab trigger
    category: basic
    variants: [line, contained, pill]                         # 同 tab 父
    states:   [default, hover, active, disabled]              # 無 focus(同其他互動元件)
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: required
      aria-role: tab
      extra:
        - "active 用 aria-selected=true"
        - "disabled 用 aria-disabled=true"
    token-policy:
      allowed: [semantic.surface.*, semantic.text.*, semantic.border.*, semantic.action.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "2026-06-16 SME harvest"
        section: "tab 巢狀結構"
        url: ""
      figma: ""
      code: ""
    default-expansion:
      axes: [variant, state]
      formula: "3 × 4 = 12"
      figma-display: "全展(documentation 用)"
    composition:
      label: { type: text, style: zh.h8 }
      leading-icon: { uses-component: icon, slot: optional, default-style: line }
      badge: { uses-component: badge, slot: optional }    # 通知數量等
    notes: |
      ⚠ 2026-06-16 SME harvest 新增:tab 元件的單一 trigger 按鈕。
        過去 tab 元件直接展開 N 個 inline frame、改 inline state 樣式 → 拆 sub 元件後一致管理。
      rules.md 命名前綴：tab-item/

  - id: button
    category: basic
    variants: [solid, outline, text]                           # 2026-06-16 SME harvest:固定 3 個風格軸(業界主流)
    intents:  [primary, secondary, danger]                     # 2026-06-16 SME harvest:縮窄為業界標準 3 個(success/warning/info 為 feedback 元件專屬,button 不需要)
    states:   [default, hover, pressed, disabled]              # 2026-06-16 SME harvest:拿掉 focus(a11y ring 由 code 處理、不入 variant 矩陣)
    sizes:    [s, m, l]                                        # 業界主流 3 size、cover hero CTA / 標準 / 表格內三情境
    default-expansion:
      axes: [variant, intent, size, state]                     # button 為 DS documentation 重點元件、全展
      formula: "3 × 3 × 3 × 4 = 108 variants"
      figma-display: "全展、設計師需在 Figma 看完整矩陣"
      layout: table                                            # 2026-06-17 v0.7.1:多軸元件用表格排版(row=state,col=variant×intent)
    boolean-properties:                                        # 2026-06-17 v0.7.1 新增:內容差異走 boolean
      show-leading-icon: { default: false, replaces: "icon-button leading slot" }
      show-trailing-icon: { default: false, replaces: "icon-button trailing slot" }
      show-label: { default: true, off-mode: "icon-only(replaces icon-button)" }
    composition:
      label: { type: text, style: zh.h8, controlled-by-boolean: show-label }
      leading-icon: { uses-component: icon, controlled-by-boolean: show-leading-icon, default-style: line }
      trailing-icon: { uses-component: icon, controlled-by-boolean: show-trailing-icon, default-style: line }
    merge-replaces: [icon-button]                              # 2026-06-17 v0.7.1:button 用 show-label=false 取代 icon-button、設計師選擇
    a11y:
      contrast: required
      keyboard: required
      aria-role: button
      extra:
        - "loading 狀態應 aria-busy=true 並 disabled"
    token-policy:
      allowed: [semantic.action.*, semantic.text.action.*, semantic.border.action.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "基本元件 / Button"
        url: ""
      figma: ""
      code: ""
    notes: |
      Build Plan: Button size, Style (主要、次要), Status。
      rules.md 命名前綴：btn/
      Phase B 的 vertical slice dogfood 對象。

      變體兩軸（variants × intents）慣用對應（設計指引，非 schema 強制）：
        - solid   通常配 primary（最高層級的 CTA）
        - outline 通常配 secondary（次層級動作）
        - text    低於 secondary（最弱、行內動作）
        - danger / success / warning / info 跨 3 個 style 都可用（套色變調）

      風格軸命名待團隊統一：目前採 solid，待對齊後決定是否改 filled。

  - id: icon-button                                            # 2026-06-16 SME harvest 新增、2026-06-17 v0.7.1 標 deprecated-merge
    category: basic
    status: deprecated-merge                                   # 2026-06-17 v0.7.1:併入 button(show-label=false 即可)
    deprecation-note: "v0.7.1:用 button 的 show-label=false 取代;此元件保留 schema 但不再建獨立 master"
    variants: [solid, outline, ghost]                          # ghost = 無底色透明、最弱
    intents:  [primary, secondary, danger]
    states:   [default, hover, pressed, disabled]              # 無 focus(同 button、a11y ring 由 code 處理)
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: required
      aria-role: button
      extra:
        - "icon-only button 必有 aria-label(描述動作、不是 icon 名)"
        - "tooltip 推薦(同 aria-label 文字)"
    token-policy:
      allowed: [semantic.action.*, semantic.icon.*, semantic.surface.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "2026-06-16 SME harvest"
        section: "alert dismiss / notification close / modal close / header user 等"
        url: ""
      figma: ""
      code: ""
    default-expansion:
      axes: [variant, intent, size, state]
      formula: "3 × 3 × 3 × 4 = 108"
      figma-display: "全展、與 button 一致"
    composition:
      icon: { uses-component: icon, required: yes, default-style: line }
    notes: |
      ⚠ 2026-06-16 SME harvest 新增:用於 dismiss / close / user / 純圖示行為按鈕等場景。
        過去用 button 帶 icon-only mode 模擬,但 button 有 label slot、icon-only 不該套同元件。
        拆獨立元件後語意更清楚:button 必有文字、icon-button 必只有 icon。
      rules.md 命名前綴：icon-btn/

  - id: breadcrumb
    category: basic
    variants: []
    states: [default, hover, current]
    sizes: []
    a11y:
      contrast: required
      keyboard: required
      aria-role: navigation
      extra:
        - "用 aria-label='breadcrumb' 標明 nav 區塊"
        - "當前頁面項目用 aria-current=page"
    token-policy:
      allowed: [semantic.text.*, semantic.surface.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "基本元件 / Breadcrumb"
        url: ""
      figma: ""
      code: ""
    notes: "rules.md 命名前綴：breadcrumbs/"

  - id: input
    category: basic
    variants: [outline, filled]                                                       # 2026-06-17 v0.7.1:回歸純視覺軸、內容差異改 boolean
    states:   [default, hover, focus, filled-value, disabled, error, success]         # 2026-06-17 v0.7.1:拿掉 masked(移至 password-input 的 Reveal 軸)
    sizes:    []                                                                       # 2026-06-16 SME harvest:input 家族單一字級
    boolean-properties:                                                                # 2026-06-17 v0.7.1 新增:內容差異走 boolean、不入 variant 矩陣
      with-label:         { default: false }
      with-hint:          { default: false }                                          # hint text 下方提示
      with-leading-icon:  { default: false }
      with-trailing-icon: { default: false }
    a11y:
      contrast: required
      keyboard: required
      aria-role: textbox
      extra:
        - "必須有可關聯的 label"
        - "錯誤訊息用 aria-describedby 串接"
        - "error 狀態用 aria-invalid=true"
    token-policy:
      allowed: [semantic.surface.input.*, semantic.text.input.*, semantic.border.input.*]
      forbidden: [primitive.*]
    archetypes-used-in: [auth-flow, form-page, detail-page]
    notes-2026-05-22: |
      with-label / with-label-hint variants (Path B Auth trial 補):
        - with-label: 上方 label text + input field
