  - id: tag
    category: basic
    variants: [solid, outline, soft]                                # 結構 / 風格
    intents:  [brand, neutral]                                      # 2026-06-16 SME harvest:縮窄為業界主流(feedback 4 色由 alert/notification 元件負責、不在 tag/badge 重複)
    states:   [default, hover, selected, disabled]                  # 拿掉 focus(同 button、a11y ring 由 code 處理)
    sizes:    []                                                    # tag 業界通常不展 size 軸(尺寸由父容器決定)
    default-expansion:
      axes: [variant, intent]
      formula: "3 × 2 = 6 variants"
      figma-display: "視覺軸全展、states 留 code"
    composition:
      label:        { type: text, style: zh.h9 }
      leading-icon: { uses-component: icon, slot: optional, default-style: line }
      avatar-slot:  { type: image, slot: optional }                 # avatar feature
      close-button: { uses-component: icon-button, slot: optional } # removable feature
    a11y:
      contrast: required
      keyboard: required                            # removable / selectable feature 開啟時需可鍵盤操作
      aria-role: ""                                 # 視 features：純展示→listitem、removable/selectable→button
      extra:
        - "removable feature 開啟時內含可聚焦的 close button、有 aria-label"
        - "selectable feature 開啟時用 aria-pressed 表示選取狀態"
    token-policy:
      allowed: [semantic.surface.tag.*, semantic.text.tag.*, semantic.border.tag.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "基本元件 / Tag & Chips"
        url: ""
      figma: ""
      code: ""
    notes: |
      Build Plan「Tag & Chips」合併為 tag。Chips 的互動以 feature flag 表達（避免 component 分叉）。
      rules.md 命名前綴：tag/

      可選功能（feature flags，可獨立開關、可並用）：
        - removable: 含 × 可移除（chip 互動，典型：已選 filter chips、email 收件人）
        - selectable: 可點擊切換選取（典型：filter chip 多選分類）
        - with-icon: 文字前可加 icon（typical 用法：狀態 icon、類別 icon）
        - with-avatar: 文字前可加 avatar（典型：人員標籤、組織標籤）

  - id: status
    category: basic
    variants: [dot, badge, text]                              # 結構 / 視覺呈現
    intents:  [success, warning, error, info, neutral]        # 語意
    states:   [default]                                       # 純展示、無互動狀態
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: n/a                                           # 純展示，不互動
      aria-role: status
      extra:
        - "若狀態變動需通知 screen reader，外層用 aria-live=polite"
        - "純色塊呈現（dot）必須配文字 label，避免色盲不可辨"
        - "badge 中的數字若代表「未讀」「待處理」等，須在外層用 aria-label 補充語境"
    token-policy:
      allowed: [semantic.feedback.*, semantic.surface.feedback.*, semantic.text.feedback.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "基本元件 / Status"
        url: ""
      figma: ""
      code: ""
    notes: |
      Build Plan 將 Status 列為獨立元件（非 Button 的屬性），代表狀態指示元素。
      variants 區分視覺型態（dot / badge / text），intents 區分語意（success / warning / error / info / neutral）。
      兩軸正交：例如 dot + warning、badge + info、text + error 都合法。

      typical 用法：
        - dot: 系統狀態指示燈（線上 / 離線 / 忙碌）
        - badge: 數字徽章（未讀 12、NEW、Beta）或短文字標籤
        - text: 表格 / 列表內的純文字狀態（「啟用中」/「停用」/「已過期」）


  # ════════════════════════════════════════
  # 類別 2：站內回饋（Build Plan 第 2 大類）
  # 邊界釐清:
  #   - alert        = 頁面內固定位置的訊息（inline / banner），手動 dismiss 或常駐
  #   - tooltip      = 浮在元素旁的小提示，純文字，hover/focus 觸發、移開即消失
  #   - notification = 自動浮現的暫現訊息（toast），有 timer 自動消失（有些 DS 叫 Toast / Snackbar）
  # ════════════════════════════════════════

  - id: alert
    category: feedback
    layout-variants: [banner, stacked, compact]               # 2026-06-16:banner=横式、stacked=直式、compact=一行
    variants: [inline-card]                                   # 2026-06-17 v0.8:重做、白底 + intent icon + brand CTA(像 modal inline 版),舊 soft/outline/solid 拿掉
    default-variant: inline-card
    intents:  [success, warning, error, info]                 # 表達方式改:只在 icon + accent line 體現、不再整片底色染
    states:   [default]                                       # 純展示;close/cta 由 composition 內 sub-component 處理
    sizes:    []                                              # 寬度由父容器決定
    a11y:
      contrast: required
      keyboard: required                                       # dismissible / with-action 開啟時
      aria-role: alert                                         # error/warning 用 alert (assertive)；info/success 用 status (polite)
      extra:
        - "intent 為 error / warning 時用 role=alert（aria-live=assertive，立即讀出）"
        - "intent 為 success / info 時用 role=status（aria-live=polite，等空檔讀出）"
        - "dismissible 開啟時 close button 必須可鍵盤觸發、有 aria-label"
        - "with-icon 的 icon 須 aria-hidden=true（icon 是裝飾、語意已在文字）"
    token-policy:
      allowed: [semantic.surface.feedback.*, semantic.text.feedback.*, semantic.border.feedback.*, semantic.action.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "站內回饋 / Alert"
        url: ""
      figma: ""
      code: ""
    default-expansion:
      axes: [layout-variant, intent]                          # 2026-06-17 v0.8:variant 軸縮到 1 個、不入展度
      formula: "3 × 4 = 12 variants"                          # 從 36 降到 12
      figma-display: "全展 layout × intent"
    composition:
      surface:     { type: visual, color: surface.primary }   # 2026-06-17 v0.8:白底(neutral)、不染 intent
      icon:        { uses-component: icon, required: yes, intent-derived: yes, default-style: line, color: feedback.<intent> }   # icon 顏色 = intent 唯一表達
      accent-line: { type: visual, slot: optional, intent-derived: yes }   # 細條 accent(左 / 頂部、intent 色)
      title:       { type: text, style: zh.h6, color: text.default, slot: optional }   # 中性深色、不染 intent
      body:        { type: text, style: zh.h8, color: text.default }                   # 中性深色
      cta:         { uses-component: button, slot: optional, default-intent: primary } # 2026-06-17 v0.8:brand primary、不繼承 alert intent(解 J1 配色問題)
      dismiss:     { uses-component: icon-button, slot: optional, intent: secondary }  # 中性 close、不染 intent
    notes: |
      頁面內固定位置的訊息，不會自動消失。
      典型用法：表單錯誤摘要、頁面警示橫幅、操作前置條件提示。

      2026-06-16 SME harvest 重新定義:
        - layout-variants 拆出三種獨立結構(banner / stacked / compact)
        - intent 拿掉 neutral(info 已涵蓋中性訊息、業界主流)
        - 結構由 composition 明訂(不再 marked TBD)、CC build 時嚴格 INSTANCE_SWAP nested 元件


      可選功能（feature flags）：
        - dismissible: 含 × 可手動關閉
        - with-icon: 文字前加 intent 對應的 icon
        - with-title: 上方有粗體標題、下方說明文字（兩段式佈局）
        - with-action: 含內嵌動作按鈕（例：「重試」「了解更多」）

      L3 待決:
        - dismissible 後是否記住關閉狀態（local storage / session）
        - with-action 按鈕的 button variant 對應規則

  - id: tooltip
    category: feedback
    variants: [solid]                                          # 預設深底白字；如未來要 light variant 再加 outline
    states:   [default]                                        # 純展示，不互動
    sizes:    [s, m]                                           # 通常只兩種大小
    a11y:
      contrast: required
      keyboard: required                                       # focus 也要能觸發顯示，不只 hover
      aria-role: tooltip
      extra:
        - "trigger 元素須 aria-describedby 指向 tooltip id"
        - "hover 與 focus 都要能觸發（鍵盤可用）"
        - "顯示後 Esc 須可關閉（特別是 click-trigger 模式）"
        - "tooltip 內不可放互動元素（要互動請改用 popover）"
    token-policy:
      allowed: [semantic.surface.tooltip.*, semantic.text.tooltip.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "站內回饋 / Tooltips"
        url: ""
      figma: ""
      code: ""
    notes: |
      浮在元素旁的小提示，純文字、不可互動。
      與 popover 的邊界：popover 可放互動內容（按鈕、表單），tooltip 只放純文字資訊。

      可選功能（feature flags）：
        - with-arrow: 指向 trigger 的三角箭頭
        - placement-auto: 自動依視窗邊界調整位置（避免溢出）

      L3 待決:
        - 預設觸發方式（hover / focus / click 三選或多選）
        - 預設 placement（top / bottom / 自動）
        - 顯示延遲時間（避免滑鼠經過誤觸）

  - id: notification
    category: feedback
    position-variants: [toast-top-right, toast-bottom-right, snackbar-bottom-center]   # 2026-06-16 SME harvest:重新以 position 區分(toast 在角、snackbar 在底中)
    variants: [solid, outline, soft]                          # 視覺風格
    intents:  [success, warning, error, info]                 # 2026-06-16:拿掉 neutral(info 涵蓋中性、跟 alert 一致)
    states:   [default]                                       # 純展示;close 由 composition 內 sub-component 處理
    sizes:    []                                              # toast 寬度固定 by position-variant、無 size 軸
    a11y:
      contrast: required
      keyboard: required
      aria-role: status                                       # 多數情境；error 可改 alert
      extra:
        - "intent 為 error 時用 role=alert（aria-live=assertive）"
        - "其他 intent 用 role=status（aria-live=polite）"
        - "auto-dismiss timer 在 hover / focus 時必須暫停（WCAG 2.2.1）"
        - "close button 必須可鍵盤觸發"
        - "新 notification 出現時不可搶走當前 focus"
    token-policy:
      allowed: [semantic.surface.feedback.*, semantic.text.feedback.*, semantic.border.feedback.*, semantic.elevation.*, semantic.action.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "站內回饋 / Notification"
        url: ""
      figma: ""
      code: ""
    default-expansion:
      axes: [position-variant, variant, intent]
      formula: "3 × 3 × 4 = 36 variants"
      figma-display: "全展三軸"
    composition:
      icon:  { uses-component: icon,        required: yes, intent-derived: yes, default-style: line }
      body:  { type: text,                  style: zh.h8 }                # 必有(1-2 行短訊息)
      close: { uses-component: icon-button, slot: optional }              # 純展示 close、不必有 CTA
      progress-bar: { type: visual,         slot: optional }              # with-progress feature
    auto-dismiss-ms: 4000                                                  # 預設 4 秒(error 可在 project delta override 為 8000 或 no-dismiss)
    notes: |
      自動浮現的暫現訊息（業界別名：toast / snackbar）。預設有 timer 自動消失。
      典型用法：儲存成功確認、背景任務完成、輕量錯誤提示。

      邊界：本元件僅指 toast / snackbar（暫現訊息），**不含通知中心 (notification-center)**。
      通知中心是 composite component（bell icon + badge + dropdown panel + 訊息列表 + 已讀狀態），
      屬類別 4「複雜元件」，且非每個專案都做、由專案層按需新增、不在 cross-project starter。

      2026-06-16 SME harvest 重新定義:
        - position-variants 拆出三種位置(toast 在右上/右下、snackbar 在底中)、不再 marked TBD
        - intent 拿掉 neutral(跟 alert 一致)
        - 結構刻意比 alert 簡:notification 是暫態、不該有 CTA + title(用戶來不及讀完就消失)
        - 改設計師可在 project delta override auto-dismiss-ms

      可選功能（feature flags）：
        - dismissible: 含 × 可提前關閉(本元件預設 yes)
        - auto-dismiss: timer 自動消失（預設 4000ms,error 可 override）
        - with-icon: 文字前加 intent 對應的 icon(本元件 composition 預設 required)
        - with-progress: 顯示倒數進度條（剩餘時間視覺化、optional）

      L3 待決:
        - 同時多個 notification 的堆疊規則（stack vs queue vs replace）
        - 出場 / 進場動畫


  # ════════════════════════════════════════
  # 類別 3：表格規範（Build Plan 第 3 大類）
  # Composite 結構：table 是 composite component、本類別列出所有 sub-element。
  # 行為（sort/filter/select/sticky/resize 等）以 feature flags 表達於 table.notes。
  # 空值 / loading / error 為 table 內建 state（不外掛 alert/skeleton/empty 元件）。
  # ════════════════════════════════════════

  - id: table
    category: table
    variants: [bordered, borderless, striped]              # 邊框 / 條紋風格
    states:   [default, loading, empty, error]             # error/loading/empty 內建、不外掛
    sizes:    [s, m, l]                                    # 對應 density: compact / comfortable / spacious
    a11y:
      contrast: required
      keyboard: required
      aria-role: table
      extra:
        - "外層用 <table> 或 role=table；表頭區 thead / role=rowgroup；資料區 tbody"
        - "loading 狀態整個 table 用 aria-busy=true"
        - "empty / error 狀態的訊息區用 role=status 或 alert（視嚴重程度）"
        - "可排序 column 的 header 須 aria-sort=ascending|descending|none"
        - "可選列的 row 須 aria-selected=true|false"
        - "sticky header / column 不影響 a11y，但 focus 順序須維持邏輯"
    token-policy:
      allowed: [semantic.surface.table.*, semantic.text.table.*, semantic.border.table.*, semantic.surface.feedback.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "表格規範"
        url: ""
      figma: ""
      code: ""
    notes: |
      Composite component — 由 table-header / table-row / table-cell / table-footer 組成。
      Build Plan「表格規範」對應 L0 此族群。

      可選功能（feature flags，依專案需求啟用）：
        互動類：
          - sortable: column-level 排序（單欄或多欄）
          - filterable: column-level 篩選 UI（內嵌 header）
          - searchable: 全域搜尋（通常在 table 上方獨立 input）
          - row-selection: checkbox 列選取（single / multi 兩種模式）
          - expandable-rows: 列可展開顯示子內容（巢狀資料 / 詳情）
          - column-resize: 拖拉欄寬
          - column-reorder: 拖拉重排欄位順序
        版面類：
          - sticky-header: header 滾動黏附
          - sticky-first-column: 第一欄滾動黏附（橫向捲動時保留識別欄）
          - sticky-footer: footer 滾動黏附
          - pagination: 內建分頁整合（與獨立 pagination 元件對接）
          - virtual-scroll: 大量資料虛擬捲動

      內建 state 規範（不外掛 alert/skeleton/empty 元件）：
        - loading: 預設 skeleton rows（n 列；rows 數可配置）
        - empty:   置中 icon + 文字 + 可選 CTA（「新增第一筆資料」）
        - error:   置中 error icon + 訊息 + retry button（接 button 元件）

      L3 待決:
        - row-selection 的 single / multi 是 boolean 還是兩個獨立 feature flag
        - sortable 是否支援多欄同時排序（multi-sort）
        - virtual-scroll 觸發閾值（多少 row 以上自動啟用 / 永遠啟用 / 永不啟用）
        - skeleton loading 的 row 數預設值
        - empty / error 內建文案是否走 i18n 系統（多語）

  - id: table-header
    category: table
    variants: [default]                                    # 暫無視覺 variant；如未來需 sticky-only / standard 區分可加
    states:   [default, hover, sort-asc, sort-desc, resizing]
    sizes:    [s, m, l]                                    # 通常繼承自 parent table
    a11y:
      contrast: required
      keyboard: required
      aria-role: columnheader
      extra:
        - "可排序時須 aria-sort、且整個 header 可鍵盤觸發排序切換"
        - "可 resize 時 resize handle 須有 aria-label、支援鍵盤左右鍵調寬"
        - "排序 indicator (▲▼) 須 aria-hidden=true（語意已由 aria-sort 提供）"
    token-policy:
      allowed: [semantic.surface.table.*, semantic.text.table.*, semantic.border.table.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "表格規範 / 表頭"
        url: ""
      figma: ""
      code: ""
    notes: |
      欄位 header cell。包含 sort indicator、resize handle、optional filter trigger。
      sticky-header feature 啟用時，本元件套用 sticky positioning 與 elevation token。

      可選功能（feature flags，由 parent table.features 決定是否啟用）：
        - with-sort-indicator: 顯示 ▲▼ 排序指示
        - with-resize-handle: 右側拖拉調寬把手
        - with-filter-trigger: 內嵌 filter 觸發 icon（展開 filter popover）

  - id: table-row
    category: table
    variants: [default]
    intents:  [success, warning, error, info, neutral]    # row-level 強調語意（例：錯誤資料列、新增提示列）
    states:   [default, hover, selected, expanded, disabled]
    sizes:    [s, m, l]                                    # 通常繼承自 parent table
    a11y:
      contrast: required
      keyboard: optional                                   # 可選列 / 可展開列才需 keyboard
      aria-role: row
      extra:
        - "可選列須 aria-selected；row checkbox 用 aria-label 描述列識別"
        - "可展開列須 aria-expanded；展開內容用 aria-controls 關聯"
        - "intent 套色須配文字 / icon，避免色盲不可辨"
    token-policy:
      allowed: [semantic.surface.table.*, semantic.text.table.*, semantic.border.table.*, semantic.surface.feedback.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "表格規範 / 資料列"
        url: ""
      figma: ""
      code: ""
    notes: |
      資料列。可選 (selected) / 可展開 (expanded) / 強調 (intent) 等狀態。
      hover state 預設啟用以協助列追蹤（striped table 例外可考慮關閉）。

      可選功能（feature flags，由 parent table.features 決定）：
        - with-checkbox: 開啟 row-selection 時，列首加 checkbox
        - with-expand-toggle: 開啟 expandable-rows 時，列首加 ▶ 展開鈕
        - with-actions: 列尾固定動作區（編輯 / 刪除 / 更多）

  - id: table-cell
    category: table
    variants: [text-left, text-center, text-right, numeric]    # alignment + numeric（右對齊 + tabular-nums）
    states:   [default, hover, editing]                        # editing 給內嵌編輯使用
    sizes:    [s, m, l]                                        # 通常繼承自 parent table
    a11y:
      contrast: required
      keyboard: optional                                       # editing feature 開啟時 required
      aria-role: cell
      extra:
        - "editing 狀態須包合法的 input / textarea 元件，繼承其 a11y 規則"
        - "numeric cell 用 tabular-nums 確保數字位數對齊"
        - "truncated 文字須提供完整內容（tooltip 或 aria-label）"
    token-policy:
      allowed: [semantic.surface.table.*, semantic.text.table.*, semantic.border.table.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "表格規範 / 儲存格"
        url: ""
      figma: ""
      code: ""
