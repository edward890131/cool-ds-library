    refs:
      source-doc:
        doc: "2026-06-16 SME harvest"
        section: "steps 巢狀結構"
        url: ""
      figma: ""
      code: ""
    default-expansion:
      axes: [variant, state]
      formula: "2 × 5 = 10"
      figma-display: "全展(documentation 用)"
    composition:
