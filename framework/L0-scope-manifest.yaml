      資料儲存格。variants 為內容對齊軸（text-left / center / right / numeric）。
      numeric variant 預設右對齊 + tabular-nums font-feature。

      可選功能（feature flags）：
        - with-icon: cell 內含 leading icon（例：狀態圖示）
        - truncate: 超出寬度時 ellipsis（配合 tooltip 顯示完整內容）
        - editable: 點擊進入內嵌編輯（套用 input / dropdown 元件）

  - id: table-footer
    category: table
    variants: [default, totals, pagination]               # 用途軸：純樣式 / 含合計 / 含分頁
    states:   [default]
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: required                                  # pagination variant 時 required
      aria-role: rowgroup                                 # 或 row 視內容
      extra:
        - "pagination variant 須包含合法 pagination 元件（繼承其 a11y）"
        - "totals variant 的合計列須 aria-label 標明（例：'合計列'）"
    token-policy:
      allowed: [semantic.surface.table.*, semantic.text.table.*, semantic.border.table.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "表格規範 / 表尾"
        url: ""
      figma: ""
      code: ""
    notes: |
      表格底部區域。三種 variant：
        - default: 純底邊樣式（無內容）
        - totals: 合計列（資料統計 / 加總顯示）
        - pagination: 整合 pagination 元件（呼應 table.features.pagination）

      sticky-footer feature 啟用時套用 sticky positioning。


