    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: required
      aria-role: button                                      # trigger 端；展開的內容 region 用 role=region
      extra:
        - "trigger 用 button role + aria-expanded + aria-controls 指向 region"
        - "展開內容用 role=region + aria-labelledby 指回 trigger"
        - "支援 Enter / Space 切換、上下鍵切換不同 collapse 項"
        - "動畫切換期間不影響 focus 與閱讀順序"
    token-policy:
      allowed: [semantic.surface.*, semantic.text.*, semantic.border.*, semantic.action.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "複雜元件 / Collapse"
        url: ""
      figma: ""
      code: ""
    notes: |
      可展開 / 收合的內容區塊（業界別名：accordion）。
      variants 視覺結構：
        - bordered: 整組外框 + 內部 divider
        - separated: 每項獨立卡片、項目間有 gap
        - connected: 項目連在一起、無 gap 無外框

      可選功能（feature flags）：
        - single-open: 同時只能展開一個（accordion 模式）
        - multi-open: 可同時展開多個（default）
        - with-icon: trigger 含展開 indicator (▼)
        - controlled / uncontrolled: 展開狀態由外部控制 vs 內部管理

  - id: list
    category: complex
    variants: [divided, borderless, card]                   # 視覺結構
    states:   [default, hover, selected, disabled, focus]
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: optional                                    # 可互動 list (selectable / clickable) 時 required
      aria-role: list
      extra:
        - "item 用 role=listitem；可選 list 用 role=listbox + option"
        - "可選列須 aria-selected；可展開列須 aria-expanded"
        - "with-checkbox feature 開啟時走 role=listbox + aria-multiselectable"
    token-policy:
      allowed: [semantic.surface.*, semantic.text.*, semantic.border.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "複雜元件 / List"
        url: ""
      figma: ""
      code: ""
    notes: |
      垂直列表（不限資料形態，可放純文字、含 icon、含 avatar、含動作等）。
      與 table 區隔：list 為單欄、無欄位概念；table 為多欄結構化資料。

      可選功能（feature flags）：
        - with-icon: item 含 leading icon
        - with-avatar: item 含 leading avatar
        - with-action: item 尾部含動作（按鈕 / icon-button）
        - with-checkbox: item 含 checkbox 多選
        - selectable: item 可點擊切換選取（single / multi）
        - clickable: item 整列可點擊觸發動作（連結列表）
        - nested: 支援巢狀子項目
        - draggable: 支援拖拉重排

  - id: card
    category: complex
    variants: [elevated, outlined, flat]                    # 視覺結構
    states:   [default, hover, pressed, selected, disabled, focus]
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: optional                                    # clickable card 時 required
      aria-role: ""                                         # 預設無 role；clickable 時用 button / link
      extra:
        - "clickable card 整體須鍵盤觸發、含 focus ring"
        - "with-actions feature 的按鈕區須獨立可 tab、不被外層 click 蓋掉"
        - "with-cover-image 的 image 須有 alt（或 aria-hidden=true 若純裝飾）"
    token-policy:
      allowed: [semantic.surface.card.*, semantic.text.*, semantic.border.*, semantic.elevation.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "複雜元件 / Card"
        url: ""
      figma: ""
      code: ""
    notes: |
      內容容器。三種 variant 視覺強度遞減：elevated（陰影）> outlined（邊框）> flat（純底色）。

      可選功能（feature flags）：
        - with-header: 上方標題區
        - with-footer: 下方資訊 / 動作區
        - with-cover-image: 頂部封面圖
        - with-actions: 含動作按鈕（編輯 / 刪除 / 更多）
        - clickable: 整張卡片可點擊
        - with-media-aspect-ratio: 封面圖固定比例（呼應 image 元件）

  - id: modal
    category: complex
    variants: [centered, sheet]                             # centered: 置中對話框；sheet: 底部彈出（mobile）
    sizes:    [s, m, l, full]                               # full = 全螢幕
    states:   [closed, opening, open, closing]
    responsive-behavior:
      breakpoints:
        desktop: modal                                      # 桌機:置中對話框
        tablet:  modal
        mobile:  route                                      # 手機:轉成獨立路由頁(FE 參考 ExtraOtpModal 案例)
    a11y:
      contrast: required
      keyboard: required
      aria-role: dialog
      extra:
        - "用 aria-modal=true + aria-labelledby 指向 title"
        - "開啟時 focus 移入 modal（通常第一個可 focus 元素）、focus trap 在內"
        - "關閉時 focus 回到觸發元素"
        - "Esc 須關閉（除非明確設定不可）"
        - "背景頁面用 aria-hidden=true 避免 screen reader 讀到"
        - "overlay click 是否關閉視 dismissible feature 決定"
    token-policy:
      allowed: [semantic.surface.*, semantic.text.*, semantic.border.*, semantic.elevation.*, semantic.surface.overlay.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "複雜元件 / Modal/Drawer（Modal 部分）"
        url: ""
      figma: ""
      code: ""
    notes: |
      置中浮層對話框，阻斷頁面互動。Build Plan「Modal/Drawer」拆獨立元件。

      可選功能（feature flags）：
        - dismissible: 含 × 可關閉（default-on）
        - with-overlay: 背景遮罩（default-on）
        - overlay-click-close: 點背景關閉（default-on，destructive 操作建議 off）
        - with-header / with-footer: 上下固定區（中間 scrollable）
        - with-actions: 底部 CTA 按鈕區（通常 1-2 個按鈕）
        - focus-trap: 鍵盤 focus 限制在 modal 內（default-on）

      L3 待決:
        - sheet variant 預設在哪些斷點下啟用（mobile-only?）
        - 多層 modal 疊加策略（不允許 / z-index 累進 / replace）
        - 動畫進場 / 出場樣式

  - id: drawer
    category: complex
    variants: [left, right, top, bottom]                    # 滑入方向
    sizes:    [s, m, l, full]
    states:   [closed, opening, open, closing]
    responsive-behavior:
      breakpoints:
        desktop: sidebar                                    # 桌機:側邊滑入 panel
        tablet:  sidebar                                    # 平板:同桌機
        mobile:  bottom-sheet                               # 手機:轉成底部彈起 sheet
    a11y:
      contrast: required
      keyboard: required
      aria-role: dialog
      extra:
        - "同 modal：aria-modal / aria-labelledby / focus trap / Esc 關閉"
        - "通常用於非阻斷性 panel（如側邊設定、購物車），但 a11y 視同 modal 處理"
        - "若為非阻斷性 drawer（permanent variant），可不用 modal 規則"
    token-policy:
      allowed: [semantic.surface.*, semantic.text.*, semantic.border.*, semantic.elevation.*, semantic.surface.overlay.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "複雜元件 / Modal/Drawer（Drawer 部分）"
        url: ""
      figma: ""
      code: ""
    notes: |
      側邊滑入 panel。variants 為滑入方向。

      可選功能（feature flags）：
        - dismissible / with-overlay / overlay-click-close: 同 modal
        - with-header / with-footer / with-actions: 同 modal
        - permanent: 不可關閉、整合在 layout 中（如左側 nav drawer）
        - swipe-to-close: mobile 拖拉手勢關閉

      L3 待決:
        - 預設寬度（依方向不同：left/right 用寬度、top/bottom 用高度）
        - permanent variant 與 layout 的整合方式
        - 動畫滑入速度與 easing


  # ════════════════════════════════════════
  # 類別 5：統計數據、圖表（Build Plan 第 5 大類）
  # Build Plan 原列 4 項：Number / 環形圖 / 長條圖 / 折線圖
  # 圖表本體通常依賴第三方 library（D3 / Recharts / Chart.js / ECharts）；
  # DS 規範範圍：color palette / typography / tooltip / legend / axis 樣式。
  # ════════════════════════════════════════

  - id: stat-number
    category: chart
    variants: [default, with-trend, with-comparison]
    intents:  [success, warning, error, info, neutral]
    states:   [default, loading, empty]
    sizes:    [s, m, l, xl]                                 # 加 xl（dashboard KPI 用大字）
    a11y:
      contrast: required
      keyboard: n/a
      aria-role: ""
      extra:
        - "數字本身用 tabular-nums 字體特徵確保位數對齊"
        - "趨勢箭頭須配文字 / aria-label（如「上升 12%」）"
        - "顏色語意須配 icon / 文字（色盲）"
    token-policy:
      allowed: [semantic.text.*, semantic.surface.chart.*, semantic.feedback.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "統計數據、圖表 / Number"
        url: ""
      figma: ""
      code: ""
    notes: |
      KPI / 統計數據呈現元件（dashboard 用）。Build Plan「Number」對應此元件。

      可選功能（feature flags）：
        - with-label: 上方有標籤（例：「本月營收」）
        - with-sub-text: 下方有補充說明
        - with-prefix / with-suffix: 前後綴（$ / %）
        - with-icon: 標籤旁含 icon

  - id: donut-chart
    category: chart
    variants: [donut, pie]                                  # 中空 vs 實心
    states:   [default, loading, empty, error]
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: optional
      aria-role: img                                        # 視為 image，配 aria-label 描述資料
      extra:
        - "整體用 role=img + aria-label 描述（如「2026 第一季營收分布圖」）"
        - "詳細資料須提供文字替代（screen reader 友善 table 版本）"
        - "色盲考量：不只靠顏色區分，配合 pattern / label"
    token-policy:
      allowed: [semantic.surface.chart.*, semantic.text.chart.*, semantic.color.chart-palette.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "統計數據、圖表 / 環形圖"
        url: ""
      figma: ""
      code: ""
    notes: |
      環形圖 / 圓餅圖。實作通常依賴 charting library（Recharts / Chart.js / ECharts）。
      DS 規範範圍：色票對應、tooltip 樣式、legend 樣式、字體。

      可選功能（feature flags）：
        - with-legend: 旁邊 / 下方 legend
        - with-labels: 扇形內 / 外標籤
        - with-percentage: 顯示百分比
        - with-tooltip: hover 顯示詳細數值
        - interactive: hover highlight + 點擊事件

  - id: bar-chart
    category: chart
    variants: [vertical, horizontal, stacked, grouped]      # 排向 + 結構
    states:   [default, loading, empty, error]
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: optional
      aria-role: img
      extra:
        - "整體用 role=img + aria-label 描述"
        - "x / y 軸標籤須完整可讀"
        - "資料須有文字替代（table 版本）"
        - "色盲考量：用 pattern 補 color"
    token-policy:
      allowed: [semantic.surface.chart.*, semantic.text.chart.*, semantic.color.chart-palette.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "統計數據、圖表 / 長條圖（直式/橫式）"
        url: ""
      figma: ""
      code: ""
    notes: |
      長條圖。variants 涵蓋：
        - vertical: 直式（時間軸 / 類別在 x 軸）
        - horizontal: 橫式（類別在 y 軸，較適合長類別名稱）
        - stacked: 堆疊（總量 + 分組）
        - grouped: 並排（同類別多組對比）

      可選功能（feature flags）：
        - with-legend / with-axis-labels / with-grid: 標準輔助元素
        - with-data-labels: 條上 / 條尾顯示數值
        - with-tooltip / interactive: hover 互動
        - with-threshold-line: 顯示閾值參考線

  - id: line-chart
    category: chart
    variants: [single-line, multi-line, area-fill, smooth]   # 線型結構
    states:   [default, loading, empty, error]
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: optional
      aria-role: img
      extra:
        - "同 bar-chart：role=img + 完整 aria-label + 資料表替代"
    token-policy:
      allowed: [semantic.surface.chart.*, semantic.text.chart.*, semantic.color.chart-palette.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "統計數據、圖表 / 折線圖"
        url: ""
      figma: ""
      code: ""
    notes: |
      折線圖。variants：
        - single-line: 單條折線
        - multi-line: 多條折線並列
        - area-fill: 折線下方填色（面積圖）
        - smooth: 曲線版本（cardinal / bezier 平滑）

      可選功能（feature flags）：
        - with-markers: 資料點圓點標記
        - with-grid / with-axis-labels / with-legend: 標準
        - with-tooltip / interactive: hover 顯示十字游標 + 資料
        - with-trend-line: 趨勢線 / 平均線


  # ════════════════════════════════════════
  # 類別 6：Loading（Build Plan 第 6 大類）
  # Build Plan 原列 2 項：Skeleton / Loader
  # 注意：table 的 loading state 已內建 skeleton rows，不依賴本類別元件外掛
  # ════════════════════════════════════════

  - id: skeleton
    category: loading
    variants: [text, rectangle, circle]                      # 基本形狀
    states:   [default]                                       # 純展示，動畫由 feature 控制
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: n/a
      aria-role: status
      extra:
        - "整個 skeleton 群組用 aria-busy=true"
        - "提供 aria-label（如「載入內容中」）"
        - "個別 skeleton 元素 aria-hidden=true（避免重複讀出）"
    token-policy:
      allowed: [semantic.surface.skeleton.*, semantic.color.skeleton-shimmer.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "Loading 狀態 / Skeleton"
        url: ""
      figma: ""
      code: ""
    notes: |
      載入中佔位元素。variants 為基本形狀，組合使用以模擬實際內容結構。

      可選功能（feature flags）：
        - shimmer-animation: 光澤掃過動畫（default-on）
        - pulse-animation: 脈衝閃動（替代 shimmer 的低能耗版）
        - no-animation: 靜態顯示（用於 prefers-reduced-motion）

      L3 待決:
        - 動畫速度與 easing
        - shimmer 顏色深淺對比（避免太強搶 focus）

  - id: loader
    category: loading
    variants: [circular, dots, bar]                          # 動畫樣式
    intents:  [neutral, primary]                             # 通常 neutral；強調情境用 primary
    states:   [default]
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: n/a
      aria-role: status
      extra:
        - "用 aria-live=polite + aria-label（如「載入中」）"
        - "若 loading 預期 < 1 秒可考慮 aria-hidden 避免無謂讀出"
        - "prefers-reduced-motion 時動畫降低強度"
    token-policy:
      allowed: [semantic.color.action.*, semantic.surface.feedback.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "Loading 狀態 / Loader"
        url: ""
      figma: ""
      code: ""
    notes: |
      動態載入指示器（業界別名：spinner）。variants：
        - circular: 旋轉圈（最常見）
        - dots: 跳動點（活潑感）
        - bar: 進度條樣式（不確定進度時）

      可選功能（feature flags）：
        - with-label: 旁邊配文字（「載入中...」）
        - inline: 文字內嵌使用（小尺寸）
        - full-screen: 全螢幕遮罩 + 置中 loader
        - with-progress: 顯示百分比進度（已知進度時）

      L3 待決:
        - 不同 size 對應的動畫速度
        - 預設顏色（neutral vs intent.primary）
        - Build Plan 提到「顯示秒數」— 是 minimum-show-time 避免閃爍，或 max-show-time 超時改顯錯誤？需釐清


  # ════════════════════════════════════════
  # 類別 7：特殊元件（Build Plan 第 7 大類）
  # Build Plan 原列 2 項：樹狀圖 / 排程圖
  # 這類元件高度依專案需求變動、通常依賴第三方 library 或 custom 實作
  # ════════════════════════════════════════

  - id: tree-view
    category: special
    variants: [indent, connecting-line]                     # 視覺結構：純縮排 vs 含連線
    states:   [default, hover, selected, expanded, collapsed, disabled, focus]
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: required
      aria-role: tree
      extra:
        - "節點用 role=treeitem + aria-level（層級）+ aria-setsize / aria-posinset"
        - "可展開節點用 aria-expanded"
        - "可選節點用 aria-selected；checkbox 模式用 aria-checked"
        - "鍵盤：上下移動、左右展收、Home/End 跳首末、Enter/Space 選取"
    token-policy:
      allowed: [semantic.surface.*, semantic.text.*, semantic.border.*, semantic.action.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "特殊元件 / 樹狀圖"
        url: ""
      figma: ""
      code: ""
    notes: |
      樹狀層級顯示（檔案總管、組織架構、分類目錄）。
      與 cascader 區隔：tree-view 是「整面 panel」顯示完整層級；cascader 是「下拉選單」式逐層展開。

      可選功能（feature flags）：
        - with-checkbox: 多選樹（含父子節點連動勾選邏輯）
        - with-icon: 節點含 icon（資料夾 / 檔案 / 自訂）
        - lazy-load: 點展開才載入子節點
        - draggable: 拖拉重排
        - searchable: 樹內搜尋（含路徑高亮）

      L3 待決:
        - 父子節點勾選連動（嚴格 vs 寬鬆 vs 自訂）
        - 預設展開層級

  - id: schedule-chart
    category: special
    variants: [gantt, timeline, calendar-grid]              # 三種主要呈現形態
    states:   [default, loading, empty, error]
    sizes:    [s, m, l]
    a11y:
      contrast: required
      keyboard: required
      aria-role: ""                                          # 視 variant；gantt 用 grid、timeline 用 list
      extra:
        - "事件條須有完整 aria-label（任務名 + 起迄時間）"
        - "時間軸 header 須可導航（前後切換時間範圍）"
        - "拖拉操作須有鍵盤替代（如方向鍵調整時間）"
    token-policy:
      allowed: [semantic.surface.*, semantic.text.*, semantic.border.*, semantic.feedback.*, semantic.color.chart-palette.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "特殊元件 / 排程圖"
        url: ""
      figma: ""
      code: ""
    notes: |
      排程 / 時程顯示元件。variants：
        - gantt: 任務條 + 時間軸（專案排程）
        - timeline: 純時間軸 + 里程碑點（事件年表）
        - calendar-grid: 日曆網格顯示排程（同 calendar 但聚焦於排程）

      此元件高度依專案需求變動、通常依賴第三方 library（dhtmlx / FullCalendar / Bryntum）或 custom 實作。
      DS 規範範圍：色票、字體、tooltip 樣式、互動 cursor，不規範完整實作。

      可選功能（feature flags）：
        - draggable-items: 拖拉移動 / 調整事件
        - zoom-levels: 切換時間粒度（時 / 日 / 週 / 月 / 年）
        - with-dependencies: 顯示任務依賴連線（gantt 專用）
        - with-milestones: 標記里程碑
        - with-grouping: 任務分組（按負責人 / 專案）

      L3 待決:
        - 第三方 library 選用（影響大量規範細節）
        - 是否覆蓋全部三種 variant 或只實作一種


  # ════════════════════════════════════════
  # 類別 8：圖片（Build Plan 第 8 大類）
  # Build Plan 原列 1 項：圖片（大中小比例、裁切規則定義）
  # ════════════════════════════════════════

  - id: image
    category: media
    variants: [rectangular, rounded, circular]                                 # 形狀軸
    states:   [default, loading, error]                                        # error = broken image fallback
    sizes:    [s, m, l, xl]                                                    # 顯示大小
    a11y:
      contrast: n/a
      keyboard: optional                                                       # clickable image 時 required
      aria-role: img
      extra:
        - "必填 alt 屬性；裝飾性圖片用 alt='' 或 aria-hidden=true"
        - "可點擊圖片須有清楚的 focus indicator"
        - "loading 狀態用 skeleton 元件代替"
    token-policy:
      allowed: [semantic.surface.image.*, semantic.border.image.*, semantic.radius.*]
      forbidden: [primitive.*]
    archetypes-used-in: []
    test-hooks:
      visual-regression: required
      a11y-scan: required
      states-coverage: required
      extra: []
    status: planned
    refs:
      source-doc:
        doc: "Design System Build Plan.pdf"
        section: "圖片"
        url: ""
      figma: ""
      code: ""
    notes: |
      圖片顯示元件。Build Plan「大中小比例、裁切規則定義」對應此元件。
      variants 為形狀（rectangular / rounded / circular），aspect-ratio 與 fit-mode 為 feature flags。

      可選功能（feature flags）：
        - aspect-ratio: 鎖定比例（1:1 / 4:3 / 16:9 / 3:4 / 自訂）
        - fit-mode: 裁切策略
            * cover: 填滿容器、可能裁切
            * contain: 完整顯示、可能留白
            * fill: 拉伸填滿（變形）
        - with-placeholder: loading 期間顯示佔位（skeleton 或純色塊）
        - with-fallback: 載入失敗時顯示 fallback icon / 預設圖
        - lazy-load: 滾動到視窗附近才載入
        - with-caption: 下方說明文字
        - zoom-on-hover: hover 放大效果
        - clickable: 點擊放大檢視（lightbox）

      L3 待決:
        - 預設 aspect-ratio 清單（限制可選範圍 vs 自訂）
        - 預設 fit-mode（cover vs contain）
        - lazy-load 觸發距離（rootMargin）


