.tbl-wrap.tbl-v-plain .tbl-ft{background:transparent;}

/* ---- еҲҶй ҒеҲ—пјҲйҮҚз”Ё .btn еҺҹеӯҗпјӣshowcase зӨәж„Ҹпјү ---- */
.tbl-pgbar{display:flex;align-items:center;justify-content:flex-end;gap:var(--sp-1);
  padding:var(--sp-3) var(--sp-4);border-top:1px solid var(--line);background:var(--panel);}
.tbl-wrap.tbl-v-plain .tbl-pgbar{background:transparent;}
.tbl-pginfo{font-size:var(--fs-h12);color:var(--muted);margin-right:auto;font-variant-numeric:tabular-nums;}
.tbl-pgnav{display:flex;align-items:center;}                         /* еҢ…дҪҸ library pgBar е…ғд»¶ */
.tbl-pgnav .pg-bar{margin:0;}

/* ---- Cell Types ж¬„дҪҚеһӢеҲҘиЎЁпјҡDropdown йҒёе–®йңҖжәўеҮәеҸҜиҰӢгҖҒе„Іеӯҳж је…§еҺҹеӯҗзё®жҺ’ ---- */
.tbl-wrap.tbl-celltypes{overflow:visible;}                           /* и®“ Dropdown еұ•й–ӢйҒёе–®дёҚиў«иЈҒеҲҮ */
.tbl-celltypes .tbl-owner{width:158px;}
.tbl-celltypes .tbl-dd{min-width:138px;}
.tbl-celltypes .tbl-dd .field.dd{min-height:32px;padding:var(--sp-1) var(--sp-3);font-size:var(--fs-h11);} /* ж”¶зӘ„жҲҗиЎЁж је…§е°әеҜё */
.tbl-celltypes .ddmenu{z-index:40;}
.tbl-celltypes .tbl-td{overflow:visible;}
@media(max-width:767px){.tbl-wrap.tbl-celltypes{overflow-x:auto;overflow-y:hidden;}}  /* жүӢж©ҹпјҡеҜ¬иЎЁж јж”№еҚЎе…§ж©«еҗ‘еҚ·еӢ•е„Әе…ҲпјҲDropdown еұ•й–ӢеңЁжүӢж©ҹијғе°‘з”ЁпјҢи®“дә”зЁ®ж¬„дҪҚеһӢеҲҘеҸҜе®Ңж•ҙж»‘й–ұпјү */
.tbl-actbtn{padding:2px var(--sp-1);min-height:0;}                           /* ж–Үеӯ—жҢүйҲ•е„Іеӯҳж јпјҡиІјйҪҠеҲ—й«ҳ */

/* ---- йҷіеҲ—е®№еҷЁ ---- */
.tbl-demo{max-width:100%;}
/* вҡ  дёҚиҰҒеҶҚз”Ё .tbl-row з•¶дёҰжҺ’е®№еҷЁпјҡTable е…ғд»¶зҡ„иіҮж–ҷеҲ— <tr> е·Із”Ё class="tbl-row"пјҢ
   иӢҘе°Қ .tbl-row дёӢ display:grid жңғжҠҠжҜҸдёҖеҲ— <tr> и®ҠжҲҗ gridгҖҒж•ҙејөиЎЁж¬„дҪҚйҢҜдҪҚпјҲ2026-07-16 иё©йҒҺпјүгҖӮ
   жңӘдҫҶиҰҒдёҰжҺ’зӯүеҲҶ tableпјҢз”Ё .tbl-cols йҖҷзЁ®дёҚж’һеҗҚзҡ„е®№еҷЁйЎһгҖӮ */
.tbl-cols{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(0,1fr);gap:var(--sp-5);align-items:start;}
.tbl-cols>.tbl-wrap,.tbl-cols>.tbl-demo{min-width:0;max-width:100%;}
/* зҹ©йҷЈе°ҸиЎЁпјҡж је…§ж–Үеӯ—дёҖеҫӢдёҚжҸӣиЎҢпјҲзӢҖж…Ӣ pillпјҸйҮ‘йЎҚдёҚеҶҚж“ зҲҶжҲҗе…©иЎҢпјүпјӣж¬„еҜ¬еӨ жҷӮеҗ„ж¬„иҮӘз„¶жҺ’й–ӢпјҢ
   ж¬„еҜ¬дёҚи¶іжҷӮж•ҙеҖӢзҹ©йҷЈиө° .grid-scroll ж©«еҗ‘жҚІеӢ•пјҲиҰӢ mincolпјүпјҢиҖҢйқһжҠҠе…§е®№ж“ зҲӣ */
.tbl-mini .tbl-td,.tbl-mini .tbl-th{white-space:nowrap;}
  /* ===== Table&Chart group: chart ===== */
/* ==================== CHART ең–иЎЁпјҲcht-пјү==================== */
/* е„ҖиЎЁжқҝең–иЎЁпјҡstat зөұиЁҲж•ёеӯ—еҚЎпјҲйҮҚз”Ё prMetricEl еҺҹеӯҗпјүпјӢ line жҠҳз·ҡпјҸbar й•·жўқпјҸdonut з”ңз”ңеңҲпјҲinline SVG жүӢеҲ»пјүгҖӮ
   зі»еҲ—иүІдёҖеҫӢз¶Ғ tokenпјҡ--accent дё»пјҸ--ok жҲҗеҠҹпјҸ--warn иӯҰе‘ҠпјҸ--i-danger еҚұйҡӘпјӣж јз·ҡ --lineгҖҒи»ёз·ҡ --line-strongгҖӮ */

/* --- еҹәзӨҺе®№еҷЁ --- */
.cht-box{display:inline-flex;flex-direction:column;align-items:flex-start;gap:var(--cht-gap,var(--sp-3));font-family:var(--font-sans);color:var(--ink);max-width:100%;}
.cht-box svg{display:block;overflow:visible;max-width:100%;}
.cht-box svg text{font-family:var(--font-sans);}

/* --- е°әеҜёпјҡm жЁҷжә–пјҸs зІҫз°ЎпјҲSVG з”Ё viewBox зӯүжҜ”зё®ж”ҫпјҢеҸӘжҺ§йЎҜзӨәеҜ¬пјӣ2026-07-16 еҠ еҜ¬пјү --- */
.cht-line.cht-sz-m svg,.cht-curve.cht-sz-m svg,.cht-bar.cht-sz-m svg{width:300px;height:auto;}
.cht-line.cht-sz-s svg,.cht-curve.cht-sz-s svg,.cht-bar.cht-sz-s svg{width:170px;height:auto;}
.cht-box.cht-wide.cht-sz-m svg{width:380px;}          /* LiveпјҸdashboard еҠ еҜ¬зүҲ */
.cht-box.cht-wide.cht-sz-s svg{width:210px;}
.cht-donut.cht-sz-m svg{width:120px;height:auto;}
.cht-donut.cht-sz-s svg{width:80px;height:auto;}

/* --- дә’еӢ•з№Әең–еҚҖпјӢhover tooltipпјҲfolded з«Ҝй»һеҸӘеңЁ hover еҮәзҸҫпјү --- */
.cht-plot{position:relative;display:inline-block;max-width:100%;}
.cht-plot svg{display:block;}
.cht-guide{stroke:var(--line-strong);stroke-width:1;stroke-dasharray:3 3;pointer-events:none;}
.cht-hdot{fill:var(--accent);stroke:var(--panel);stroke-width:1.6;pointer-events:none;}
.cht-seg{cursor:default;}
.cht-bhl{fill:var(--accent);pointer-events:none;}
.cht-axis{font-size:8px;fill:var(--muted);font-variant-numeric:tabular-nums;}
.cht-tip{position:absolute;transform:translate(-50%,calc(-100% - 9px));background:var(--ink);color:var(--canvas);
  font-size:var(--fs-h12);line-height:1.3;padding:var(--sp-1) var(--sp-3);border-radius:var(--r-sm);white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .12s;z-index:6;display:flex;flex-direction:column;align-items:center;gap:1px;
  box-shadow:0 4px 14px color-mix(in srgb, var(--ink) 22%, transparent);}
.cht-tip.on{opacity:1;}
.cht-tip b{font-weight:600;font-variant-numeric:tabular-nums;}
.cht-tip span{font-size:var(--fs-h12);font-weight:500;opacity:.68;}
.cht-tile-wide{width:100%;max-width:440px;}
.cht-tile-wide .cht-box,.cht-tile-wide .cht-plot,.cht-tile-wide .cht-plot svg{width:100%;}

/* --- SVG е…§ж–Үеӯ—пјҲclass жҺӣеңЁ <text> дёҠпјҢinline SVG еҗғеҫ—еҲ°й Ғйқў CSSпјӣж•ёеӯ—дёҖеҫӢ tabular-numsпјү --- */
.cht-donut-num{font-size:var(--fs-h7);font-weight:600;fill:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
.cht-donut-sub{font-size:var(--fs-h12);font-weight:500;fill:var(--muted);letter-spacing:.04em;}
.cht-val{font-size:8.5px;font-weight:600;fill:var(--muted);font-variant-numeric:tabular-nums;}

/* --- зҹ©йҷЈж јпјҸLive иҲһеҸ°зҡ„ dashboard tile е®№еҷЁпјҲpanel еә•пјӢзҙ°йӮҠпјү --- */
.cht-tile{display:inline-flex;flex-direction:column;align-items:flex-start;gap:var(--sp-3);background:var(--panel);border:1px solid var(--line);border-radius:var(--cht-radius,var(--radius));padding:var(--sp-4) var(--sp-5);max-width:100%;}

/* --- ең–дҫӢпјҡйҮҚз”Ё .tg еҺҹеӯҗпјҲv-soft i-neutralпјүпјҢеүҚзҪ®иүІй»һз¶Ғеҗ„зі»еҲ—иүІ token --- */
.cht-legend{display:flex;flex-wrap:wrap;gap:var(--sp-2);}
.cht-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;display:inline-block;}
.cht-dot.c-accent{background:var(--accent);}
.cht-dot.c-ok{background:var(--ok);}
.cht-dot.c-warn{background:var(--warn);}
.cht-dot.c-danger{background:var(--i-danger);}

/* --- Showcaseпјҡdashboard зө„еҗҲпјҲ6 ж¬„ gridпјҡstat 2пјӢstat 2пјӢdonut 2пјҸline 3пјӢbar 3пјү --- */
.cht-dash{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--sp-4);width:100%;}
.cht-card{grid-column:span 2;background:var(--panel);border:1px solid var(--line);border-radius:var(--cht-radius,var(--radius));padding:var(--sp-5);display:flex;flex-direction:column;gap:var(--sp-3);min-width:0;}
.cht-card.cht-span-3{grid-column:span 3;}
.cht-card-h{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);width:100%;}
.cht-card-t{font-size:var(--fs-h11);font-weight:600;color:var(--muted);letter-spacing:.02em;}
/* еҚЎе…§ең–иЎЁж’җж»ҝеҚЎеҜ¬пјҲdonut дҫӢеӨ–пјҡз¶ӯжҢҒеӣәе®ҡең“еҫ‘дёҚи®ҠеҪўжӢүдјёпјү */
.cht-card .cht-box{width:100%;}
.cht-card .cht-plot{width:100%;}
.cht-card .cht-line svg,.cht-card .cht-curve svg,.cht-card .cht-bar svg{width:100%;}
.cht-card .cht-donut svg{width:110px;}
@media(max-width:760px){.cht-card,.cht-card.cht-span-3{grid-column:span 6;}}

/* --- Live иҲһеҸ° --- */
.cht-live-stage{display:flex;justify-content:center;padding:var(--sp-3) 0;}
  /* ===== Table&Chart group: tree-view ===== */
/* ==================== Tree View жЁ№зӢҖпјҲtrv- namespaceпјү==================== */
/* жЁ№е®№еҷЁпјҡul е·ўзӢҖзөҗж§ӢпјҢзё®жҺ’йқ  .trv-children зҡ„ padding-left з–ҠеҮә depth */
.trv-tree{list-style:none;margin:0;padding:0;font-family:var(--font-sans);font-size:var(--trv-fs,var(--fs-h11));color:var(--ink);}
.trv-tree ul{list-style:none;margin:0;}
.trv-children{padding-left:var(--trv-indent,var(--sp-6));}
.trv-item{position:relative;}
.trv-item:not(.is-open)>.trv-children{display:none;}   /* ж”¶еҗҲпјҡзӣҙжҺҘи—ҸеӯҗеұӨ */

/* --- зҜҖй»һеҲ—пјҡз®ӯй ӯпјӢ(cbx)пјӢiconпјӢеҗҚзЁұпјӢcount --- */
.trv-row{display:flex;align-items:center;gap:var(--sp-2);padding:var(--sp-1) var(--sp-3);border-radius:var(--r-sm);
  min-width:0;transition:background .12s;cursor:default;}
.trv-row.live{cursor:pointer;}
/* hoverпјҡзҹ©йҷЈз”Ёйқңж…Ӣ is-hoverгҖҒLive/showcase з”ЁзңҹеҜҰ :hoverпјҲйҒёеҸ–еҲ—дёҚеҶҚи®ҠзҒ°пјү */
.trv-row.is-hover,
.trv-row.live:hover:not(.is-selected){background:var(--panel-2);}
/* selectedпјҡж·Ўи—Қеә•пјӢеҗҚзЁұ/ең–зӨәиҪүдё»иүІ */
.trv-row.is-selected{background:var(--i-primary-tint);}
.trv-row.is-selected .trv-name{color:var(--accent);font-weight:600;}
.trv-row.is-selected .trv-ic,
.trv-row.is-selected .trv-caret{color:var(--accent);}

/* --- еұ•й–Ӣз®ӯй ӯпјҡйҮҚз”Ё ICON_CARETпјҲдёӢз®ӯй ӯпјүпјҢж”¶еҗҲжҷӮиҪү -90 еәҰжңқеҸі --- */
.trv-caret{width:16px;height:16px;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
  color:var(--muted);transform:rotate(-90deg);transition:transform .15s;}
.trv-caret svg{width:12px;height:12px;display:block;}
.trv-item.is-open>.trv-row .trv-caret{transform:rotate(0deg);}
.trv-caret.trv-blank{visibility:hidden;}                /* и‘үеӯҗзҜҖй»һпјҡеҗҢеҜ¬еҚ дҪҚе°ҚйҪҠ */

/* --- еҲҶж”Ҝ/и‘үеӯҗ iconпјҲIC_FOLDER / IC_FILEпјүиҲҮеҗҚзЁұгҖҒcount --- */
.trv-ic{width:16px;height:16px;flex:0 0 auto;display:inline-flex;color:var(--muted);}
.trv-ic svg{width:16px;height:16px;display:block;}
.trv-name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.5;}
.trv-count{margin-left:auto;padding-left:var(--sp-3);flex:0 0 auto;
  font-size:var(--fs-h12);color:var(--faint);font-variant-numeric:tabular-nums;}

/* checkbox variantпјҡеҲ—е…§йҮҚз”Ё .cbx еҺҹеӯҗпјҢlive hover зөҰйӮҠжЎҶжҸҗзӨә */
.trv-row .cbx{flex:0 0 auto;}
.trv-row.live:hover .cbx:not(.st-checked){border-color:var(--accent);}

/* --- lines variantпјҡL еҪўйҖЈжҺҘз·ҡпјҲ--line tokenпјӣеҸӘз•«з¬¬дәҢеұӨд»ҘдёӢпјү --- */
.trv-v-lines .trv-children{padding-left:var(--trv-indent,var(--sp-6));}
/* жҜҸеҖӢеӯҗзҜҖй»һдёҖж®ө Lпјҡзӣҙз·ҡиҗҪеңЁзҲ¶еұӨз®ӯй ӯдёӯеҝғпјҢж©«з·ҡжҺҘеҲ°еӯҗеҲ—еүҚз·Ј */
.trv-v-lines .trv-children>.trv-item::before{content:'';position:absolute;left:-10px;top:0;
  width:10px;height:15px;border-left:1px solid var(--line);border-bottom:1px solid var(--line);
  border-bottom-left-radius:6px;}
/* йқһжңҖеҫҢдёҖеҖӢжүӢи¶іпјҡзӣҙз·ҡз№јзәҢеҫҖдёӢе»¶дјё */
.trv-v-lines .trv-children>.trv-item:not(:last-child)::after{content:'';position:absolute;left:-10px;top:0;bottom:0;
  border-left:1px solid var(--line);}

/* --- е®№еҷЁпјҡзҹ©йҷЈж јиј•йҮҸеҢ…гҖҒshowcase/Live з”Ё panel еҚЎ --- */
.trv-cellbox{width:100%;min-width:0;padding:2px 0;box-sizing:border-box;}
.trv-box{background:var(--panel);border:1px solid var(--line);border-radius:var(--trv-radius,var(--radius));padding:var(--sp-3);box-sizing:border-box;}

/* showcase дёүжЈөдёҰжҺ’ */
.trv-show-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:var(--sp-4);align-items:start;}
.trv-show-cap{font-size:var(--fs-h12);font-weight:600;color:var(--muted);margin-bottom:var(--sp-3);}
  /* ===== Table&Chart group: schedule-chart ===== */
/* ==================== Schedule Chart жҺ’зЁӢең–пјҲgnt- namespaceпјү==================== */
/* дёү variantпјҡgantt з”ҳзү№ең–пјҲд»»еӢҷж¬„пјӢж—Ҙжңҹи»ёпјӢиө·иЁ–ж©«жўқпјүпјҸweek йҖұжҺ’зЁӢпјҲ7 еӨ© Г— жҷӮж®өж јпјүпјҸtimeline еһӮзӣҙжҷӮй–“и»ё
   Г— size m жЁҷжә–пјҸs зІҫз°ЎгҖӮзі»еҲ—иүІдёҖеҫӢз¶“ --gc з¶Ғ tokenпјҲaccent/ok/warn/i-dangerпјүпјҢж јз·ҡ --lineгҖҒеӯ— --muted/--faintгҖӮ */

/* --- е®№еҷЁе…ұйҖҡпјҡpanel еә• + line йӮҠжЎҶ + radius tokenпјӣж•ёеӯ—дёҖеҫӢ tabular --- */
.gnt-box{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:var(--gnt-radius,var(--radius));
  font-family:var(--font-sans);font-variant-numeric:tabular-nums;max-width:100%;box-sizing:border-box;}

/* --- size е…©зҙҡпјҡжүҖжңүе°әеҜёз¶“ CSS и®Ҡж•ёж”¶ж–ӮпјҢm жЁҷжә–пјҸs зІҫз°Ў --- */
.gnt-sz-m{--gnt-row:34px;--gnt-bar:16px;--gnt-day:46px;--gnt-fs:12.5px;--gnt-fs-sm:11px;
  --gnt-slot:34px;--gnt-timew:52px;--gnt-side:150px;--gnt-ww:560px;--gnt-tlw:380px;}
.gnt-sz-s{--gnt-row:26px;--gnt-bar:10px;--gnt-day:34px;--gnt-fs:11.5px;--gnt-fs-sm:10px;
  --gnt-slot:24px;--gnt-timew:44px;--gnt-side:112px;--gnt-ww:430px;--gnt-tlw:310px;}

/* --- зі»еҲ—иүІпјҡж©«жўқпјҸдәӢд»¶еЎҠпјҸзҜҖй»һдёҖеҫӢиө° --gcпјҢзҰҒ hard-code иүІеҖј --- */
.gnt-bar,.gnt-evt{--gc:var(--accent);}
/* ең–иЎЁпјҲChartпјӢSchedule Chartпјүдё»иүІй»‘вҶ’е“ҒзүҢи—Қпјҡscoped иҰҶеҜ« --accentпјҢзӢҖж…ӢиүІ(ok/warn/danger)дёҚеҸ—еҪұйҹҝ */
.cht-box,.cht-tile,.cht-card,.cht-dash,.gnt-box{--accent:var(--c-brand2-500);}
.gnt-bar.c-ok,.gnt-evt.c-ok{--gc:var(--ok);}
.gnt-bar.c-warn,.gnt-evt.c-warn{--gc:var(--warn);}
.gnt-bar.c-danger,.gnt-evt.c-danger{--gc:var(--i-danger);}

/* ==================== variant 1пјҡgantt з”ҳзү№ең– ==================== */
.gnt-gantt{display:flex;overflow:hidden;width:fit-content;}
/* е·ҰеҒҙд»»еӢҷеҗҚж¬„пјҡиЎЁй ӯ + жҜҸеҲ—д»»еӢҷеҗҚпјҲ+ .tg зӢҖж…ӢжЁҷпјҢйҮҚз”Ё Tag еҺҹеӯҗйқ еҸіпјү */
.gnt-g-side{flex:0 0 var(--gnt-side);min-width:0;border-right:1px solid var(--line-strong);}
.gnt-g-side-head{height:var(--gnt-row);display:flex;align-items:center;padding:0 var(--sp-4);
  font-family:var(--font-mono);font-size:var(--gnt-fs-sm);color:var(--faint);border-bottom:1px solid var(--line-strong);}
.gnt-g-task{height:var(--gnt-row);display:flex;align-items:center;gap:var(--sp-2);padding:0 var(--sp-4);
  border-bottom:1px solid var(--line);font-size:var(--gnt-fs);color:var(--ink);white-space:nowrap;min-width:0;}
.gnt-g-task:last-child{border-bottom:0;}
.gnt-g-name{overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.gnt-g-task .tg{margin-left:auto;flex:0 0 auto;}
.gnt-sz-s .gnt-g-task .tg{display:none;}          /* s зІҫз°ЎпјҡеҒҙж¬„дёҚж”ҫзӢҖж…ӢжЁҷ */

/* еҸіеҒҙжҷӮй–“и»ёпјҡж—ҘжңҹиЎЁй ӯ + ж јз·ҡиғҢжҷҜ + жҜҸеҲ—ж©«жўқпјӣйҒҺеҜ¬жҷӮе®№еҷЁе…§ж©«еҗ‘жҚІеӢ• */
.gnt-g-scroll{flex:1;min-width:0;overflow-x:auto;}
.gnt-g-main{min-width:max-content;}
.gnt-g-head{display:flex;}
.gnt-g-hcell{flex:1 0 var(--gnt-day);height:var(--gnt-row);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:var(--gnt-fs-sm);color:var(--faint);border-left:1px solid var(--line);border-bottom:1px solid var(--line-strong);}
.gnt-g-hcell:first-child{border-left:0;}
.gnt-g-hcell.is-wkend{background:var(--panel-2);}                       /* йҖұжң«ж¬„пјҡpanel-2 ж·әзҒ° */
.gnt-g-hcell.is-today{color:var(--accent);font-weight:600;background:var(--i-primary-tint);}
.gnt-g-rows{position:relative;}
/* зӣҙж¬„ж јз·ҡпјӢйҖұжң«еә•пјҡж”№з”ұжҜҸеҲ— in-flow зҡ„ cell жҸҗдҫӣпјҲеҺҹжң¬з•«еңЁзө•е°Қе®ҡдҪҚиғҢжҷҜеұӨпјҢ1px з·ҡеңЁж©«еҗ‘жҚІеӢ•жҷӮжңғиў« GPU еҗҲжҲҗеҷЁдёҹж јвҶ’з·ҡж¶ҲеӨұпјӣin-flow еҫ№еә•и§ЈжұәпјҢдё”иҲҮиЎЁй ӯ hcell еҗҢзөҗж§ӢиҮӘеӢ•е°ҚйҪҠпјү*/
.gnt-g-row{position:relative;display:flex;height:var(--gnt-row);border-bottom:1px solid var(--line);}
.gnt-g-cell{flex:1 0 var(--gnt-day);border-left:1px solid var(--line);}
.gnt-g-cell:first-child{border-left:0;}
.gnt-g-cell.is-wkend{background:var(--panel-2);}
.gnt-g-row:last-child{border-bottom:0;}

/* ж©«жўқпјҡдҫқиө·иЁ–ж—Ҙд»Ҙ % е®ҡдҪҚпјӣеә•пјқзі»еҲ—иүІ 24% ж·Ўеә•пјҢз–ҠеҠ йҖІеәҰеҜҰиүІеЎ«е……пјҢзҡҶе…Ёең“и§’ */
.gnt-bar{position:absolute;top:50%;transform:translateY(-50%);height:var(--gnt-bar);border-radius:var(--r-pill);
  background:color-mix(in srgb,var(--gc) 24%,transparent);z-index:1;}
.gnt-bar-fill{position:absolute;left:0;top:0;bottom:0;max-width:100%;background:var(--gc);border-radius:var(--r-pill);}
.gnt-bar-lab{position:absolute;left:100%;top:50%;transform:translate(6px,-50%);line-height:1;
  font-family:var(--font-mono);font-size:var(--gnt-fs-sm);color:var(--faint);white-space:nowrap;}
.gnt-gantt.no-prog .gnt-bar{background:var(--gc);}                      /* й—ңйҖІеәҰпјҡж•ҙжўқеҜҰиүІ */
.gnt-gantt.no-prog .gnt-bar-fill,.gnt-gantt.no-prog .gnt-bar-lab{display:none;}
.gnt-box.live .gnt-bar:hover{filter:brightness(1.08);}                  /* Live зңҹеҜҰ hover */

/* д»Ҡж—Ҙз·ҡпјҡaccent зӣҙз·ҡ + й Ӯз«ҜгҖҢд»Ҡж—ҘгҖҚе°ҸзұӨпјҲ#fff жҜ”з…§ .tg i-brand зҡ„ --ton ж…ЈдҫӢпјү */
.gnt-today{position:absolute;top:0;bottom:0;width:2px;margin-left:-1px;background:var(--accent);z-index:2;}
.gnt-today-pin{position:absolute;top:3px;left:50%;transform:translateX(-50%);padding:1px var(--sp-2);border-radius:var(--r-pill);
  background:var(--accent);color:#fff;font-size:var(--fs-h12);line-height:1.5;white-space:nowrap;}

/* зҹ©йҷЈзё®е°ҸзӨәж„ҸпјҡжӣҙзӘ„еҒҙж¬„гҖҒйҡұи—ҸйҖІеәҰзҷҫеҲҶжҜ”иҲҮзӢҖж…ӢжЁҷ */
.gnt-g-compact{--gnt-side:88px;width:100%;}
.gnt-g-compact .gnt-bar-lab{display:none;}
.gnt-g-compact .gnt-g-task .tg{display:none;}
.gnt-g-compact .gnt-g-task,.gnt-g-compact .gnt-g-side-head{padding:0 var(--sp-3);}

/* ==================== variant 2пјҡweek йҖұжҺ’зЁӢ ==================== */
.gnt-week{overflow:hidden;width:var(--gnt-ww);}
.gnt-w-grid{display:grid;}                                              /* columns/rows з”ұ JS дҫқжҷӮж®өж•ёиЁӯе®ҡ */
.gnt-w-corner{border-bottom:1px solid var(--line-strong);border-right:1px solid var(--line);}
.gnt-w-dhead{height:var(--gnt-row);display:flex;align-items:center;justify-content:center;
  font-size:var(--gnt-fs-sm);font-weight:600;color:var(--muted);border-bottom:1px solid var(--line-strong);border-left:1px solid var(--line);}
.gnt-w-dhead.first{border-left:0;}
.gnt-w-dhead.is-wkend{background:var(--panel-2);color:var(--faint);}
.gnt-w-time{display:flex;align-items:flex-start;justify-content:flex-end;padding:3px var(--sp-3) 0 0;
  font-family:var(--font-mono);font-size:var(--gnt-fs-sm);color:var(--faint);border-right:1px solid var(--line);}
.gnt-w-cell{border-left:1px solid var(--line);border-top:1px solid var(--line);min-width:0;}
.gnt-w-cell.firstcol{border-left:0;}
.gnt-w-cell.firstrow{border-top:0;}
.gnt-w-cell.is-wkend{background:var(--panel-2);}

/* дәӢд»¶ж–№еЎҠпјҡз–ҠеңЁж јдёҠпјҲgrid-row span и·ЁжҷӮж®өпјүпјҢзі»еҲ—иүІж·Ўеә• + е·ҰзІ—йӮҠ */
.gnt-evt{position:relative;z-index:1;margin:2px 3px;padding:var(--sp-1) var(--sp-2);border-radius:var(--r-sm);min-width:0;
  display:flex;flex-direction:column;gap:2px;overflow:hidden;
  background:color-mix(in srgb,var(--gc) 15%,var(--panel));border-left:3px solid var(--gc);font-size:var(--gnt-fs-sm);}
.gnt-evt .t{font-weight:600;color:var(--ink);line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gnt-evt .tm{font-family:var(--font-mono);color:var(--muted);white-space:nowrap;}
.gnt-sz-s .gnt-evt{margin:1px 2px;padding:2px var(--sp-1);border-left-width:2px;border-radius:var(--r-sm);}
.gnt-box.live .gnt-evt:hover{background:color-mix(in srgb,var(--gc) 24%,var(--panel));}  /* Live зңҹеҜҰ hover */
.gnt-w-compact{width:100%;}
.gnt-w-compact .gnt-evt .tm{display:none;}

/* ==================== variant 3пјҡtimeline еһӮзӣҙжҷӮй–“и»ё ==================== */
.gnt-tl{padding:var(--sp-5) var(--sp-5);display:flex;flex-direction:column;width:var(--gnt-tlw);}
.gnt-sz-s.gnt-tl{padding:var(--sp-4) var(--sp-4);}
.gnt-tl-item{display:flex;gap:var(--sp-4);min-width:0;}
.gnt-tl-rail{display:flex;flex-direction:column;align-items:center;flex:0 0 14px;}
/* зҜҖй»һең“й»һпјҡзӢҖж…Ӣз¶ҒиӘһж„ҸиүІпјҲе®ҢжҲҗ ok еҜҰеҝғпјҸйҖІиЎҢдёӯ accent з©әеҝғпјҸе»¶йҒІ danger еҜҰеҝғпјҸеҫ…й–Ӣе§Ӣ line-strong з©әеҝғпјү */
.gnt-tl-dot{--gc:var(--accent);width:12px;height:12px;border-radius:50%;flex:0 0 auto;margin-top:var(--sp-1);
  background:var(--panel);border:3px solid var(--gc);box-sizing:border-box;}
.gnt-tl-dot.st-done{--gc:var(--ok);background:var(--gc);}
.gnt-tl-dot.st-active{--gc:var(--accent);}
.gnt-tl-dot.st-delay{--gc:var(--i-danger);background:var(--gc);}
.gnt-tl-dot.st-todo{--gc:var(--line-strong);}
.gnt-tl-cord{width:2px;flex:1;min-height:14px;background:var(--line);margin-top:var(--sp-1);}   /* йҖЈжҺҘз·ҡ */
.gnt-tl.no-line .gnt-tl-cord{visibility:hidden;}

/* дәӢд»¶еҚЎпјҡжҷӮй–“пјҲIC_CLOCKпјүпјӢзӢҖж…Ӣ tagпјҲйҮҚз”Ё .tgпјүпјӢжЁҷйЎҢпјӢжҸҸиҝ° */
.gnt-tl-card{flex:1;min-width:0;background:var(--panel);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-4);transition:border-color .15s,box-shadow .15s;}
.gnt-tl-item:last-child .gnt-tl-card{margin-bottom:0;}
.gnt-box.live .gnt-tl-card:hover{border-color:var(--line-strong);
  box-shadow:0 2px 8px color-mix(in srgb,var(--ink) 8%,transparent);}                    /* Live зңҹеҜҰ hover */
.gnt-tl-top{display:flex;align-items:center;justify-content:space-between;gap:var(--sp-3);}
.gnt-tl-time{display:inline-flex;align-items:center;gap:var(--sp-1);
  font-family:var(--font-mono);font-size:var(--gnt-fs-sm);color:var(--muted);}
.gnt-tl-time svg{width:13px;height:13px;color:var(--faint);}
.gnt-tl-title{font-size:var(--gnt-fs);font-weight:600;color:var(--ink);margin-top:var(--sp-1);line-height:1.4;}
.gnt-tl-desc{font-size:var(--gnt-fs-sm);color:var(--muted);margin-top:2px;line-height:1.5;}
.gnt-sz-s .gnt-tl-card{padding:var(--sp-2) var(--sp-3);margin-bottom:var(--sp-3);}
.gnt-sz-s .gnt-tl-dot{width:10px;height:10px;border-width:2.5px;margin-top:3px;}
.gnt-sz-s .gnt-tl-desc{display:none;}              /* s зІҫз°ЎпјҡдёҚж”ҫжҸҸиҝ° */

/* ==================== зҹ©йҷЈж је®№еҷЁпјҡж’җж»ҝж јеҜ¬пјҢbox ж”№ 100% ==================== */
.gnt-cellwrap{width:100%;min-width:0;}
.gnt-cellwrap .gnt-tl{width:100%;}
  /* ===== Table&Chart group: calendar ===== */
/* ==================== Calendar ж—ҘжӣҶжҷӮй–“пјҲcal- namespaceпјү==================== */
/* ж—ҘжңҹжҷӮй–“йҒёж“Үпјҡmonth жңҲжӣҶпјҸrange ж—ҘжңҹеҚҖй–“пјҸtime жҷӮй–“жё…е–® Г— size m жЁҷжә–пјҸs зІҫз°ЎгҖӮ
   иЎЁй ӯдёҠдёӢжңҲйҲ•йҮҚз”Ё .btn v-text icon-only еҺҹеӯҗпјӣж—Ҙж јзӮә .cal-dayпјҲдёҖиҲ¬пјҸд»Ҡж—Ҙ accent еңҲпјҸ
   йҒёеҸ– accent еҜҰеҝғпјҸйқһжң¬жңҲж·ЎпјҸеҒңз”ЁеҠғжҺүпјҸжңүдәӢд»¶дёӢж–№ең“й»һпјүпјӣrange з”Ёиө·иЁ–еҜҰеҝғпјӢдёӯй–“ж·Ў accent йҖЈзәҢеё¶гҖӮ
   зҹ©йҷЈз”Ёйқңж…Ӣ classпјҲis-hoverпјүжЁЎж“¬пјӣLiveпјҸshowcase еҠ  .live иө°зңҹеҜҰ :hoverгҖӮ
   е…ЁйғЁз¶Ғ tokenпјҡ--accentпјҸ--i-primary-tintпјҸ--lineпјҸ--panel*пјҸ--inkпјҸ--mutedпјҸ--faintпјҢдёҚ hard-code иүІеҖјгҖӮ */

.cal{display:inline-flex;flex-direction:column;gap:var(--cal-gap,var(--sp-2));background:var(--panel);
  border:1px solid var(--line);border-radius:var(--cal-radius,var(--radius));
  font-family:var(--font-sans);text-align:left;flex:0 0 auto;}
.cal-sz-m{width:290px;padding:var(--sp-4);}
.cal-sz-s{width:232px;padding:var(--sp-3);gap:var(--sp-1);}

/* ---- иЎЁй ӯпјҡвҖ№ 2026 е№ҙ 7 жңҲ вҖәпјҲдёҠдёӢжңҲйҲ•пјқButton еҺҹеӯҗ v-text icon-onlyпјү---- */
.cal-head{display:flex;align-items:center;gap:var(--sp-1);}
.cal-head-title{flex:1;text-align:center;font-weight:600;color:var(--ink);font-variant-numeric:tabular-nums;}
.cal-sz-m .cal-head-title{font-size:var(--fs-h11);}
.cal-sz-s .cal-head-title{font-size:var(--fs-h11);}
/* s е°әеҜёжҠҠ icon-only йҲ•еҫ®зё®пјҲеғ…иҰҶи“Ӣе°әеҜёпјҢжЁЈејҸд»Қиө° .btn еҺҹеӯҗпјү */
.cal-sz-s .cal-head .btn.icon-only{width:26px;height:26px;border-radius:var(--r-sm);font-size:var(--fs-h12);}

/* ---- жҳҹжңҹеҲ—пјҲж—ҘдёҖдәҢдёүеӣӣдә”е…ӯпјү---- */
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-dow-c{display:flex;align-items:center;justify-content:center;color:var(--faint);font-weight:600;}
.cal-sz-m .cal-dow-c{height:24px;font-size:var(--fs-h12);}
.cal-sz-s .cal-dow-c{height:20px;font-size:var(--fs-h12);}

/* ---- 6Г—7 ж—Ҙж јпјҲcolumn-gap=0 и®“ range йҖЈзәҢеё¶дёҚж–·й–Ӣпјү---- */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:2px;}
/* йҖұж•ёж¬„й–Ӣе•ҹжҷӮе·ҰеҒҙеӨҡдёҖж¬„ */
.cal-has-wk .cal-dow,.cal-has-wk .cal-grid{grid-template-columns:24px repeat(7,1fr);}
.cal-wk,.cal-wk-head{display:flex;align-items:center;justify-content:center;color:var(--faint);
  font-size:var(--fs-h12);font-variant-numeric:tabular-nums;}

/* ---- ж—Ҙж ј ---- */
.cal-day{position:relative;display:flex;align-items:center;justify-content:center;
  border:1px solid transparent;background:transparent;color:var(--ink);cursor:pointer;
  font-family:inherit;font-variant-numeric:tabular-nums;padding:0;
  transition:background .12s,color .12s;}
.cal-sz-m .cal-day{height:34px;font-size:var(--fs-h11);border-radius:var(--r-sm);}
.cal-sz-s .cal-day{height:26px;font-size:var(--fs-h12);border-radius:var(--r-sm);}
/* йқһжң¬жңҲпјҡж·Ў */
.cal-day.is-out{color:var(--faint);}
/* д»Ҡж—Ҙпјҡaccent е…§еңҲжҸҸйӮҠ */
.cal-day.is-today{box-shadow:inset 0 0 0 1.5px var(--accent);color:var(--accent);font-weight:600;}
/* ж»‘йҒҺпјҡзҹ©йҷЈйқңж…ӢжЁЎж“¬ */
.cal-day.is-hover{background:var(--panel-2);}
/* йҒёеҸ–пјҡaccent еҜҰеҝғ */
.cal-day.is-selected{background:var(--accent);color:var(--primary-on);font-weight:600;box-shadow:none;}
/* еҒңз”Ёпјҡж·ЎеҢ–пјӢеҠғжҺүгҖҒдёҚеҸҜй»һ */
.cal-day.is-disabled{color:var(--faint);opacity:.5;cursor:not-allowed;text-decoration:line-through;}
/* жңүдәӢд»¶пјҡдёӢж–№е°Ҹең“й»һпјҲйҒёеҸ–ж—ҘеҸҚзҷҪпјү */
.cal-day.has-event::after{content:'';position:absolute;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;background:var(--c-brand2-500);}
.cal-sz-m .cal-day.has-event::after{bottom:var(--sp-1);}
.cal-sz-s .cal-day.has-event::after{bottom:2px;}

/* ---- range еҚҖй–“пјҡиө·иЁ–еҜҰеҝғгҖҒдёӯй–“ж·Ў accent йҖЈзәҢеё¶ ---- */
.cal-day.is-in-range{background:var(--i-primary-tint);border-radius:0;}
.cal-day.is-range-start,.cal-day.is-range-end{background:var(--accent);color:var(--primary-on);
  font-weight:600;box-shadow:none;}
.cal-sz-m .cal-day.is-range-start{border-radius:var(--r-sm) 0 0 var(--r-sm);}
.cal-sz-m .cal-day.is-range-end{border-radius:0 var(--r-sm) var(--r-sm) 0;}
.cal-sz-s .cal-day.is-range-start{border-radius:var(--r-sm) 0 0 var(--r-sm);}
.cal-sz-s .cal-day.is-range-end{border-radius:0 var(--r-sm) var(--r-sm) 0;}
/* иө·иЁ–еҗҢдёҖеӨ©пјҡжҒўеҫ©е®Ңж•ҙең“и§’ */
.cal-sz-m .cal-day.is-range-start.is-range-end{border-radius:var(--r-sm);}
.cal-sz-s .cal-day.is-range-start.is-range-end{border-radius:var(--r-sm);}

/* LiveпјҸshowcase зңҹеҜҰ hoverпјҲ.live жүҚе•ҹз”ЁпјӣйҒёеҸ–пјҸиө·иЁ–пјҸеҒңз”ЁдёҚеҸҚжҮүпјү */
.cal.live .cal-day:hover:not(:disabled):not(.is-selected):not(.is-range-start):not(.is-range-end){background:var(--panel-2);}

/* ---- еҚҖй–“ж–Үеӯ— footпјҲrange з”Ёпјү---- */
.cal-foot{border-top:1px solid var(--line);padding-top:var(--sp-3);margin-top:2px;font-size:var(--fs-h12);color:var(--muted);}
.cal-foot b{color:var(--accent);font-variant-numeric:tabular-nums;font-weight:600;}

/* ---- time жҷӮй–“жё…е–® ---- */

.cal-v-time.cal-sz-s{width:170px;}
.cal-time-head{display:flex;align-items:center;gap:var(--sp-2);color:var(--muted);font-weight:600;padding:2px 2px var(--sp-1);}
.cal-sz-m .cal-time-head{font-size:var(--fs-h11);}
.cal-sz-s .cal-time-head{font-size:var(--fs-h12);}
.cal-time-ic{display:inline-flex;color:var(--faint);}
.cal-time-ic svg{width:14px;height:14px;}
.cal-time-list{display:flex;flex-direction:column;gap:2px;overflow-y:auto;padding-right:2px;}

.cal-sz-s .cal-time-list{max-height:186px;}
.cal-time-item{display:flex;align-items:center;justify-content:center;flex:0 0 auto;

.cal-sz-m .cal-time-item{height:32px;font-size:var(--fs-h11);border-radius:var(--r-sm);}

.cal-time-item.is-hover{background:var(--panel-2);}
.cal-time-item.is-selected{background:var(--accent);color:var(--primary-on);font-weight:600;}

/* ---- ж—Ҙж јзӢҖж…ӢдёҖиҰҪпјҲиЈёж јпјҡжӢҝжҺүе®№еҷЁеӨ–жЎҶеҸӘз•ҷе–®дёҖж—Ҙж јпјү---- */
.cal-staterow{display:flex;flex-wrap:wrap;gap:var(--sp-5);}

/* ---- showcaseпјҸLive иҲһеҸ° ---- */
.cal-show{display:flex;flex-wrap:wrap;gap:var(--sp-6);align-items:flex-start;}
.cal-live-stage{display:flex;justify-content:flex-start;}
  /* ===== Logo е“ҒзүҢиіҮз”ўй Ғ ===== */

  .logo-slots{display:flex;gap:var(--sp-6);flex-wrap:wrap;margin:var(--sp-5) 0;}
  .logo-slot{flex:1 1 280px;min-width:260px;display:flex;flex-direction:column;gap:var(--sp-3);padding:var(--sp-5);background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);}

  /* ===== Design Guideline й Ғ ===== */

  .dg-sechead{display:flex;flex-direction:column;gap:var(--sp-1);padding-bottom:var(--sp-2);border-bottom:2px solid var(--ink);}  /* е°ҚйҪҠ Design Token ж®өжЁҷйЎҢжЁЈејҸпјҲеүҜжЁҷж”ҫдёӢж–№пјү*/

  .dg-secdesc{margin:0;font-size:var(--fs-h11);color:var(--muted);}
  .dg-secline{display:none;}  /* еә•з·ҡж”№з”ұ .dg-sechead зҡ„ border-bottom жҸҗдҫӣпјҲе°ҚйҪҠ Token ж®өпјү*/
  /* е“ҒзүҢ */

  .dgc-item.dgc-off{opacity:.3;filter:grayscale(.5);}  /* token й ҒеҒңз”Ёзҡ„иүІиҷҹ вҶ’ guideline и®Ҡж·ә */
  @media(max-width:767px){  /* жүӢж©ҹпјҡиүІзҘЁж”№дёҖеҲ—еӣӣзӯүеҲҶпјҲgridпјүпјҢиүІеЎҠзӯүжҜ”зё®ж”ҫеЎ«ж»ҝж ј */
    .dgc-row{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp-3);}

  /* еӯ—й«”пјҲJoiiNi еҜ«жі•пјү*/

  .dgt-note{display:inline-block;width:max-content;padding:6px 12px;border-radius:var(--r-sm);background:var(--i-primary-tint);color:var(--accent);font-size:var(--fs-h11);font-weight:600;}
  .dgt-ctl{display:flex;gap:var(--sp-4);flex-wrap:wrap;margin:var(--sp-2) 0 var(--sp-3);}
  .dgt-tabs{display:inline-flex;gap:2px;background:var(--panel-2);border:1px solid var(--line-strong);border-radius:var(--r-sm);padding:3px;}
  .dgt-tab{padding:var(--sp-2) var(--sp-4);border:0;background:transparent;border-radius:var(--r-sm);font-family:var(--font-mono);font-size:var(--fs-h11);color:var(--muted);cursor:pointer;white-space:nowrap;transition:.12s;}

  .nav-guide-m{display:none;}                                         /* дёҠжүӢжҢҮеҚ—йҒёе–®й …пјҡжЎҢж©ҹеңЁ topbarпјҢйҖҷиЈЎйҡұи—Ҹ */
  @media(max-width:767px){.nav-guide-m{display:flex;}}               /* жүӢж©ҹ topbar ж”¶иө·еҫҢпјҢж”№з”ұйҒёе–®й Ӯз«ҜйҖІе…ҘдёҠжүӢжҢҮеҚ— */
  /* йҒёе–®еә•йғЁпјҡзүҲжң¬иҷҹпјӢжҜҚе…ғд»¶еә«иӘӘжҳҺпјҲжүӢж©ҹ topbar badge ж”¶иө·еҫҢж”№еңЁжӯӨйЎҜзӨәпјӣйҮҳеңЁйҒёе–®еә•йғЁпјү */
  .sb-foot{display:none;padding:var(--sp-4) var(--sp-2) var(--sp-2);border-top:1px solid var(--line);}
  @media(max-width:767px){.sidebar{display:flex;flex-direction:column;} .sb-foot{display:block;margin-top:auto;}}
  /* йҒёе–®еә•йғЁзҡ„гҖҢиғҢжҷҜжјёеұӨ еӢ•ж…Ӣ/йқңж…ӢгҖҚtoggleпјҡж°ёйҒ йЎҜзӨәпјҢжЎҢж©ҹ/жүӢж©ҹйғҪеңЁпјҢдҪҚж–ј sb-foot д№ӢдёҠ */
  .sb-shader{display:block;margin:auto var(--sp-1) var(--sp-4);padding-top:var(--sp-3);border-top:1px solid var(--line);}   /* margin-top:auto йҮҳеҒҙж¬„еә•йғЁпјҲжЎҢж©ҹ/жүӢж©ҹзҡҶжҳҜпјүпјӣbottom sp-4пјқдёӢж–№з•ҷзҷҪпјҲжүӢж©ҹиҲҮ footer й–“гҖҒжЎҢж©ҹиҲҮйӮҠз·Јй–“пјү*/
  .sb-shader-lb{display:block;font-family:var(--font-mono);font-size:var(--fs-h12);color:var(--muted);margin-bottom:var(--sp-2);padding-left:var(--sp-1);}

  @media(max-width:767px){.sidebar:has(.sb-shader) .sb-foot{margin-top:0;}}   /* жүӢж©ҹпјҡfooter з·ҠиІј toggle дёӢж–№пјҲsb-shader е·І margin-top:auto еҗёиө°еү©йӨҳз©әй–“пјүпјӣtoggle зҡ„ margin-bottom жҸҗдҫӣе…©иҖ…й–“и·қ */
  .sb-foot-name{display:block;font-size:var(--fs-h11);font-weight:600;color:var(--ink);word-break:break-all;}

  .theme-toggle-left{margin-left:var(--sp-4);}

  .ds-ovl{position:fixed;inset:0;background:color-mix(in srgb,var(--ink) 45%,transparent);display:flex;align-items:center;justify-content:center;z-index:9999;padding:var(--sp-5);}

  /* в”Җв”Җ дёҠжүӢжҢҮеҚ— ж•ҷеӯёй ҒпјҲBatch Bпјүв”Җв”Җ */
  .gd-entry{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:var(--fs-h11);color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:var(--r-sm);padding:6px 10px;cursor:pointer;margin-left:var(--sp-4);transition:color .15s,border-color .15s;}

  @media(max-width:767px){#guideBtn,.gd-entry{display:none;} .brand-title,.brand .divider{display:none;}}  /* жүӢж©ҹпјҡйҡұи—ҸдёҠжүӢжҢҮеҚ—пјӢе“ҒзүҢж–Үеӯ—пјҢеҸӘз•ҷ GOONS еӯ—жЁҷпјҢйҮӢеҮә topbar з©әй–“йҒҝе…Қ logo жәўеҮәз–Ҡеӯ— */
  /* дёҠжүӢжҢҮеҚ—йҰ–еұҸ heroпјҡеҮәиЎҖеҲ°е…§е®№еҚҖж»ҝеҜ¬пјҲиІ  marginпјқеҗ„ж–·й»һ container-padпјүпјҢжЁҷйЎҢ+иӘӘжҳҺзҪ®дёӯпјҢmockup зҪ®дёӯдёӢж–№
     жјёеұӨпјқйӮ„еҺҹ agentixx.framer.website mesh дҪҶгҖҢдёҠдёӢйЎӣеҖ’гҖҚпјҡжҡ–иүІз§»еҲ°й ӮгҖҒеә•йғЁжІүеӣһ #fff/panelпјҢ
     и®“ hero еә•з·Јз„Ўзё«жҺҘдёӢдёҖж®өпјҲеҺ»ж–·е·®пјүгҖӮж·ұиүІеә•иүІйҷҚ alphaгҖҒжҠҠеә•йғЁж·ұиүІзё®е°ҸиІјй ӮдҝқжЁҷйЎҢеҸҜи®Җ */
  .gd-hero{position:relative;overflow:hidden;isolation:isolate;
    margin:calc(-1*var(--sp-6)) calc(-1*var(--container-pad)) var(--sp-7);
    padding:clamp(44px,6vw,84px) var(--container-pad) clamp(64px,7vw,104px);}

  /* mockup й…ҚиүІз”ұ toggle зӣҙжҺҘжҺ§еҲ¶ж·ұ/ж·әпјҲдёҚеҶҚи·ҹйҡЁй Ғйқўдё»йЎҢпјүпјҡй җиЁӯпјқж·ұиүІпјҲиҰӢдёҠж–№ .gd-devices base зҡ„ gh и®Ҡж•ёпјүпјӣ.gd-dev-lightпјқж·әиүІ */
  .gd-devices.gd-dev-light{--ghbg:#fff;--ghsub:#f6f8fa;--ghline:#d1d9e0;--ghline2:#d1d9e0;--ghtext:#1f2328;--ghmut:#59636e;--ghfaint:#818b98;--ghlink:#0969da;--ghgreen:#1f883d;--ghfolder:#0969da;}
  .gd-mac{position:relative;display:flex;flex-direction:column;align-items:center;}
  .gd-iphone{display:none;flex-direction:column;align-items:center;}   /* жЎҢж©ҹйҡұи—ҸпјӣжүӢж©ҹйЎҜзӨә */
  @media(max-width:767px){.gd-mac{display:none;} .gd-iphone{display:flex;}}
  .gd-mac-screen{position:relative;width:100%;max-width:600px;box-sizing:border-box;background:#17171a;border-radius:11px 11px 4px 4px;padding:12px;box-shadow:0 16px 44px color-mix(in srgb,var(--ink) 24%,transparent);}
  .gd-mac-inner{position:relative;background:var(--ghbg);border-radius:4px;overflow:hidden;border:1px solid #000;max-height:430px;}  /* йҷҗй«ҳпјқзҖҸиҰҪеҷЁиҰ–зӘ—зӨәж„ҸпјҢе…§е®№и¶…еҮәиЈҒеҲҮпјҲйЎҜзӨәй ҒйқўдёҠз·Јпјү*/
  .gd-mac-base{width:min(100%,690px);height:13px;background:linear-gradient(180deg,#cbced3,#a6aab1);border-radius:0 0 12px 12px;position:relative;box-shadow:0 3px 6px color-mix(in srgb,var(--ink) 20%,transparent);}
  .gd-mac-base::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:90px;height:6px;background:#8d919a;border-radius:0 0 7px 7px;}
  /* ж·ұиүІжЁЎејҸпјҡеӨ–еұӨеҶҚз–ҠдёҖеңҲдҪҺжЁЎзіҠйӮҠз·Је…үпјҲ1px дә®йӮҠпјӢ14px дә®жҡҲпјүпјҢйҒҝе…Қйӣ»и…ҰиҲҮж·ұеә•иһҚеҗҲ */
  @media(prefers-color-scheme:dark){.gd-mac-screen{box-shadow:0 18px 44px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.10),0 0 14px 1px rgba(255,255,255,.13);}}
  :root[data-theme="dark"] .gd-mac-screen{box-shadow:0 18px 44px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.10),0 0 14px 1px rgba(255,255,255,.13);}
  :root[data-theme="light"] .gd-mac-screen{box-shadow:0 16px 44px color-mix(in srgb,var(--ink) 24%,transparent);}
  /* hoverпјҡиһўе№•и®Ҡжҡ— пјӢ дёӯеӨ® CTA ж·Ўе…Ҙ */
  .gd-mac-dim{position:absolute;inset:0;background:rgba(8,10,14,.55);opacity:0;transition:opacity .25s ease;pointer-events:none;z-index:5;}
  .gd-mac-cta{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.96);opacity:0;transition:opacity .25s ease,transform .25s ease;pointer-events:none;z-index:6;}
  .gd-mac:hover .gd-mac-dim{opacity:1;}
  .gd-mac:hover .gd-mac-cta{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto;}
  /* в”Җв”Җ иұҗеҜҢзүҲ GitHub repo й ҒпјҲеӯ—зҙҡж•ҙй«”еҶҚзё®дёҖзҙҡгҖҒиІјиҝ‘зңҹеҜҰ GitHubпјүв”Җв”Җ */
  .gd-gh-bar{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--ghsub);border-bottom:1px solid var(--ghline);}
  .gd-gh-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;}
  .gd-gh-url{margin-left:7px;flex:1;min-width:0;display:flex;align-items:center;gap:5px;background:var(--ghbg);border:1px solid var(--ghline);border-radius:var(--r-pill);padding:2px 10px;font-family:var(--font-mono);font-size:9px;color:var(--ghmut);white-space:nowrap;overflow:hidden;}
  .gd-gh-lock{font-size:8px;opacity:.7;}
  .gd-gh-topnav{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 10px;background:var(--ghsub);border-bottom:1px solid var(--ghline);}
  .gd-gh-tn-l{display:flex;align-items:center;gap:7px;min-width:0;}
  .gd-gh-burger{color:var(--ghmut);font-size:11px;}
  .gd-gh-mark{display:inline-flex;color:var(--ghtext);flex:0 0 auto;} .gd-gh-mark svg{width:16px;height:16px;display:block;}
  .gd-gh-crumb{font-size:10px;color:var(--ghtext);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;} .gd-gh-crumb b{font-weight:600;}
  .gd-gh-tn-r{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
  .gd-gh-searchbox{font-size:8.5px;color:var(--ghmut);border:1px solid var(--ghline2);border-radius:var(--r-sm);padding:2px 7px;white-space:nowrap;}
  .gd-gh-searchbox kbd{border:1px solid var(--ghline2);border-radius:3px;padding:0 3px;font-family:var(--font-mono);}

  function mkBtn(o){
    const {variant,intent,size='m',label=true,lead=false,trail=false,iconOnly=false,isLive=false}=o;
    let state=o.state||'default'; const disabled=o.disabled||state==='disabled';
    if(disabled && state==='default') state='disabled';
    const b=document.createElement('button');
    b.className=`btn v-${variant} i-${intent} sz-${size} st-${state}${iconOnly?' icon-only':''}${isLive?' live':''}`;
    if(disabled) b.disabled=true;
    let html='';

    else{ if(lead)html+=ICON_PENCIL; if(label)html+=`<span>${LABEL[intent]}</span>`; if(trail)html+=ICON_ARROW; }
    b.innerHTML=html; return b;
  }

  /* ---- е…ұз”ЁпјҡеҜҰйҡӣдә’еӢ• Live жҺ§еҲ¶йқўжқҝпјҲsegmented жҺ§еҲ¶ + boolean еӢҫйҒё + еҚіжҷӮй җиҰҪпјү---- */
  function mountLive(host,cfg){
    const state=Object.assign({},cfg.initial||{});
    // зҜ©йҒёеҷЁйҖЈеӢ•пјҡcfg.gate=е…ғд»¶ id вҶ’ и®Җ DIAL_SPECS[id].axesпјҲе®Ңж•ҙи»ёеҖјпјүпјӢ CHOICE[id].activeпјҲзӣ®еүҚеӢҫйҒёпјүпјҢ
    // и®“гҖҢи®Ҡж•ёзҜ©йҒёеҷЁгҖҚжІ’еӢҫзҡ„и»ёеҖјпјҢеңЁдёӢж–№еҜҰйҡӣж“ҚдҪң Live зҡ„е°ҚжҮү seg йҒёй …дёҖиө·иў« disableгҖӮ
    const gid=cfg.gate; const gAxes=(gid&&DIAL_SPECS[gid])?DIAL_SPECS[gid].axes:null; const gActive=(gid&&CHOICE[gid])?CHOICE[gid].active:null;
    const wrap=ce('div','livewrap');
    const ctlRow=ce('div','ctl-row');
    const stage=ce('div','live-stage');
    function rerender(){stage.innerHTML='';stage.appendChild(cfg.render(state));}
    const segRefs=[]; // дҫӣзҜ©йҒёеҷЁйҖЈеӢ•жҷӮжӣҙж–°еҗ„ seg йҒёй … disabled
    (cfg.segs||[]).forEach(s=>{
      const c=ce('div','ctl');c.innerHTML=`<span class="lab">${s.label}</span>`;
      const seg=ce('div','seg');const btns=[];
      s.options.forEach((o,i)=>{const b=document.createElement('button');b.textContent=s.labels?s.labels[i]:o;b.dataset.val=o;
        b.setAttribute('aria-pressed',state[s.key]===o);
        b.onclick=()=>{if(b.disabled)return;state[s.key]=o;[...seg.children].forEach(x=>x.setAttribute('aria-pressed','false'));b.setAttribute('aria-pressed','true');rerender();};
        seg.appendChild(b);btns.push(b);});
      c.appendChild(seg);ctlRow.appendChild(c);segRefs.push({key:s.key,btns});});
    if((cfg.bools||[]).length){
      const c=ce('div','ctl');c.innerHTML=`<span class="lab">${cfg.boolLabel||'Content'}</span>`;
      const checks=ce('div','checks');
      cfg.bools.forEach(bo=>{const l=ce('label','chk');const i=document.createElement('input');i.type='checkbox';i.checked=!!state[bo.key];
        i.onchange=()=>{state[bo.key]=i.checked;rerender();};l.append(i,document.createTextNode(bo.label));checks.appendChild(l);});
      c.appendChild(checks);ctlRow.appendChild(c);}
    if(ctlRow.children.length)wrap.appendChild(ctlRow);
    wrap.appendChild(stage);
    if(cfg.free){if(cfg.note){const n=ce('p','live-note');n.innerHTML=cfg.note;wrap.appendChild(n);}
      const f=ce('div','live-free');cfg.free().forEach(nd=>f.appendChild(nd));wrap.appendChild(f);}
    host.appendChild(wrap);
    // дҫқзҜ©йҒёеҷЁ active еҒңз”ЁжңӘеӢҫи»ёеҖјйҒёй …пјӣиӢҘзӣ®еүҚйҒёдёӯзҡ„еҖјиў«еҒңз”ЁпјҢж”№и·іеҲ°з¬¬дёҖеҖӢд»Қе•ҹз”ЁеҖј
    function syncActive(){ if(!gActive){rerender();return;}
      segRefs.forEach(({key,btns})=>{ const set=gActive[key], full=gAxes&&gAxes[key]; if(!set||!full)return;
        let cur=state[key];
        if(full.includes(cur)&&!set.has(cur)){const first=btns.find(b=>full.includes(b.dataset.val)&&set.has(b.dataset.val));if(first)cur=first.dataset.val;}
        state[key]=cur;
        btns.forEach(b=>{const v=b.dataset.val, gated=full.includes(v), on=!gated||set.has(v);
          b.disabled=!on; b.classList.toggle('is-off',!on); b.setAttribute('aria-pressed',String(v===cur));});
      });
      rerender();
    }
    if(gActive){ if(!LIVE_REFRESH.has(gActive))LIVE_REFRESH.set(gActive,[]); LIVE_REFRESH.get(gActive).push(syncActive); }
    syncActive();
  }

  /* ===== еҗ„е…ғд»¶гҖҢеҜҰйҡӣж“ҚдҪң LiveгҖҚе…ұз”Ё registry ===== е…ғд»¶й ҒиҲҮгҖҢиӨҮйӣңеәҰзўәиӘҚгҖҚй Ғе…ұз”ЁеҗҢдёҖд»ҪпјҢж”№дёҖиҷ•е…©йӮҠеҗҢжӯҘ */
  const LIVE={};
  const LIVE_REFRESH=new Map(); // зҜ©йҒёеҷЁ active зү©д»¶ вҶ’ и©Ій Ғ Live syncActive fnsпјҲжҸӣй Ғ clearпјү
  LIVE.button=(host)=>mountLive(host,{

    render:st=>mkBtn({variant:st.variant,intent:st.intent,size:st.size,lead:st.lead,trail:st.trail,iconOnly:st.iconOnly,disabled:st.disabled,isLive:true}),

  function ddEl(variant,state,multi){const f=ce('div',`field dd v-${variant}${multi?' multi':''} st-${state}`);
    const b=ce('span','dd-body');
    if(state==='selected'){

    f.append(b,c);return f;}
  /* еҸҜдә’еӢ•дёӢжӢүпјҡopts={searchable, multi} вҖ”вҖ” е–®йҒёй»һдәҶй—ңй–үгҖҒеӨҡйҒёеӢҫйҒё chip дёҚй—ң */
  function ddField(variant,opts){opts=opts||{};
    const RAW=opts.options||['еҸ°еҢ—еёӮ','еҸ°дёӯеёӮ','й«ҳйӣ„еёӮ','иҠұи“®зёЈ'];               // еҸҜеӮі options=[{value,label}] жҲ–еӯ—дёІйҷЈеҲ—пјӣдёҚеӮівҶ’жІҝз”ЁеҺҹзӨәзҜ„йҒёй …пјҲеҗ‘еҫҢзӣёе®№пјү
    const OPTS=RAW.map(o=>typeof o==='string'?{value:o,label:o}:o);
    const selected=new Set(); if(opts.value!=null)selected.add(opts.value);       // еҸҜеё¶еҲқе§ӢеҖј
    const labelOf=v=>{const f=OPTS.find(o=>o.value===v);return f?f.label:v;};
    const wrap=ce('div','ddwrap');
    const trg=ce('div',`field dd v-${variant}${opts.multi?' multi':''}`);
    const bodyEl=ce('span','dd-body');
    const caret=ce('span','ddcaret');caret.innerHTML=ICON_CARET;
    trg.append(bodyEl,caret);
    const menu=ce('div','ddmenu');menu.style.display='none';
    let searchInput;
    if(opts.searchable){searchInput=document.createElement('input');searchInput.className='ddsearch';searchInput.placeholder='жҗңе°ӢвҖҰ';
      searchInput.oninput=()=>{const q=searchInput.value;[...menu.querySelectorAll('.ddopt')].forEach(el=>{el.style.display=el.textContent.includes(q)?'flex':'none';});};
      menu.appendChild(searchInput);}
    const optEls={};
    OPTS.forEach(o=>{const it=ce('div','ddopt');
      if(opts.multi){const box=ce('span','ddcheck');const lab=document.createElement('span');lab.textContent=o.label;it.append(box,lab);}
      else it.textContent=o.label;
      it.onclick=()=>{ if(opts.multi){selected.has(o.value)?selected.delete(o.value):selected.add(o.value);syncMenu();renderTrg();opts.onChange&&opts.onChange([...selected]);}
        else{selected.clear();selected.add(o.value);renderTrg();toggle(false);opts.onChange&&opts.onChange(o.value);} };
      optEls[o.value]=it;menu.appendChild(it);});
    function renderTrg(){bodyEl.innerHTML='';
      if(selected.size===0){const p=ce('span','ph');p.textContent=opts.placeholder||'и«ӢйҒёж“ҮвҖҰ';bodyEl.appendChild(p);return;}
      if(opts.multi){[...selected].forEach(v=>{const chip=ce('span','ddchip');chip.innerHTML=`<span>${labelOf(v)}</span>`;const x=ce('span','x');x.innerHTML=ICON_CLOSE;
        x.onclick=e=>{e.stopPropagation();selected.delete(v);syncMenu();renderTrg();opts.onChange&&opts.onChange([...selected]);};chip.appendChild(x);bodyEl.appendChild(chip);});}
      else{const val=ce('span','val');val.textContent=labelOf([...selected][0]);bodyEl.appendChild(val);}}
    function syncMenu(){if(!opts.multi)return;OPTS.forEach(o=>{optEls[o.value].classList.toggle('on',selected.has(o.value));optEls[o.value].querySelector('.ddcheck').innerHTML=selected.has(o.value)?ICON_CHECK:'';});}
    let open=false;
    function toggle(v){open=v;menu.style.display=v?'block':'none';trg.classList.toggle('st-open',v);caret.classList.toggle('up',v);if(v&&searchInput)searchInput.focus();}
    trg.onclick=()=>toggle(!open);
    renderTrg();syncMenu();wrap.append(trg,menu);return wrap;}

  const MN_ICONS=[ICON_HOUSE,ICON_LIST,ICON_GEAR,ICON_PENCIL];
  function mnItem(state,size,o){
    o=o||{};
    const it=ce('div','mn-item mn-item--'+size);
    if(state==='hover')it.classList.add('mn-item--hover');
    if(state==='active')it.classList.add('mn-item--active');

    const lb=ce('span','mn-label');lb.textContent=o.label||'йҒёе–®й …';it.appendChild(lb);

  function mnBar(variant,size,o){
    o=o||{};
    const items=o.items||[];
    const bar=ce('div','mn-bar mn-bar--'+variant);
    bar.setAttribute('role','navigation');
    let cur=(o.activeIndex==null?0:o.activeIndex);
    const nodes=[];
    items.forEach((label,i)=>{
      const it=mnItem(i===cur?'active':'default',size,{label:label,icon:o.icon?MN_ICONS[i%MN_ICONS.length]:false});
      if(i===cur)it.setAttribute('aria-current','page');
      if(o.clickable!==false){it.onclick=()=>{cur=i;nodes.forEach((n,j)=>{const on=(j===i);n.classList.toggle('mn-item--active',on);if(on)n.setAttribute('aria-current','page');else n.removeAttribute('aria-current');});};}
      nodes.push(it);bar.appendChild(it);
    });
    return bar;
  }

  const pgArrowL='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M165.66,202.34a8,8,0,0,1-11.32,11.32l-80-80a8,8,0,0,1,0-11.32l80-80a8,8,0,0,1,11.32,11.32L91.31,128Z"/></svg>';

  function pgBar(variant,size,o){
    const opt=o||{},total=opt.total,current=opt.current;
    const bar=ce('div','pg-bar pg-bar-'+size);
    if(variant==='prev-next'){
      const prev=pgBtn(current<=1?'disabled':'default',size,{arrow:'left'});
      const info=ce('span','pg-info');info.textContent='з¬¬ '+current+' / '+total+' й Ғ';
      const next=pgBtn(current>=total?'disabled':'default',size,{arrow:'right'});
      if(opt.onNav){if(current>1)prev.onclick=()=>opt.onNav(current-1);if(current<total)next.onclick=()=>opt.onNav(current+1);}
      bar.append(prev,info,next);return bar;
    }
    // numberedпјҡвҖ№ 1 вҖҰ (c-1)[c](c+1) вҖҰ total вҖә
    const prev=pgBtn(current<=1?'disabled':'default',size,{arrow:'left'});
    if(opt.onNav&&current>1)prev.onclick=()=>opt.onNav(current-1);
    bar.appendChild(prev);
    const set=[]; [1,total,current-1,current,current+1].forEach(n=>{if(n>=1&&n<=total&&set.indexOf(n)<0)set.push(n);});
    set.sort((a,b)=>a-b);
    let last=0;
    set.forEach(n=>{
      if(last&&n-last>1){const e=ce('span','pg-ellip');e.textContent='вҖҰ';bar.appendChild(e);}
      const nb=pgBtn(n===current?'active':'default',size,{label:n,current:n===current});
      if(opt.onNav&&n!==current)nb.onclick=()=>opt.onNav(n);
      bar.appendChild(nb);last=n;
    });
    const next=pgBtn(current>=total?'disabled':'default',size,{arrow:'right'});
    if(opt.onNav&&current<total)next.onclick=()=>opt.onNav(current+1);
    bar.appendChild(next);return bar;
  }

    return mountLive(host,{gate:'pagination',
      initial:{variant:'numbered',size:'m'},
      segs:[{key:'variant',label:'Variant',options:['numbered','prev-next'],labels:['ж•ёеӯ—','еүҚеҫҢ']},
            {key:'size',label:'Size',options:['s','m','l']}],

/* ---- PRICE еғ№ж јпјҲbuilders жҸҗеҚҮй ӮеұӨпјҢй ҒйқўиҲҮ summary Live е…ұз”Ёпјү---- */
  function prEl(variant,size){
    const el=ce('span',`pr-price pr-sz-${size} pr-v-${variant}`);
    if(variant==='normal'){
      el.innerHTML='<span class="pr-cur">NT$</span><span class="pr-amt">1,280</span>';
    }else if(variant==='discount'){
      el.setAttribute('aria-label','еҺҹеғ№ NT$ 1,680пјҢе„Әжғ еғ№ NT$ 1,280');
      el.innerHTML='<s class="pr-orig" aria-hidden="true">NT$ 1,680</s><span class="pr-now"><span class="pr-cur">NT$</span><span class="pr-amt">1,280</span></span>';
    }else if(variant==='sale'){
      el.innerHTML='<span class="pr-cur">NT$</span><span class="pr-amt">990</span><span class="tg v-solid c-round i-danger st-default"><span>SALE</span></span>';
    }else if(variant==='free'){
      el.setAttribute('aria-label','е…ҚиІ»');
      el.innerHTML='<s class="pr-orig" aria-hidden="true">NT$ 480</s><span class="pr-free">е…ҚиІ»</span>';
    }
    return el;
  }
  /* metric ж•ёеҖјпјҲdashboard KPIпјүпјҡеҸҜзө„еҗҲејҸвҖ”вҖ”еҹәеә•еӨ§ж•ёеӯ—пјҢеҸҰеҸҜеҗ„иҮӘй–Ӣй—ң жЁҷйЎҢпјҸе–®дҪҚпјҸи¶ЁеӢў
     o.title=true дёҠж–№йЎҜзӨәжЁҷйЎҢгҖҒo.unit=true ж•ёеӯ—еҫҢжҺҘе–®дҪҚгҖҒo.trend='up'|'down' йЎҜзӨәи¶ЁеӢў delta
     пјҲи¶ЁеӢў up з¶Ғ --ok жӯЈеҗ‘з¶ гҖҒdown з¶Ғ --i-dangerпјҢicon йҮҚз”Ё IC_TRENDINGпјӣдёүиҖ…еҪјжӯӨжӯЈдәӨгҖҒеҸҜд»»ж„Ҹзө„еҗҲпјү */
  function prMetricEl(size,o){o=o||{};
    const el=ce('span','pr-metric pr-m-sz-'+size);
    if(o.title){const t=ce('span','pr-mlabel');t.textContent='жң¬жңҲзҮҹж”¶';el.appendChild(t);}
    const row=ce('span','pr-numrow');
    const num=ce('span','pr-num');num.textContent='8,542';row.appendChild(num);
    if(o.unit){const u=ce('span','pr-unit');u.textContent='зӯҶ';row.appendChild(u);}
    if(o.trend){const up=o.trend==='up';
      const d=ce('span','pr-delta '+(up?'d-up':'d-down'));d.setAttribute('aria-hidden','true');
      d.innerHTML=IC_TRENDING+'<span>'+(up?'+12.5%':'-3.2%')+'</span>';row.appendChild(d);}
    el.appendChild(row);
    if(o.trend){num.setAttribute('aria-hidden','true'); // a11yпјҡе®№еҷЁе ұи®ҖеҚҮйҷҚиӘһж„Ҹ
      el.setAttribute('aria-label','8,542'+(o.unit?' зӯҶ':'')+'пјҢијғдёҠжңҹ'+(o.trend==='up'?'дёҠеҚҮ 12.5%':'дёӢйҷҚ 3.2%'));}
    return el;
  }
  LIVE.price=(host)=>{
    /* з¬¬дёҖж®өпјҡеғ№ж ј priceпјҲз¶ӯжҢҒеҺҹжЁЈдёҚеӢ•пјү */
    mountLive(host,{gate:'price',
      initial:{variant:'discount',size:'md'},
      segs:[{key:'variant',label:'Variant',options:['normal','discount','sale','free'],labels:['дёҖиҲ¬','жҠҳжүЈ','зү№еғ№','е…ҚиІ»']},

      note:'еғ№ж ј priceпјҡdiscount з”Ё &lt;s&gt; еҢ…еҺҹеғ№пјҲиһўе№•е ұи®ҖгҖҢеҺҹеғ№ XгҖҒе„Әжғ еғ№ YгҖҚпјүпјӣfree е®№еҷЁеҠ  <code>aria-label=е…ҚиІ»</code>гҖӮ',

    /* з¬¬дәҢж®өпјҡж•ёеҖј metricпјҲdashboard KPIпјүпјҢзҚЁз«ӢжҺ§еҲ¶еҲ—йҒҝе…ҚиҲҮеғ№ж ји»ёдә’зӣёе№Іж“ҫпјӣжЁҷйЎҢпјҸе–®дҪҚпјҸи¶ЁеӢўзҡҶеҸҜеҗ„иҮӘй–Ӣй—ң */
    mountLive(host,{gate:'price',
      initial:{size:'md',trend:'up',showUnit:false,showTitle:false},
      segs:[{key:'size',label:'Size',options:['sm','md','lg']},
            {key:'trend',label:'Trend и¶ЁеӢў',options:['none','up','down'],labels:['з„Ў','дёҠеҚҮ','дёӢйҷҚ']}],
      bools:[{key:'showTitle',label:'жЁҷйЎҢ title'},{key:'showUnit',label:'е–®дҪҚ unit'}],

      note:'ж•ёеҖј metricпјҡеҹәеә•еӨ§ж•ёеӯ—пјҲ<code>tabular-nums</code>пјүпјӣ<b>жЁҷйЎҢпјҸе–®дҪҚпјҸи¶ЁеӢў</b>еҸҜеҗ„иҮӘй–Ӣй—ңзө„еҗҲвҖ”вҖ”и¶ЁеӢўйҒёгҖҢз„ЎгҖҚеҚійҡұи—ҸпјҢдёҠеҚҮз¶Ғ <code>--ok</code>гҖҒдёӢйҷҚз¶Ғ <code>--i-danger</code>пјҲicon йҮҚз”Ё IC_TRENDINGпјүгҖӮ',
      free:()=>[prMetricEl('md',{}),prMetricEl('md',{trend:'up'}),prMetricEl('md',{unit:true}),prMetricEl('md',{title:true}),prMetricEl('md',{title:true,unit:true,trend:'up'})]
    });

  function buildPrice(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component В· Number',title:'Number ж•ёеҖј',

      specRows:[['axes','<code>kind(price | metric) Г— variant Г— size</code>'],['formula','<code>(4 + 4) Г— 3 = 24</code>'],['token-policy','<code>semantic.text.* / semantic.feedback.* / --ok / --i-danger</code>'],['a11y','<code>&lt;s&gt; еҺҹеғ№ В· aria-label В· delta е ұи®ҖеҚҮйҷҚ</code>']]});
    const VZ={normal:['дёҖиҲ¬','normal'],discount:['жҠҳжүЈ','discount'],sale:['зү№еғ№','sale'],free:['е…ҚиІ»','free']};

    p=panelsIn(sec);renderM();
    const cs=section(body,'е•Ҷе“Ғжғ…еўғзӨәж„Ҹ','жҠҠеғ№ж јж”ҫйҖІе•Ҷе“ҒеҚЎзүҮејҸжҺ’зүҲпјҲзҙ”зӨәж„ҸпјҢжңӘж–°е»ә card е…ғд»¶пјүпјҢе°Қз…§еҺҹеғ№пјҸе„Әжғ еғ№пјҸзңҒеӨҡе°‘зҡ„иӘһж„Ҹе‘ҲзҸҫгҖӮ');

    const ms=section(body,'ж•ёеҖј Metric е„ҖиЎЁж•ёеӯ—','dashboard KPI ж•ёеӯ—е‘ҲзҸҫпјҡзҙ”ж•ёеӯ—пјҸпјӢи¶ЁеӢўпјҸпјӢе–®дҪҚпјҸпјӢжЁҷйЎҢпјҲдёӢж–№еҗ„зӮәе–®дёҖж¬„дҪҚзӨәж„ҸпјҢеҜҰйҡӣеҸҜд»»ж„Ҹзө„еҗҲпјҢиҰӢ Liveпјүпјӣе°әеҜёжІҝз”Ё smпјҸmdпјҸlgпјҢж•ёеӯ—дёҖеҫӢ tabular-nums е°ҚйҪҠгҖӮи¶ЁеӢўж јдёҰеҲ—еұ•зӨәдёҠеҚҮпјҲ--ok жӯЈеҗ‘з¶ пјүпјҸдёӢйҷҚпјҲ--i-dangerпјүе…©ж…ӢгҖӮ');

        {key:'eyebrow',label:'eyebrow е°ҸжЁҷ'},
        {key:'subtitle',label:'subtitle еүҜжЁҷ'},
        {key:'action',label:'action еҸіеҒҙеӢ•дҪң'},
        {key:'count',label:'count иЁҲж•ё badge'},
        {key:'divider',label:'divider еә•йғЁеҲҶйҡ”з·ҡ'},
      ],
      boolLabel:'Content',
      render:st=>{
        const box=ce('div','sch-live-box');
        box.appendChild(schHead({
          align:st.align,size:st.size,
          eyebrow:st.eyebrow?'tag':false,eyebrowText:'жң¬жңҲз„Ұй»һ',
          title:'жң¬жңҲиЁӮе–®зёҪиҰҪ',subText:'2026 е№ҙ 7 жңҲ В· е…ұеҗҢжӯҘ 3 еҖӢз®ЎйҒ“зҡ„еҚіжҷӮиіҮж–ҷ',
          sub:st.subtitle?undefined:false,
          action:st.action,count:st.count?'128':false,
          divider:st.divider
        }));
        return box;
      },
      note:'зҪ®дёӯпјҲcenterпјүжҷӮеҸіеҒҙеӢ•дҪңдёҚйЎҜзӨәгҖҒж•ҙй«”зҪ®дёӯжҺ’еҲ—пјӣеӢҫ divider жңғеңЁеә•йғЁеҠ дёҖжўқеҲҶйҡ”з·ҡжЁҷзӨәеҚҖж®өзөҗжқҹгҖӮ'
    });
  }

/* list icons */
/* ---- list е®¶ж—ҸиҮӘиЁӮ icon ---- */
  /* caret-rightпјҲPhosphor regularпјүпјҡеҲ—е°ҫжҢҮеҗ‘з®ӯй ӯпјҢжҜ”дёӢжӢү caret жӣҙз¬ҰеҗҲгҖҢеҸҜйҖІе…ҘгҖҚиӘһж„Ҹ */
  const LST_IC_CHEVRON='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M181.66,133.66l-80,80a8,8,0,0,1-11.32-11.32L164.69,128,90.34,53.66a8,8,0,0,1,11.32-11.32l80,80A8,8,0,0,1,181.66,133.66Z"/></svg>';

/* list build */
/* ==================== list еҲ—иЎЁпјҲиіҮж–ҷеҲ— пјӢ йҒёй …еҚЎе®Ңж•ҙй«”зі»пјү ==================== */
  /* leading icon жұ пјҲзӨәж„Ҹз”ЁпјҢйҮҚз”Ёж—ўжңү Phosphor constпјү */
  const LST_LEAD_ICONS=[ICON_HOUSE,ICON_LIST,ICON_GEAR];

  /* зӢҖж…Ӣ вҶ’ йқңж…Ӣ class еӯ—дёІпјҲзҹ©йҷЈеұ•зӨәз”Ёпјү */
  function lstStCls(state){return state==='hover'?' is-hover':state==='selected'?' is-selected':state==='disabled'?' is-disabled':'';}
  /* еҲ—е…§еӢҫйҒёжЎҶпјҲйҮҚз”Ёж—ўжңү .cbx еҺҹеӯҗпјү */
  function lstCbx(checked,state){
    const cb=ce('div','cbx sz-s'+(checked?' st-checked':'')+(state==='disabled'?' st-disabled':''));
    if(checked)cb.innerHTML=ICON_CHECK;
    return cb;
  }

  /* ---- еҹәжң¬еҲ— basicпјҡе·Ұ leadingпјҲcheckboxпјҸicon еҸҜзңҒпјүпјӢ дёӯ title пјӢ еҸі trailing зө„еҗҲ ----
     trailing жЁҷжә–еҢ–пјҡtagпјҲйҮҚз”Ё .tgпјүпјҸinfoпјҲйҮҚз”Ё NT_IC_INFOпјүпјҸmeta ж–Үеӯ—пјҸеӢ•дҪңйҲ•пјҸcaretпјҢеҸҜзө„еҗҲ
     oпјҡ{title,desc,leadIcon,checkbox,checked,tag,info,meta,action,caret} */
  function lstRowBasic(state,o){
    o=o||{};
    const it=ce('div','lst-item'+lstStCls(state));
    if(o.checkbox)it.appendChild(lstCbx(o.checked,state));
    if(o.leadIcon){const ld=ce('span','lst-lead');const ic=ce('span','lst-icon');ic.innerHTML=o.leadIcon;ld.appendChild(ic);it.appendChild(ld);}
    const bd=ce('div','lst-body');
    const tt=ce('div','lst-title');tt.textContent=o.title||'';bd.appendChild(tt);
    if(o.desc){const ds=ce('div','lst-desc');ds.textContent=o.desc;bd.appendChild(ds);}
    it.appendChild(bd);
    const tr=ce('div','lst-trail');let has=false;
    if(o.tag){const t=ce('div','tg v-soft c-round i-brand st-default');t.innerHTML='<span>'+o.tag+'</span>';tr.appendChild(t);has=true;} // йҮҚз”Ё Tag еҺҹеӯҗ
    if(o.info){const ic=ce('span','lst-info');ic.innerHTML=NT_IC_INFO;tr.appendChild(ic);has=true;} // йҮҚз”Ё notification info ең“жЁҷ
    if(o.meta){const m=ce('span','lst-meta');m.textContent=o.meta;tr.appendChild(m);has=true;}
    if(o.amount){const p=ce('span','pr-price pr-sz-sm lst-amount');p.innerHTML='<span class="pr-cur">NT$</span><span class="pr-amt">'+o.amount+'</span>';tr.appendChild(p);has=true;} // йҮҚз”Ё Price еҺҹеӯҗйЎҜзӨәйҮ‘йЎҚ
    if(o.action){const b=ce('button','btn v-text i-primary sz-s');b.innerHTML='<span>'+(typeof o.action==='string'?o.action:'еӢ•дҪң')+'</span>';tr.appendChild(b);has=true;} // ж–Үеӯ—жҢүйҲ•пјҲйҮҚз”Ё Button еҺҹеӯҗпјү
    if(o.caret){const c=ce('span','lst-caret');c.innerHTML=LST_IC_CHEVRON;tr.appendChild(c);has=true;}
    if(o.selCheck){tr.appendChild(lstCbx(true,state));has=true;} // е·ІйҒёжҢҮзӨәпјҡеҸіеҒҙиЈңе·ІеӢҫйҒё checkboxпјҲйқһ checkbox-leading жҷӮпјү
    if(has)it.appendChild(tr);
    return it;
  }

  /* ---- йӣҷж¬„еҲ— two-columnпјҡе·Ұ titleгҖҒеҸі valueпјҲе°ҸжЁҷйЎҢпјүпјӢ caret ---- */
  function lstRowTwoCol(state,o){
    o=o||{};
    const it=ce('div','lst-item'+lstStCls(state));
    const bd=ce('div','lst-body');
    const tt=ce('div','lst-title');tt.textContent=o.title||'';bd.appendChild(tt);
    it.appendChild(bd);
    const tr=ce('div','lst-trail');
    const v=ce('span','lst-value');v.textContent=o.value||'';tr.appendChild(v);
    if(o.caret!==false){const c=ce('span','lst-caret');c.innerHTML=LST_IC_CHEVRON;tr.appendChild(c);}
    it.appendChild(tr);
    return it;
  }

  /* ---- жҳҺзҙ°/ж‘ҳиҰҒеҲ— summaryпјҡеҸіе°ҚйҪҠ labelпјҲпјӢиӘӘжҳҺпјҸcaretпјүгҖҒпјӢжҢүйҲ•ж–°еўһеҲ—гҖҒNT$ зёҪиЁҲеҲ— ----
     oпјҡ{label,desc,strong,caret} пјҸ {add:true} пјҸ {total:'200,000'} */
  function lstSumRow(o){
    o=o||{};
    const it=ce('div','lst-item lst-sum');
    if(o.add){ // ж–°еўһеҲ—пјҡйҮҚз”Ё Button еҺҹеӯҗпјҲtext / primaryпјүпјӢ IC_PLUS
      it.classList.add('is-add');
      const b=ce('button','btn v-text i-primary sz-s');b.innerHTML=IC_PLUS+'<span>жҢүйҲ•</span>';it.appendChild(b);
      return it;
    }
    if(o.total){ // зёҪиЁҲеҲ—пјҡйҮҚз”Ё Price еҺҹеӯҗпјҲ.pr-priceпјү
      it.classList.add('is-total');
      const p=ce('span','pr-price pr-sz-md');
      p.innerHTML='<span class="pr-cur">NT$</span><span class="pr-amt">'+o.total+'</span>';
      it.appendChild(p);
      return it;
    }
    const bd=ce('div','lst-body');
    const tt=ce('div','lst-title'+(o.strong?' w-strong':''));tt.textContent=o.label||'';bd.appendChild(tt);
    if(o.desc){const ds=ce('div','lst-desc');ds.textContent=o.desc;bd.appendChild(ds);}
    it.appendChild(bd);
    if(o.caret){const tr=ce('div','lst-trail');const c=ce('span','lst-caret');c.innerHTML=LST_IC_CHEVRON;tr.appendChild(c);it.appendChild(tr);}
    return it;
  }

  /* ---- е·ўзӢҖеҸҜеұ•й–ӢеҲ— nestedпјҡcheckbox жҜҚеҲ— пјӢ е…§зё®еӯҗеҲ—пјҢй»һеҲ—еұ•й–Ӣж”¶еҗҲ ----
     oпјҡ{title,meta,checked,open,children:[{title,meta}]} */
  function lstNested(o){
    o=o||{};
    const box=ce('div','lst-nest');
    const parent=lstRowBasic('default',{title:o.title,checkbox:true,checked:o.checked,meta:o.meta});
    const sub=ce('div','lst-subwrap');
    (o.children||[]).forEach(c=>sub.appendChild(lstRowBasic('default',{title:c.title,meta:c.meta,caret:true})));
    sub.style.display=o.open?'block':'none';
    parent.addEventListener('click',e=>{
      const cb=e.target.closest('.cbx');
      if(cb){ // й»һеӢҫйҒёжЎҶеҸӘеҲҮжҸӣеӢҫйҒёпјҢдёҚи§ёзҷјеұ•й–Ӣ
        const on=cb.classList.toggle('st-checked');cb.innerHTML=on?ICON_CHECK:'';return;
      }
      sub.style.display=(sub.style.display==='none')?'block':'none';
    });
    box.append(parent,sub);
    return box;
  }

  /* ---- йҒёй …еҚЎ selection cardпјҡж•ҙеҲ—дёҖејөжңүжЎҶеҚЎпјҲiconпјӢдё»жЁҷйЎҢпјӢж•ҳиҝ°пјӢcheckbox/radioпјү----
     kindпјҡcheckboxпјҸradioпјӣstateпјҡdefault/hover/selected/error/disabled
     oпјҡ{title,desc,icon,error йҢҜиӘӨиЁҠжҒҜж–Үеӯ—,expand еұ•й–Ӣеё¶ inline дёӢжӢү} */
  function lstSelCard(kind,state,o){
    o=o||{};
    const wrap=ce('div','lst-sel-wrap');
    const card=ce('div','lst-sel'+lstStCls(state)+(state==='error'?' is-error':'')+(o.expand?' is-expanded':''));
    // leading iconпјҲй җиЁӯ globeпјҢжІҝз”Ё .lst-lead / .lst-icon е°әеҜёжЁЈејҸпјү
    const ld=ce('span','lst-lead');const ic=ce('span','lst-icon');ic.innerHTML=o.icon||IC_GLOBE;ld.appendChild(ic);card.appendChild(ld);
    const main=ce('div','lst-sel-main');
    const tt=ce('div','lst-sel-title');tt.textContent=o.title||'дё»жЁҷйЎҢ';main.appendChild(tt);
    const ds=ce('div','lst-sel-desc');ds.textContent=o.desc||'зӣёй—ңзҡ„ж•ҳиҝ°иӘӘжҳҺ';main.appendChild(ds);
    card.appendChild(main);
    // еҸіеҒҙйҒёж“ҮжҺ§еҲ¶пјҡcheckbox йҮҚз”Ё .cbxгҖҒradio йҮҚз”Ё .rdo еҺҹеӯҗ
    const on=state==='selected';
    let ctl;
    if(kind==='radio'){
      ctl=ce('div','rdo sz-m'+(on?' st-checked':state==='disabled'?' st-disabled':' st-default'));
      ctl.innerHTML='<span class="dot"></span>';
    }else{
      ctl=ce('div','cbx sz-m'+(on?' st-checked':state==='disabled'?' st-disabled':' st-default'));
      if(on)ctl.innerHTML=ICON_CHECK;
    }
    card.appendChild(ctl);
    // еұ•й–Ӣеё¶ inline дёӢжӢүзҡ„йҖІйҡҺзүҲпјҲйҮҚз”Ё .field йқңж…ӢеӨ–и§Җпјү
    if(o.expand){
      const ex=ce('div','lst-sel-extra');
      ex.appendChild(lstMiniField());
      const dash=ce('span','lst-sel-dash');dash.textContent='вҖ“';ex.appendChild(dash);
      ex.appendChild(lstMiniField());
      card.appendChild(ex);
    }
    wrap.appendChild(card);
    if(state==='error'){const e=ce('div','lst-sel-err');e.textContent=o.error||'йҢҜиӘӨиЁҠжҒҜ';wrap.appendChild(e);}
    return wrap;
  }
  /* йҒёй …еҚЎеұ•й–ӢзүҲ inline дёӢжӢүпјҲйҮҚз”Ё .field / .ph / .ddcaret жЁЈејҸпјҢйқңж…ӢзӨәж„Ҹпјү */
  function lstMiniField(){
    const f=ce('div','field dd v-outline lst-sel-field');
    f.innerHTML='<span class="dd-body"><span class="ph">и«ӢйҒёж“Ү</span></span><span class="ddcaret">'+ICON_CARET+'</span>';
    return f;
  }

  /* дҫқ variant Г— state зөҰзҹ©йҷЈе–®ж је…§е®№пјӣerror зӮәйҒёй …еҚЎе°Ҳеұ¬ вҶ’ е…¶йӨҳйЎҜзӨәдёҚйҒ©з”Ё
     йӣҷж¬„пјҸе·ўзӢҖпјҡжҜҚеҲ—пјҲcheckboxпјӢжЁҷйЎҢпјӢеҸіеҒҙе°ҸжЁҷйЎҢпјүпјӢ дёҖжўқе…§зё®еӯҗеҲ—зӨәж„ҸдёҠдёӢе…©еұӨпјӣе·ІйҒё вҶ’ жҜҚеҲ—еӢҫйҒёжЎҶжү“еӢҫ */
  function lstMatrixCell(variant,state){
    if(state==='error'&&variant!=='selection'){const na=ce('div','lst-na');na.textContent='вҖ”пјҲselection е°Ҳеұ¬пјү';return na;}
    if(variant==='selection')return lstSelCard('checkbox',state,{});
    const wrap=ce('div','lst-solo');
    const nest=ce('div','lst-nest');
    nest.appendChild(lstRowBasic(state,{checkbox:true,checked:(state==='selected'),title:'жЁҷйЎҢ',meta:'е°ҸжЁҷйЎҢ'}));
    const sub=ce('div','lst-subwrap');sub.style.display='block';
    sub.appendChild(lstRowBasic('default',{title:'еӯҗй …',meta:'е°ҸжЁҷйЎҢ',caret:true}));
    nest.appendChild(sub);
    wrap.appendChild(nest);
    return wrap;
  }

  /* List Item е°Ҳз”Ёзҹ©йҷЈж јпјҡleadingпјҲеӢҫйҒёжЎҶпјҸең–зӨәпјҸз„ЎпјүГ— stateпјӣе·ІйҒёзӢҖж…Ӣеғ…еӢҫйҒёжЎҶ leading йҒ©з”ЁпјҲе…¶йӨҳдёҚйҒ©з”Ёпјү */
  function lstiCell(leading,state){
    if(state==='selected'&&leading!=='checkbox'){const na=ce('div','lst-na');na.textContent='вҖ”пјҲйңҖеӢҫйҒёжЎҶпјү';return na;}
    const o={title:'иіҮиЁҠеҲ—жЁҷйЎҢ',tag:'жЁҷзұӨ',caret:true};
    if(leading==='checkbox'){o.checkbox=true;o.checked=(state==='selected');}
    else if(leading==='icon'){o.leadIcon=IC_GLOBE;}
    const wrap=ce('div','lst-solo');wrap.appendChild(lstRowBasic(state,o));
    return wrap;
  }

  /* ж•ҙзө„еҲ—иЎЁеҚЎзүҮпјҡж”¶еӨҡеҖӢеҲ—зҜҖй»һ пјӢ еҸҜйҒёеҲҶйҡ”з·ҡпјӣfilled=еЎ«иүІеҚЎзүҮеә• */
  function lstGroup(nodes,o){
    o=o||{};
    const g=ce('div','lst-group'+(o.filled?' v-filled':''));
    nodes.forEach((n,i)=>{
      if(i>0&&o.divider)g.appendChild(ce('div','lst-divider'));
      g.appendChild(n);
    });
    return g;
  }

  /* ==================== List Item иіҮиЁҠеҲ—пјҲе·ҰеҸіж¬„дҪҚеҸҜиҮӘз”ұй…ҚзҪ®зҡ„е–®еҲ—пјү ==================== */
  function buildListItem(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component В· List Item',title:'List Item иіҮиЁҠеҲ—',
      lede:'еҲ—иЎЁзҡ„<b>еҹәжң¬е–®е…ғ</b>пјҡе·Ұ <b>leading</b>пјҲз„ЎпјҸең–зӨәпјҸеӢҫйҒёжЎҶпјүпјӢ дёӯ <b>body</b>пјҲtitleпјҢеҸҜеҠ еүҜжҸҸиҝ°пјүпјӢ еҸі <b>trailing</b>пјҲtagпјҸinfoпјҸmetaпјҸеӢ•дҪңйҲ•пјҸcaretпјҸcheckboxпјҢ<b>еҸҜиӨҮйҒё</b>пјүгҖӮжҜҸеҖӢж¬„дҪҚйғҪиғҪзҚЁз«Ӣй–Ӣй—ңзө„еҗҲпјҢжҳҜ ListгҖҒMenuгҖҒйҒёй …еҚЎзӯүе®№еҷЁе…ұз”Ёзҡ„еҺҹеӯҗеҲ—гҖӮзӢҖж…Ӣиө° defaultпјҸhoverпјҸselectedпјҸdisabledпјӣ<b>е·ІйҒё</b>жңғеҮәзҸҫе·ІеӢҫйҒёзҡ„ checkbox дҪңзӮәйҒёеҸ–жҢҮзӨәгҖӮ',
      specRows:[['axes','<code>leading Г— state</code>'],['formula','<code>3 Г— 4 = 12</code>'],['token-policy','<code>semantic.*.list.*</code>'],['slots','leading / title / desc / trailing зө„еҗҲ']]});
    const axes=DIAL_SPECS['list-item'].axes, zh=DIAL_SPECS['list-item'].zh, active=CHOICE['list-item'].active; // жҺҘдёӯеӨ® store
    const LN={checkbox:['еӢҫйҒёжЎҶ','checkbox'],icon:['ең–зӨә','icon'],none:['з„Ў','none']};
    const STN={default:['й җиЁӯ','default'],hover:['ж»‘йҒҺ','hover'],selected:['е·ІйҒё','selected'],disabled:['еҒңз”Ё','disabled']};
    let p;
    function renderM(){ if(!p)return; p.innerHTML='';
      const ls=axes.leading.filter(v=>active.leading.has(v));
      const ss=axes.state.filter(v=>active.state.has(v));
      p.appendChild(matrixPanel({badge:'list В· item',name:'Leading Г— StateпјҲеүҚзҪ®ж¬„дҪҚ Г— зӢҖж…Ӣпјӣе·ІйҒёеҮәзҸҫе·ІеӢҫйҒё checkboxпјү',
        rows:ls,cols:ss,
        rowLab:v=>labHTML(LN[v][0],LN[v][1]),
        colLab:s=>labHTML(STN[s][0],STN[s][1]),
        cell:(l,s)=>lstiCell(l,s),mincol:260})); }
    mountDial(body,{axes,zh,active,onRender:renderM});
    const sec=section(body,'Leading Г— State зҹ©йҷЈ','еҲ—пјқе·ҰеҒҙеүҚзҪ®пјҲеӢҫйҒёжЎҶпјҸең–зӨәпјҸз„ЎпјүгҖҒж¬„пјқзӢҖж…ӢгҖӮhover еә•иүІиҪүж·ұгҖҒselected её¶ж·Ўи—Қеә•пјӢе·ҰеҒҙ accent иүІжўқдёҰеҮәзҸҫе·ІеӢҫйҒё checkboxгҖҒdisabled ж•ҙй«”ж·ЎеҢ–гҖӮ');
    p=panelsIn(sec);renderM();

    // ---- Slot зө„еҗҲпјҡе·ҰеҸіж¬„дҪҚиҮӘз”ұзө„еҗҲ ----
    const bs=section(body,'Slot зө„еҗҲ В· е·ҰеҸіж¬„дҪҚ','е·Ұ leadingпјҲз„ЎпјҸең–зӨәпјҸеӢҫйҒёжЎҶпјүпјӢ дёӯ titleпјҲеҸҜеҠ еүҜжҸҸиҝ°пјүпјӢ еҸі trailing жЁҷжә–еҢ–пјҡtagпјҲйҮҚз”Ё TagпјүпјҸinfo iconпјҸmeta ж–Үеӯ—пјҸйҮ‘йЎҚпјҲйҮҚз”Ё PriceпјүпјҸеӢ•дҪңйҲ•пјҲж–Үеӯ—жҢүйҲ•пјҢйҮҚз”Ё ButtonпјүпјҸcaretпјҢдҫқиіҮиЁҠеҜҶеәҰиҮӘз”ұзө„еҗҲгҖӮ');
    const bwrap=ce('div','lst-group-demo');
    bwrap.appendChild(lstGroup([
      lstRowBasic('default',{title:'зҙ”жЁҷйЎҢ'}),
      lstRowBasic('default',{title:'жЁҷйЎҢ',desc:'зӣёй—ңзҡ„ж•ҳиҝ°иӘӘжҳҺ'}),
      lstRowBasic('default',{title:'ең–зӨәпјӢжЁҷзұӨ',leadIcon:IC_GLOBE,tag:'жЁҷзұӨ'}),

  /* е–®дёҖж‘әз–Ҡйқўжқҝпјҡvariant жҺ§еӨ–и§ҖгҖҒstate жҺ§зӢҖж…Ӣпјӣexpanded жүҚжёІжҹ“ bodyгҖҒcaret жңқдёҠ */
  function cpsPanel(variant,state,o){
    o=o||{};
    const expanded=(state==='expanded');
    const panel=ce('div','cps-panel v-'+variant+' st-'+state);
    const head=ce('div','cps-head');
    let h=''; if(o.icon)h+=`<span class="cps-lead">${o.icon}</span>`;
    h+=`<span class="cps-title">${o.title||'жЁҷйЎҢ'}</span><span class="cps-caret">${ICON_CARET}</span>`;
    head.innerHTML=h;
    panel.appendChild(head);
    if(expanded){                                   // еұ•й–ӢзӢҖж…ӢжүҚжёІжҹ“ bodyпјҲеӨ–еұӨ wrap иІ иІ¬еұ•й–ӢеӢ•з•«зүҲдҪҚпјү
      const bwrap=ce('div','cps-body-wrap');
      const bodyEl=ce('div','cps-body');
      bodyEl.innerHTML=o.body||'';
      bwrap.appendChild(bodyEl);
      panel.appendChild(bwrap);
    }
    return panel;
  }

  /* зңҹжӯЈеҸҜдә’еӢ•зҡ„жүӢйўЁзҗҙпјҡй»һ header еҲҮжҸӣеұ•й–ӢпјҸж”¶еҗҲпјҲеҲҮ class дәӨзөҰ CSS grid 0frвҶ’1fr еҫҖдёӢеұ•й–Ӣ + ж·Ўе…ҘеӢ•з•«пјүгҖӮ
     o.variant йўЁж јпјӣo.multiple е…ҒиЁұеӨҡй …еҗҢжҷӮеұ•й–ӢпјҲеҗҰеүҮе–®й–ӢжүӢйўЁзҗҙпјҢеұ•й–Ӣж–°й …иҮӘеӢ•ж”¶еҗҲеүҚдёҖй …пјүпјӣ
     o.icon е·ҰеҒҙеүҚзҪ®ең–зӨәпјӣo.firstOpen й җиЁӯеұ•й–Ӣз¬¬дёҖй …пјӣ
     o.indicator жҢҮзӨә iconпјҡ'chevron'пјҲcaret ж—ӢиҪү 180В°пјүжҲ– 'plusminus'пјҲж”¶еҗҲйЎҜзӨәпјӢгҖҒеұ•й–ӢйЎҜзӨәвҲ’пјҢдёҚж—ӢиҪүпјү */
  function cpsAccordion(items,o){
    o=o||{};
    const variant=o.variant||'bordered';
    const indicator=o.indicator||'chevron';
    const wrap=ce('div','cps-acc v-'+variant);
    const panels=[];
    // зөұдёҖй–ӢеҗҲе…ҘеҸЈпјҡеҸӘеҲҮ classпјҲеӢ•з•«з”ұ CSS transition иІ иІ¬пјүпјҢplusminus жЁЎејҸеҗҢжӯҘжҸӣпјӢпјҸвҲ’
    const setOpen=(r,open)=>{
      r.panel.classList.toggle('is-open',open);
      r.head.setAttribute('aria-expanded',open?'true':'false');
      if(indicator==='plusminus')r.caret.innerHTML=open?CPS_ICON_MINUS:CPS_ICON_PLUS;
    };
    items.forEach((it,idx)=>{
      const open=!!it.open||(!!o.firstOpen&&idx===0);
      const panel=ce('div','cps-panel v-'+variant+(open?' is-open':'')+(indicator==='plusminus'?' ind-pm':''));
      const head=ce('button','cps-head cps-head-btn');head.type='button';
      let hd=''; if(o.icon)hd+=`<span class="cps-lead">${o.icon}</span>`;
      const ind=indicator==='plusminus'?(open?CPS_ICON_MINUS:CPS_ICON_PLUS):ICON_CARET;
      hd+=`<span class="cps-title">${it.title}</span><span class="cps-caret">${ind}</span>`;
      head.innerHTML=hd;
      head.setAttribute('aria-expanded',open?'true':'false');
      const bwrap=ce('div','cps-body-wrap');          // еӢ•з•«еӨ–еұӨпјҡgrid rows 0frпјҸ1fr
      const body=ce('div','cps-body');body.innerHTML=it.body;
      bwrap.appendChild(body);
      const rec={panel,head,caret:head.querySelector('.cps-caret')};
      head.onclick=()=>{
        const isOpen=panel.classList.contains('is-open');
        if(!o.multiple)panels.forEach(r=>setOpen(r,false)); // е–®й–ӢжЁЎејҸпјҡе…Ҳж”¶еҗҲжүҖжңүй …
        setOpen(rec,!isOpen);
      };
      panel.append(head,bwrap);
      panels.push(rec);
      wrap.appendChild(panel);
    });
    return wrap;
  }

  function buildCollapse(view){

      specRows:[['axes','<code>variant Г— state</code>'],['formula','<code>3 Г— 4 = 12</code>'],['token-policy','<code>semantic.*.panel.*</code>'],['features','indicator chevronВ·plus-minus / expand-fade еӢ•з•« / accordion single-open / with-icon']]});
    const axes=DIAL_SPECS.collapse.axes, zh=DIAL_SPECS.collapse.zh, active=CHOICE.collapse.active; // жҺҘдёӯеӨ® store
    const VN={bordered:['еӨ–жЎҶ','bordered'],filled:['еЎ«иүІ','filled'],plain:['жҘөз°Ў','plain']};
    const STN={collapsed:['ж”¶еҗҲ','collapsed'],expanded:['еұ•й–Ӣ','expanded'],hover:['ж»‘йҒҺ','hover'],disabled:['еҒңз”Ё','disabled']};
    const M_TITLE='еёіжҲ¶иҲҮе®үе…ЁиЁӯе®ҡ';
    const M_BODY='еұ•й–ӢеҫҢйЎҜзӨәзҡ„е…§е®№еҚҖеЎҠпјҢеҸҜж”ҫж®өиҗҪгҖҒжё…е–®жҲ–иЎЁе–®ж¬„дҪҚпјӣж”¶еҗҲжҷӮеғ…дҝқз•ҷ header иҲҮеҸіеҒҙ caretгҖӮ';
    let p;
    function renderM(){ if(!p)return; p.innerHTML='';
      const vs=axes.variant.filter(v=>active.variant.has(v));
      const sts=axes.state.filter(v=>active.state.has(v));
      p.appendChild(matrixPanel({badge:'panel В· header',name:'Variant Г— StateпјҲжҜҸж јдёҖеҖӢж‘әз–Ҡй …пјӣexpanded йЎҜзӨә bodyгҖҒcaret жңқдёҠпјү',
        rows:vs,cols:sts,
        rowLab:v=>labHTML(VN[v][0],VN[v][1]),
        colLab:s=>labHTML(STN[s][0],STN[s][1]),
        cell:(v,s)=>cpsPanel(v,s,{title:M_TITLE,body:M_BODY}),mincol:300})); }
    mountDial(body,{axes,zh,active,onRender:renderM});
    const sec=section(body,'Variant Г— State зҹ©йҷЈ','еҲ—пјқдёүзЁ®йўЁж јгҖҒж¬„пјқеӣӣзЁ®зӢҖж…Ӣпјӣexpanded йЎҜзӨә body дё” caret ж—ӢиҪү 180В°гҖҒhover зӮәеә•иүІи®ҠеҢ–пјҲеЎ«иүІж•ҙејөеҶҚж·ұдёҖйҡҺпјүгҖҒdisabled йҷҚйҖҸжҳҺгҖӮеӨ–жЎҶжңүжЎҶең“и§’гҖҒеЎ«иүІж•ҙејөеё¶ --panel-2 еә•иүІеҚЎгҖҒжҘөз°ЎеҸӘз•ҷеә•йғЁеҲҶйҡ”з·ҡгҖӮ');
    p=panelsIn(sec);renderM();

    const acc=section(body,'Accordion жүӢйўЁзҗҙ','дёүзЁ®йўЁж јеҗ„дёҖзө„еҸҜй»һж“Ҡзҡ„жүӢйўЁзҗҙпјҢеқҮзӮәе–®й–ӢжЁЎејҸпјҲеұ•й–ӢдёҖй …жңғиҮӘеӢ•ж”¶еҗҲе…¶д»–й …пјүгҖӮй»һ header еҚіеҲҮжҸӣпјҢcaret ж—ӢиҪүгҖҒbody еҫҖдёӢеұ•й–ӢдёҰж·Ўе…ҘпјҲж”¶еҗҲеҸҚеҗ‘пјүгҖӮ');
    const arow=ce('div','cps-acc-row');
    [['bordered','еӨ–жЎҶ bordered'],['filled','еЎ«иүІ filled'],['plain','жҘөз°Ў plain']].forEach(([v,cap])=>{
      const col=ce('div','cps-acc-col');
      const c=ce('div','cps-acc-cap');c.innerHTML=`<b>${cap}</b>`;
      col.append(c,cpsAccordion(CPS_FAQ,{variant:v,multiple:false,firstOpen:true}));
      arow.appendChild(col);
    });
    acc.appendChild(arow);

    const sl=section(body,'еҜҰйҡӣдә’еӢ• Live','еҲҮ variant иҲҮ indicatorпјҲchevron з®ӯй ӯжҲ–еҠ жёӣиҷҹжҢҮзӨәпјүгҖҒеӢҫ with-iconпјҲе·ҰеҒҙеүҚзҪ®ең–зӨәпјүиҲҮ multipleпјҲе…ҒиЁұеӨҡй …еҗҢжҷӮеұ•й–ӢпјҢеҸ–ж¶ҲеүҮзӮәе–®й–ӢжүӢйўЁзҗҙпјүпјӣй»һеҗ„й … header еұ•й–ӢпјҸж”¶еҗҲпјҢеё¶еҫҖдёӢеұ•й–ӢпјӢж·Ўе…ҘеӢ•з•«гҖӮ');
    mountLive(sl,{
      initial:{variant:'bordered',indicator:'chevron',icon:false,multiple:false},
      segs:[
        {key:'variant',label:'Variant',options:['bordered','filled','plain'],labels:['еӨ–жЎҶ','еЎ«иүІ','жҘөз°Ў']},
        {key:'indicator',label:'Indicator',options:['chevron','plusminus'],labels:['з®ӯй ӯ','еҠ жёӣ']}
      ],
      bools:[{key:'icon',label:'with-icon еүҚзҪ®ең–зӨә'},{key:'multiple',label:'multiple еӨҡй …еҗҢжҷӮеұ•й–Ӣ'}],
      boolLabel:'Feature',
      render:st=>{
        const box=ce('div','cps-live-box');
        box.appendChild(cpsAccordion(CPS_FAQ,{variant:st.variant,multiple:st.multiple,icon:st.icon?CPS_ICON_QUESTION:null,indicator:st.indicator,firstOpen:true}));
        return box;

      note:'й»һд»»дёҖй … header еұ•й–ӢпјҸж”¶еҗҲпјҢbody еҫҖдёӢеұ•й–ӢдёҰж·Ўе…Ҙпјӣ<b>indicator</b> еҸҜеҲҮ chevronпјҲcaret ж—ӢиҪү 180В°пјүжҲ–еҠ жёӣиҷҹпјҲж”¶еҗҲпјӢгҖҒеұ•й–ӢвҲ’пјҢдёҚж—ӢиҪүпјүпјӣ<b>multiple</b> жңӘеӢҫжҷӮзӮәжүӢйўЁзҗҙпјҲе–®й–ӢпјҢеұ•й–Ӣж–°й …иҮӘеӢ•ж”¶еҗҲеүҚдёҖй …пјүпјҢеӢҫйҒёеҫҢеҸҜеӨҡй …еҗҢжҷӮеұ•й–Ӣпјӣ<b>with-icon</b> еңЁжЁҷйЎҢе·ҰеҒҙеҠ еүҚзҪ®ең–зӨәгҖӮ'

      'дәҢгҖҒиіҮж–ҷдҪҝз”ЁпјҡжӮЁзҡ„иЁӮе–®иҲҮзҖҸиҰҪзҙҖйҢ„еғ…з”Ёж–јж”№е–„жңҚеӢҷе“ҒиіӘиҲҮеҖӢдәәеҢ–жҺЁи–ҰпјҢдёҚжңғжҸҗдҫӣзөҰз¬¬дёүж–№иЎҢйҠ·дҪҝз”ЁгҖӮ',
      'дёүгҖҒеёіиҷҹе®үе…Ёпјҡи«ӢеҰҘе–„дҝқз®ЎеёіиҷҹеҜҶзўјпјҢеӣ еҖӢдәәдҝқз®Ўз–ҸеӨұе°ҺиҮҙзҡ„жҗҚеӨұпјҢз«ҷж–№дёҚиІ ж“”иі е„ҹиІ¬д»»гҖӮ',

  /* popup footerпјҡжҺ’еҲ—иҲҮиЈқзҪ®и„«йүӨпјҢж”№з”ұж——жЁҷиҮӘз”ұзө„еҗҲвҖ”вҖ”lay.arrange еӣӣйҒёдёҖпјҡ
     'row' дёҰжҺ’пјҲж¬ЎвҶ’дё» зӯүеҜ¬пјүпјҸ'stack' еһӮзӣҙе Ҷз–ҠпјҲдё» solid е…ЁеҜ¬ вҶ’ ж¬Ў outline е…ЁеҜ¬пјүпјҸ
     'primary' е–®йЎҶдё»жҢүйҲ•пјҲsolid е…ЁеҜ¬пјүпјҸ'secondary' е–®йЎҶж¬ЎжҢүйҲ•пјҲoutline е…ЁеҜ¬пјүпјӣ
     lay.text=true еҶҚеҠ дёҖйЎҶ text жҢүйҲ•пјҲеҰӮгҖҢзЁҚеҫҢжҸҗйҶ’жҲ‘гҖҚпјүгҖӮlive жҷӮжҺӣ .live й–Ӣе•ҹзңҹдә’еӢ• */
  function mdlPopFoot(c,lay,live,compact){
    lay=lay||{};
    const arrange=lay.arrange||'row';
    const single=(arrange==='primary'||arrange==='secondary');
    const sz=compact?'sz-s':'sz-m';                       // зҹ©йҷЈзё®е°ҸзӨәж„Ҹз”Ё sгҖҒLive з”Ё m
    const lv=live?' live':'';
    const foot=ce('div','mdl-pop-foot'+((arrange==='stack'||single)?' stack':'')); // stack/е–®йЎҶзҡҶиө°е…ЁеҜ¬зӣҙжҺ’
    const mkSec=()=>{const b=ce('button','btn v-outline i-primary '+sz+lv);b.innerHTML='<span>'+c.secondary+'</span>';b.setAttribute('data-mdl-cancel','1');return b;}; // ж¬ЎжҢүйҲ•пјҡprimary outline
    const mkPri=()=>{const b=ce('button','btn v-solid '+c.primary.cls+' '+sz+lv);b.innerHTML='<span>'+c.primary.label+'</span>';return b;}; // дё»жҢүйҲ•пјҡsolidпјҲintent дҫқ variantпјү
    if(arrange==='primary')foot.appendChild(mkPri());            // е–®йЎҶдё»жҢүйҲ•
    else if(arrange==='secondary')foot.appendChild(mkSec());     // е–®йЎҶж¬ЎжҢүйҲ•
    else if(arrange==='stack')foot.append(mkPri(),mkSec());      // еһӮзӣҙе Ҷз–Ҡпјҡдё»еңЁдёҠгҖҒж¬ЎеңЁдёӢ
    else foot.append(mkSec(),mkPri());                           // дёҰжҺ’пјҡж¬ЎвҶ’дё» зӯүеҜ¬
    if(lay.text){                                         // ж–Үеӯ—жҢүйҲ•пјҲз¬¬дёүеӢ•дҪңпјүпјҡж°ёйҒ зҚЁеҚ дёҖеҲ—е…ЁеҜ¬
      const txt=ce('button','btn v-text i-primary '+sz+lv);
      txt.innerHTML='<span>'+c.text+'</span>';
      foot.appendChild(txt);
    }
    return foot;
  }
  /* modal footerпјҡеҸіе°ҚйҪҠ ж¬ЎжҢүйҲ•пјӢзўәиӘҚ */
  function mdlModalFoot(c,live){
    const lv=live?' live':'';
    const foot=ce('div','mdl-foot');
    const sec=ce('button','btn v-outline i-secondary sz-s'+lv);
    sec.innerHTML='<span>'+c.cancel+'</span>';
    sec.setAttribute('data-mdl-cancel','1');              // Live з”ЁдҫҶз¶ҒгҖҢеҸ–ж¶ҲгҖҚй—ңй–ү
    const ok=ce('button','btn v-solid i-primary sz-s'+lv);
    ok.innerHTML='<span>'+c.confirm+'</span>';
    foot.append(sec,ok);
    return foot;
  }

  /* close Г— жҢүйҲ•пјӣabs=true жҷӮзө•е°Қе®ҡдҪҚеҲ°еҸідёҠпјҲconfirm зүҲз”Ёпјү */
  function mdlClose(abs){
    const b=ce('button','mdl-close'+(abs?' mdl-abs':''));
    b.innerHTML=ICON_CLOSE;b.setAttribute('aria-label','й—ңй–үе°Қи©ұжЎҶ');
    return b;
  }

  /* е°Қи©ұжЎҶеҚЎзүҮдё»й«”гҖӮkind=popup|modalпјӣ
     o = {variant, icon, arrange, textBtn, closeIcon, description, note, remember, subtitle, long, clip, footer, compact, live} */
  function mdlCard(kind,o){
    o=o||{};
    const compact=o.compact?' mdl-compact':'';
    if(kind==='popup'){
      /* ---- popup зҪ®дёӯе°ҸеҚЎпјҡзҪ®дёӯжЁҷйЎҢпјӢиӘӘжҳҺпјӢеҸҜйҒё iconпјҲйЎҸиүІдҫқиӘһж„ҸпјүпјҸеӮҷиЁ»пјҸиЁҳдҪҸеёіиҷҹ ---- */
      const v=o.variant==='illustration'?'illustration':'normal';
      const c=MDL_CONTENT.popup[v];
      const card=ce('div','mdl-card mdl-kind-popup'+compact);
      const body=ce('div','mdl-pop-body');
      if(o.icon){const ic=ce('div','mdl-illus'+(v==='illustration'?' is-danger':''));ic.innerHTML=MDL_ICON_WARNING;body.appendChild(ic);} // й ӮйғЁең“ iconпјҡеҸҜйҒёж——жЁҷпјҢйЎҸиүІдҫқ variant иӘһж„ҸпјҲдёҖиҲ¬пјқдё»иүІгҖҒиӯҰзӨәпјқзҙ…пјү
      const t=ce('div','mdl-pop-title');t.textContent=c.title;body.appendChild(t);
      if(o.description!==false){const d=ce('p','mdl-desc');d.textContent=c.desc;body.appendChild(d);}
      if(o.note){const n=ce('div','mdl-note');n.textContent=c.note;body.appendChild(n);}
      if(o.remember){                                     // иЁҳдҪҸеёіиҷҹпјҡйҮҚз”Ё .cbx еҺҹеӯҗпјҢlive жҷӮеҸҜй»һйҒёеҲҮжҸӣ
        const row=ce('label','mdl-remember');
        const cb=ce('span','cbx sz-s st-checked');cb.innerHTML=ICON_CHECK;
        let on=true;
        if(o.live)row.onclick=e=>{e.preventDefault();on=!on;cb.className='cbx sz-s'+(on?' st-checked':'');cb.innerHTML=on?ICON_CHECK:'';};
        row.appendChild(cb);row.appendChild(document.createTextNode(c.remember));
        body.appendChild(row);
      }
      card.appendChild(body);
      if(o.footer!==false)card.appendChild(mdlPopFoot(c,{arrange:o.arrange,text:o.textBtn},o.live,o.compact));
      return card;
    }
    /* ---- modal еҜ¬зүҲиҰ–зӘ—пјҡheaderпјҲжЁҷйЎҢпјӢеүҜжЁҷйЎҢпјӢГ—пјүпјӢеҸҜжҚІеӢ• content пјӢеҸіе°ҚйҪҠ footer ---- */
    const v=o.variant==='larger'?'larger':'regular';
    const c=MDL_CONTENT.modal[v];
    const card=ce('div','mdl-card mdl-kind-modal'+(v==='larger'?' mdl-larger':'')+compact);
    const head=ce('div','mdl-mhead');
    const ht=ce('div','mdl-mhead-txt');
    const t=ce('div','mdl-title');t.textContent=c.title;ht.appendChild(t);
    if(o.subtitle!==false&&c.sub){const s=ce('div','mdl-sub');s.textContent=c.sub;ht.appendChild(s);} // еүҜжЁҷйЎҢпјҡregularпјҸlarger еҗ„жңүжғ…еўғж–ҮжЎҲпјҢеҸҜз”Ёж——жЁҷй—ңй–ү
    head.appendChild(ht);
    if(o.closeIcon!==false)head.appendChild(mdlClose(false));   // еҸідёҠй—ңй–ү Г—
    card.appendChild(head);
    const ct=ce('div','mdl-content'+(o.clip?' mdl-clip':''));
    const paras=o.long?MDL_CONTENT.paras.concat(MDL_CONTENT.paras):MDL_CONTENT.paras.slice(0,2); // longпјқйӢӘй•·зӨәзҜ„еҚ·и»ё
    paras.forEach(x=>{const d=ce('p','mdl-desc');d.textContent=x;ct.appendChild(d);});
    card.appendChild(ct);
    if(o.footer!==false)card.appendChild(mdlModalFoot(c,o.live));
    return card;
  }

  /* жө®еұӨзөҗж§ӢзӨәж„Ҹпјҡviewport е…§дёүеұӨпјҲй ҒйқўйӘЁжһ¶ / backdrop йҒ®зҪ© / зҪ®дёӯеҚЎзүҮпјү+ ең–дҫӢ */

     ['l-scrim','backdrop йҒ®зҪ©','еҚҠйҖҸжҳҺй»‘е№•и“ӢдҪҸж•ҙеҖӢз•«йқўпјҢй»һж“ҠеҸҜй—ңй–үе°Қи©ұжЎҶ'],
     ['l-card','е°Қи©ұжЎҶеҚЎзүҮ','зҪ®дёӯжө®ж–јжңҖдёҠеұӨпјҢжүҝијүжЁҷйЎҢпјҸе…§е®№пјҸеӢ•дҪң']
