  {name:'еүҚз«Ҝй–Ӣзҷј',s:7,e:12,c:'accent',st:'active',prog:35},
  {name:'API дёІжҺҘ',s:8,e:11,c:'warn',st:'delay',prog:20},
  {name:'жё¬и©Ұй©—ж”¶',s:11,e:14,c:'danger',st:'todo',prog:0}
];
const GNT_TASKS_SM=[                                             /* зҹ©йҷЈж јзё®е°ҸзүҲпјҡ3 д»»еӢҷ Г— 8 еӨ© */
  {name:'йңҖжұӮ',s:0,e:3,c:'ok',st:'done',prog:100},
  {name:'иЁӯиЁҲ',s:2,e:6,c:'accent',st:'active',prog:55},
  {name:'й–Ӣзҷј',s:5,e:8,c:'warn',st:'delay',prog:20}
];
/* weekпјҡdпјқжҳҹжңҹпјҲ0=дёҖпјүпјӣsпјқиө·е§ӢжҷӮж®ө indexпјҲ0=09:00пјүпјӣduпјқи·Ёе№ҫеҖӢжҷӮж®өпјӣtmпјқиө·е§ӢжҷӮй–“ */
const GNT_WEVENTS=[
  {d:0,s:0,du:2,t:'з”ўе“ҒйҖұжңғ',c:'accent',tm:'09:00'},
  {d:1,s:3,du:1,t:'йңҖжұӮиЁӘи«Ү',c:'ok',tm:'12:00'},
  {d:2,s:1,du:3,t:'иЁӯиЁҲиЎқеҲә',c:'warn',tm:'10:00'},
  {d:3,s:5,du:2,t:'з”ЁжҲ¶жё¬и©Ұ',c:'accent',tm:'14:00'},
  {d:4,s:2,du:2,t:'зүҲжң¬еӣһйЎ§',c:'danger',tm:'11:00'},
  {d:5,s:4,du:2,t:'е·ҘдҪңеқҠ',c:'ok',tm:'13:00'}
];
const GNT_WEVENTS_SM=[                                           /* зҹ©йҷЈж јзё®е°ҸзүҲпјҡ5 жҷӮж®өе…§ */
  {d:0,s:0,du:2,t:'йҖұжңғ',c:'accent',tm:'09:00'},
  {d:2,s:1,du:3,t:'иЎқеҲә',c:'warn',tm:'10:00'},
  {d:4,s:2,du:2,t:'еӣһйЎ§',c:'ok',tm:'11:00'},
  {d:5,s:3,du:1,t:'жё¬и©Ұ',c:'danger',tm:'12:00'}
];
/* timelineпјҡtmпјқжҷӮй–“пјӣtпјқжЁҷйЎҢпјӣdпјқжҸҸиҝ°пјӣstпјқзӢҖж…ӢпјҲжҺҘ .tg иҲҮзҜҖй»һең“й»һиүІпјү */
const GNT_TLNODES=[
  {tm:'09:30',t:'йңҖжұӮзўәиӘҚжңғиӯ°',d:'иҲҮе®ўжҲ¶е°ҚйҪҠжң¬жңҹзҜ„еңҚиҲҮдәӨд»ҳй …зӣ®',st:'done'},
  {tm:'11:00',t:'з·ҡжЎҶзЁҝи©•еҜ©',d:'PMпјҸе·ҘзЁӢйӣҷж–№зўәиӘҚиіҮиЁҠжһ¶ж§Ӣ',st:'done'},
  {tm:'14:00',t:'иҰ–иҰәиЁӯиЁҲдәӨд»ҳ',d:'дё»й ҒиҲҮеҲ—иЎЁй Ғ hi-fi зЁҝдёҠеӮі Figma',st:'active'},
  {tm:'16:30',t:'еүҚз«ҜеҲҮзүҲжҺ’зЁӢ',d:'дҫқдәӨд»ҳзЁҝжӢҶ component е·Ҙе–®',st:'delay'},
  {tm:'18:00',t:'жҜҸж—Ҙз«ҷжңғеӣһйЎ§',d:'еҗҢжӯҘйҖІеәҰиҲҮйўЁйҡӘ',st:'todo'}
];

/* йҖұжң«еҲӨе®ҡпјҡзӨәж„ҸжңҲд»Ҫ 7/01 зӮәйҖұдёҖ вҶ’ 7/05гҖҒ7/06пјҲindex 4гҖҒ5пјүиҲҮ 7/12гҖҒ7/13пјҲ11гҖҒ12пјүзӮәйҖұжң« */
function gntIsWkend(i){const w=i%7;return w===4||w===5;}

/* ---- variant 1пјҡgantt з”ҳзү№ең– ----
   o={live, prog(йҖІеәҰеЎ«иүІ,й җиЁӯй–Ӣ), wkend(йҖұжң«жЁҷиЁҳ,й җиЁӯй–Ӣ), today(д»Ҡж—Ҙз·ҡ,й җиЁӯй–Ӣ), tasks, days, todayIx, compact} */
function gntGantt(size,o){
  o=o||{};
  const tasks=o.tasks||GNT_TASKS, days=o.days||14, todayIx=o.todayIx==null?9:o.todayIx;
  const box=ce('div','gnt-box gnt-gantt gnt-sz-'+size
    +(o.live?' live':'')+(o.prog===false?' no-prog':'')+(o.compact?' gnt-g-compact':''));
  /* е·Ұпјҡд»»еӢҷеҗҚж¬„пјҲеҗҚзЁұ + .tg зӢҖж…ӢжЁҷпјү */
  const side=ce('div','gnt-g-side');
  const sh=ce('div','gnt-g-side-head');sh.textContent='д»»еӢҷ';side.appendChild(sh);
  tasks.forEach(t=>{
    const r=ce('div','gnt-g-task');
    const n=ce('span','gnt-g-name');n.textContent=t.name;r.appendChild(n);
    r.appendChild(gntTag(t.st));
    side.appendChild(r);
  });
  /* еҸіпјҡж—ҘжңҹиЎЁй ӯ + ж јз·ҡиғҢжҷҜ + ж©«жўқеҲ—пјҲйҒҺеҜ¬е®№еҷЁе…§жҚІеӢ•пјү */
  const scroll=ce('div','gnt-g-scroll');
  const main=ce('div','gnt-g-main');
  const head=ce('div','gnt-g-head');
  for(let i=0;i<days;i++){
    const h=ce('div','gnt-g-hcell'
      +(o.wkend!==false&&gntIsWkend(i)?' is-wkend':'')
      +(o.today!==false&&i===todayIx?' is-today':''));
    h.textContent='7/'+String(i+1).padStart(2,'0');
    head.appendChild(h);
  }
  main.appendChild(head);
  const rows=ce('div','gnt-g-rows');
  tasks.forEach(t=>{
    const row=ce('div','gnt-g-row');
    for(let i=0;i<days;i++)row.appendChild(ce('div','gnt-g-cell'+(o.wkend!==false&&gntIsWkend(i)?' is-wkend':''))); /* жҜҸеҲ— in-flow ж јз·ҡ cellпјҲеҗ«йҖұжң«еә•пјүпјҢеҸ–д»ЈеҺҹзө•е°Қе®ҡдҪҚиғҢжҷҜеұӨ */
    const bar=ce('div','gnt-bar c-'+t.c);
    bar.style.left=(t.s/days*100)+'%';                           /* дҫқиө·иЁ–ж—Ҙд»Ҙ % е®ҡдҪҚпјҸиЁӯеҜ¬ */
    bar.style.width=((t.e-t.s)/days*100)+'%';
    const fill=ce('div','gnt-bar-fill');fill.style.width=t.prog+'%';bar.appendChild(fill);
    const lab=ce('span','gnt-bar-lab');lab.textContent=t.prog+'%';bar.appendChild(lab);
    bar.title=t.name+'пјҲ'+t.prog+'%пјү';
    row.appendChild(bar);rows.appendChild(row);
  });
  if(o.today!==false){                                           /* д»Ҡж—Ҙз·ҡпјҡaccent зӣҙз·ҡ + й Ӯз«Ҝе°ҸзұӨ */
    const tl=ce('div','gnt-today');tl.style.left=((todayIx+0.5)/days*100)+'%';
    const pin=ce('span','gnt-today-pin');pin.textContent='д»Ҡж—Ҙ';tl.appendChild(pin);
    rows.appendChild(tl);
  }
  main.appendChild(rows);scroll.appendChild(main);
  box.append(side,scroll);
  return box;
}

/* ---- variant 2пјҡweek йҖұжҺ’зЁӢ ----
   o={live, times(жҷӮж®өжЁҷзұӨ,й җиЁӯй–Ӣ), detail(дәӢд»¶зҙ°зҜҖ,й җиЁӯй–Ӣ), events, slots, compact} */
function gntWeek(size,o){
  o=o||{};
  const evts=o.events||GNT_WEVENTS, slots=o.slots||8, hasT=o.times!==false;
  const box=ce('div','gnt-box gnt-week gnt-sz-'+size+(o.live?' live':'')+(o.compact?' gnt-w-compact':''));
  const g=ce('div','gnt-w-grid');
  /* ж¬„еҲ—жЁЎжқҝдҫқгҖҢжңүз„ЎжҷӮж®өж¬„гҖҚиҲҮжҷӮж®өж•ёиЁҲз®—пјҲзүҲйқўж•ёеӯёпјҢйқһжЁЈејҸ tokenпјү */
  g.style.gridTemplateColumns=(hasT?'var(--gnt-timew) ':'')+'repeat(7,minmax(0,1fr))';
  g.style.gridTemplateRows='auto repeat('+slots+',var(--gnt-slot))';
  const off=hasT?2:1;                                            /* еӨ©ж¬„зҡ„ grid column иө·й»һ */
  if(hasT)g.appendChild(ce('div','gnt-w-corner'));
  ['дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ','ж—Ҙ'].forEach((d,i)=>{
    const h=ce('div','gnt-w-dhead'+(i===0&&!hasT?' first':'')+(i>=5?' is-wkend':''));
    h.textContent='йҖұ'+d;g.appendChild(h);
  });
  for(let s=0;s<slots;s++){
    if(hasT){
      const t=ce('div','gnt-w-time');t.textContent=String(9+s).padStart(2,'0')+':00';
      t.style.gridRow=String(s+2);t.style.gridColumn='1';g.appendChild(t);
    }
    for(let d=0;d<7;d++){
      const c=ce('div','gnt-w-cell'+(s===0?' firstrow':'')+(d===0&&!hasT?' firstcol':'')+(d>=5?' is-wkend':''));
      c.style.gridRow=String(s+2);c.style.gridColumn=String(d+off);
      g.appendChild(c);
    }
  }
  evts.forEach(e=>{
    const b=ce('div','gnt-evt c-'+e.c);
    b.style.gridColumn=String(e.d+off);
    b.style.gridRow=(e.s+2)+' / span '+e.du;                     /* дәӢд»¶и·ЁжҷӮж®өпјқgrid-row span */
    b.innerHTML='<span class="t">'+e.t+'</span>'
      +(o.detail!==false?'<span class="tm">'+e.tm+'вҖ“'+String(9+e.s+e.du).padStart(2,'0')+':00</span>':'');
    b.title=e.t;
    g.appendChild(b);
  });
  box.appendChild(g);
  return box;
}

/* ---- variant 3пјҡtimeline еһӮзӣҙжҷӮй–“и»ё ----
   o={live, tags(зӢҖж…Ӣ tag,й җиЁӯй–Ӣ), line(йҖЈжҺҘз·ҡ,й җиЁӯй–Ӣ), nodes, compact} */
function gntTimeline(size,o){
  o=o||{};
  const nodes=o.nodes||GNT_TLNODES;
  const box=ce('div','gnt-box gnt-tl gnt-sz-'+size+(o.live?' live':'')+(o.line===false?' no-line':''));
  nodes.forEach((n,i)=>{
    const it=ce('div','gnt-tl-item');
    const rail=ce('div','gnt-tl-rail');                          /* е·Ұи»Ңпјҡең“й»һ + йҖЈжҺҘз·ҡ */
    rail.appendChild(ce('span','gnt-tl-dot st-'+n.st));
    if(i<nodes.length-1)rail.appendChild(ce('span','gnt-tl-cord'));
    it.appendChild(rail);
    const card=ce('div','gnt-tl-card');                          /* дәӢд»¶еҚЎпјҡжҷӮй–“ + tag + жЁҷйЎҢ + жҸҸиҝ° */
    const top=ce('div','gnt-tl-top');
    const tm=ce('span','gnt-tl-time');tm.innerHTML=IC_CLOCK+'<span>'+n.tm+'</span>';
    top.appendChild(tm);
    if(o.tags!==false)top.appendChild(gntTag(n.st));
    card.appendChild(top);
    const tt=ce('div','gnt-tl-title');tt.textContent=n.t;card.appendChild(tt);
    if(n.d&&!o.compact){const de=ce('div','gnt-tl-desc');de.textContent=n.d;card.appendChild(de);}
    it.appendChild(card);
    box.appendChild(it);
  });
  return box;
}

/* ---- зҹ©йҷЈж јпјҡи©І variant Г— size зҡ„зё®е°ҸзӨәж„ҸпјҲйқңж…Ӣе‘ҲзҸҫпјү ---- */
function gntCell(variant,size){
  const wrap=ce('div','gnt-cellwrap');
  if(variant==='gantt')wrap.appendChild(gntGantt(size,{compact:true,tasks:GNT_TASKS_SM,days:8,todayIx:5}));
  else if(variant==='week')wrap.appendChild(gntWeek(size,{compact:true,slots:5,detail:false,events:GNT_WEVENTS_SM}));
  else wrap.appendChild(gntTimeline(size,{compact:true,nodes:GNT_TLNODES.slice(1,4)}));
  return wrap;
}

function buildScheduleChart(view){
  const body=viewScaffold(view,{eyebrow:'L3 Component В· Schedule Chart',title:'Schedule Chart жҺ’зЁӢең–',
    lede:'е°ҲжЎҲжҺ’зЁӢпјҸжҷӮж®өиҰ–иҰәеҢ–пјҡ<b>gantt з”ҳзү№ең–</b>пјҲе·Ұд»»еӢҷж¬„пјӢж—Ҙжңҹи»ёпјҢжҜҸеҲ—дёҖжўқдҫқиө·иЁ–ж—Ҙе®ҡдҪҚзҡ„ең“и§’ж©«жўқпјҢеҸҜз–ҠйҖІеәҰеЎ«иүІпјҸйҖұжң«жЁҷиЁҳпјҸд»Ҡж—Ҙз·ҡпјүгҖҒ<b>week йҖұжҺ’зЁӢ</b>пјҲ7 еӨ©ж¬„ Г— жҷӮж®өеҲ—пјҢдәӢд»¶ж–№еЎҠиҗҪж јгҖҒеҸҜи·ЁжҷӮж®өпјүгҖҒ<b>timeline жҷӮй–“и»ё</b>пјҲеһӮзӣҙзҜҖй»һпјҡең“й»һпјӢйҖЈжҺҘз·ҡпјӢдәӢд»¶еҚЎпјүгҖӮГ— size <b>m жЁҷжә–пјҸs зІҫз°Ў</b>гҖӮзҙ” DOMпјӢCSS жҺ’зүҲз„ЎеӨ–йғЁең–иЎЁеә«пјӣж©«жўқпјҸдәӢд»¶зі»еҲ—иүІз¶Ғ <code>--accent/--ok/--warn/--i-danger</code>пјҢзӢҖж…ӢжЁҷйҮҚз”Ё <b>TagпјҲ.tgпјү</b>пјҢжҷӮй–“ icon йҮҚз”Ёж—ўжңү <b>IC_CLOCK</b>гҖӮ',
    specRows:[['axes','<code>variant Г— size</code>'],['formula','<code>3 Г— 2 = 6</code>'],
      ['atoms','<code>.tg В· IC_CLOCK</code>'],['series','<code>accent / ok / warn / danger</code>'],
      ['token-policy','<code>semantic.*.schedule.*</code>'],['slots','tasks / days / events / slots / nodes']]});
  const axes=DIAL_SPECS['schedule-chart'].axes, zh=DIAL_SPECS['schedule-chart'].zh, active=CHOICE['schedule-chart'].active; // жҺҘдёӯеӨ® storeпјҲhyphen id з”ЁжӢ¬иҷҹеҸ–еҖјпјү
  const VN={gantt:['з”ҳзү№ең–','gantt'],week:['йҖұжҺ’зЁӢ','week'],timeline:['жҷӮй–“и»ё','timeline']};
  const SN={m:['жЁҷжә–','m'],s:['зІҫз°Ў','s']};
  let p;
  function renderM(){ if(!p)return; p.innerHTML='';
    const vs=axes.variant.filter(v=>active.variant.has(v));
    const ss=axes.size.filter(s=>active.size.has(s));
    p.appendChild(matrixPanel({badge:'schedule-chart',name:'Variant Г— SizeпјҲзё®е°ҸзӨәж„Ҹпјӣs зІҫз°Ўпјқжӣҙзҹ®еҲ—й«ҳгҖҒйҡұи—ҸзӢҖж…ӢжЁҷпјҸжҸҸиҝ°пјү',
      rows:vs,cols:ss,
      rowLab:v=>labHTML(VN[v][0],VN[v][1]),
      colLab:s=>labHTML(SN[s][0],SN[s][1]),
      cell:(v,s)=>gntCell(v,s),mincol:300})); }
  mountDial(body,{axes,zh,active,onRender:renderM});
  const sec=section(body,'Variant Г— Size зҹ©йҷЈ','еҲ—пјқдёүеһӢж…ӢпјҲз”ҳзү№ең–пјҸйҖұжҺ’зЁӢпјҸжҷӮй–“и»ёпјүгҖҒж¬„пјқе…©е°әеҜёпјӣж је…§зӮәзё®е°ҸзӨәж„ҸпјҲз”ҳзү№ 3 д»»еӢҷ Г— 8 еӨ©гҖҒйҖұжҺ’зЁӢ 5 жҷӮж®өгҖҒжҷӮй–“и»ё 3 зҜҖй»һпјүгҖӮ');
  p=panelsIn(sec);renderM();

  /* Showcaseпјҡдёү variant еҗ„дёҖејөијғе®Ңж•ҙзҜ„дҫӢпјҲsize mгҖҒlive зңҹеҜҰ hoverпјү */
  const sw=section(body,'Showcase зҜ„дҫӢ','дёүзЁ® variant зҡ„е®Ңж•ҙзө„еҗҲпјҡз”ҳзү№ең– 6 д»»еӢҷ Г— 14 еӨ©пјҲйҖІеәҰеЎ«иүІпјӢйҖұжң«жЁҷиЁҳпјӢд»Ҡж—Ҙз·ҡпјүгҖҒйҖұжҺ’зЁӢдёҖйҖұ 6 еҖӢдәӢд»¶пјҲеҸҜи·ЁжҷӮж®өпјүгҖҒжҷӮй–“и»ё 5 еҖӢзҜҖй»һпјҲзӢҖж…Ӣ tagпјӢйҖЈжҺҘз·ҡпјүгҖӮж»‘дёҠж©«жўқпјҸдәӢд»¶пјҸеҚЎзүҮзңӢзңҹеҜҰ hoverгҖӮ');
  const rd=ce('div','row-demo');
  [['gantt з”ҳзү№ең– В· 6 д»»еӢҷ Г— 14 еӨ©',()=>gntGantt('m',{live:true})],
   ['week йҖұжҺ’зЁӢ В· дёҖйҖұ 6 дәӢд»¶',()=>gntWeek('m',{live:true})],
   ['timeline жҷӮй–“и»ё В· 5 зҜҖй»һ',()=>gntTimeline('m',{live:true})]
  ].forEach(([cap,fn])=>{const it=ce('div','demo-item');it.style.maxWidth='100%';it.appendChild(fn());const c=ce('div','cap');c.innerHTML=`<b>${cap}</b>`;it.appendChild(c);rd.appendChild(it);});
  sw.appendChild(rd);

  /* Liveпјҡsegs еҲҮ variantпјҸsizeпјӣеӢҫйҒёй …дҫқ variant жўқд»¶йЎҜзӨәпјҲйҒҝе…Қз©әиҪүй–Ӣй—ңпјү */
  const sl=section(body,'еҜҰйҡӣдә’еӢ• Live','еҲҮ variantпјҸsize еҚіжҷӮйҮҚзө„пјӣеӢҫйҒёй …йҡЁ variant еҲҮжҸӣвҖ”вҖ”з”ҳзү№ең–пјҡйҖІеәҰеЎ«иүІпјҸйҖұжң«жЁҷиЁҳпјҸд»Ҡж—Ҙз·ҡпјӣйҖұжҺ’зЁӢпјҡжҷӮж®өжЁҷзұӨпјҸдәӢд»¶зҙ°зҜҖпјӣжҷӮй–“и»ёпјҡзӢҖж…Ӣ tagпјҸйҖЈжҺҘз·ҡгҖӮ');
  const GNT_BOOL_OWNER=['gantt','gantt','gantt','week','week','timeline','timeline']; // еӢҫйҒёй … вҶ” жүҖеұ¬ variantпјҲиҲҮ bools й ҶеәҸдёҖиҮҙпјү
  mountLive(sl,{
    initial:{variant:'gantt',size:'m',prog:true,wkend:true,today:true,times:true,detail:true,tags:true,line:true},
    segs:[{key:'variant',label:'Variant',options:['gantt','week','timeline'],labels:['з”ҳзү№ең–','йҖұжҺ’зЁӢ','жҷӮй–“и»ё']},
          {key:'size',label:'Size',options:['m','s'],labels:['m жЁҷжә–','s зІҫз°Ў']}],
    bools:[{key:'prog',label:'йҖІеәҰеЎ«иүІ'},{key:'wkend',label:'йҖұжң«жЁҷиЁҳ'},{key:'today',label:'д»Ҡж—Ҙз·ҡ'},
           {key:'times',label:'жҷӮж®өжЁҷзұӨ'},{key:'detail',label:'дәӢд»¶зҙ°зҜҖ'},
           {key:'tags',label:'зӢҖж…Ӣ tag'},{key:'line',label:'йҖЈжҺҘз·ҡ'}],
    boolLabel:'OptionsпјҲдҫқ variant йЎҜзӨәпјү',
    render:st=>{
      /* жўқд»¶йЎҜзӨәпјҡеҸӘз•ҷз•¶еүҚ variant жңүж„Ҹзҫ©зҡ„еӢҫйҒёй …пјҲжҺ§еҲ¶еҲ—еҸӘе»әдёҖж¬ЎпјҢж”№з”Ё display еҲҮжҸӣпјү */
      sl.querySelectorAll('.checks .chk').forEach((c,i)=>{c.style.display=GNT_BOOL_OWNER[i]===st.variant?'':'none';});
      if(st.variant==='gantt')return gntGantt(st.size,{live:true,prog:st.prog,wkend:st.wkend,today:st.today});
      if(st.variant==='week')return gntWeek(st.size,{live:true,times:st.times,detail:st.detail});
      return gntTimeline(st.size,{live:true,tags:st.tags,line:st.line});
    },
    note:'з”ҳзү№ең–пјҡй—ңгҖҢйҖІеәҰеЎ«иүІгҖҚж•ҙжўқиҪүеҜҰиүІгҖҒй—ңгҖҢйҖұжң«жЁҷиЁҳгҖҚжӢҝжҺүзҒ°еә•ж¬„гҖҒй—ңгҖҢд»Ҡж—Ҙз·ҡгҖҚз§»йҷӨ accent зӣҙз·ҡпјӣйҖұжҺ’зЁӢпјҡй—ңгҖҢжҷӮж®өжЁҷзұӨгҖҚж”¶иө·е·Ұж¬„гҖҒй—ңгҖҢдәӢд»¶зҙ°зҜҖгҖҚеҸӘз•ҷжЁҷйЎҢпјӣжҷӮй–“и»ёпјҡй—ңгҖҢзӢҖж…Ӣ tagгҖҚжӢҝжҺү .tgгҖҒй—ңгҖҢйҖЈжҺҘз·ҡгҖҚеҸӘеү©зҜҖй»һең“й»һгҖӮhover зӮәзңҹеҜҰ <code>:hover</code>пјҲж©«жўқеўһдә®пјҸдәӢд»¶еҠ ж·ұпјҸеҚЎзүҮжө®иө·пјүгҖӮ'
  });
}

  /* ===== Table&Chart group build: calendar ===== */
  /* ==================== Calendar ж—ҘжӣҶжҷӮй–“пјҲcal-пјү==================== */
  /* ж—ҘжңҹжҷӮй–“йҒёж“Үпјҡmonth жңҲжӣҶпјҸrange ж—ҘжңҹеҚҖй–“пјҸtime жҷӮй–“жё…е–® Г— size mпјҸsгҖӮ
     иЎЁй ӯдёҠдёӢжңҲйҲ•йҮҚз”Ё .btn v-text i-secondary icon-only еҺҹеӯҗпјӣtime иЎЁй ӯйҮҚз”Ёж—ўжңү IC_CLOCKгҖӮ
     вҖјпёҸ еӢҝз”Ё Date.now / new DateпјҲз’°еўғдёҚз©©пјүпјҡзӨәж„Ҹж—Ҙжңҹе…ЁйғЁеҜ«жӯ»вҖ”вҖ”гҖҢд»Ҡж—ҘгҖҚпјқ2026 е№ҙ 7 жңҲ 16гҖҒ
     йҒёеҸ–пјқ18гҖҒеҚҖй–“пјқ12вҖ“16гҖҒдәӢд»¶ж—Ҙпјқ3/10/16/21/24гҖҒеҒңз”Ёж—Ҙпјқ5/26пјӣжңҲд»ҪеҲҮжҸӣз”Ёзҙ”ж•ёеӯёпјҲZellerпјүжҺЁз®—гҖӮ */

  /* ж–°еўһ iconпјҡж—ўжңүеҸӘжңү ICON_CARETпјҲжңқдёӢпјүиҲҮ LST_IC_CHEVRONпјҲlst- е°Ҳз”ЁпјүпјҢж•…иЈңе·ҰеҸі caretпјҲPhosphor regularпјү */
  const CAL_IC_CARET_L='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M165.66,202.34a8,8,0,0,1-11.32,11.32l-80-80a8,8,0,0,1,0-11.32l80-80a8,8,0,0,1,11.32,11.32L91.31,128Z"/></svg>';
  const CAL_IC_CARET_R='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M181.66,133.66l-80,80a8,8,0,0,1-11.32-11.32L164.69,128,90.34,53.66a8,8,0,0,1,11.32-11.32l80,80A8,8,0,0,1,181.66,133.66Z"/></svg>';

  /* ---- зҙ”ж•ёеӯёж—ҘжӣҶе·Ҙе…·пјҲдёҚзў° Dateпјү---- */
  function calLeap(y){return (y%4===0&&y%100!==0)||y%400===0;} // й–Ҹе№ҙеҲӨж–·
  function calDim(y,m){return [31,calLeap(y)?29:28,31,30,31,30,31,31,30,31,30,31][m-1];} // и©ІжңҲеӨ©ж•ё
  function calDow(y,m,d){ // Zeller е…¬ејҸпјҡеӣһеӮіжҳҹжңҹ 0=ж—Ҙ вҖҰ 6=е…ӯ
    if(m<3){m+=12;y--;}
    const K=y%100,J=Math.floor(y/100);
    const h=(d+Math.floor(13*(m+1)/5)+K+Math.floor(K/4)+Math.floor(J/4)+5*J)%7; // 0=е…ӯ
    return (h+6)%7;
  }
  function calDoy(y,m,d){let n=d;for(let i=1;i<m;i++)n+=calDim(y,i);return n;} // е№ҙе…§з¬¬е№ҫеӨ©
  function calWeekNo(y,m,d){ // и©ІеҲ—пјҲйҖұж—Ҙиө·з®—пјүзҡ„з¬¬е№ҫйҖұзӨәж„ҸпјҡеҸ–и©ІйҖұгҖҢйҖұеӣӣгҖҚзҡ„е№ҙе…§еӨ©ж•ё / 7 йҖІдҪҚпјҲиҝ‘дјј ISOпјү
    let dd=d+4,mm=m,yy=y;
    while(dd>calDim(yy,mm)){dd-=calDim(yy,mm);mm++;if(mm>12){mm=1;yy++;}}
    return Math.ceil(calDoy(yy,mm,dd)/7);
  }
  function calGridDays(y,m){ // еӣһеӮі 6Г—7=42 ж ј {y,m,d,out}пјҡеүҚеҫҢиЈңдёҠпјҸдёӢжңҲзҡ„ж—Ҙ
    const first=calDow(y,m,1), dim=calDim(y,m);
    const pm=m===1?12:m-1, py=m===1?y-1:y, pdim=calDim(py,pm);
    const nm=m===12?1:m+1, ny=m===12?y+1:y;
    const cells=[];
    for(let i=0;i<42;i++){
      const n=i-first+1;
      if(n<1)cells.push({y:py,m:pm,d:pdim+n,out:true});
      else if(n>dim)cells.push({y:ny,m:nm,d:n-dim,out:true});
      else cells.push({y:y,m:m,d:n,out:false});
    }
    return cells;
  }

  /* ---- жңҲжӣҶпјҸеҚҖй–“е·Ҙе» пјҡcalMonthEl(size,o) ----
     o={range, y, m, today, selected, rs, re, events, disabled, weeknum, rangeText, live, interactive}
     today=null еҸҜй—ңд»Ҡж—ҘжЁҷиЁҳпјӣevents еӮі [] еҸҜй—ңдәӢд»¶ең“й»һпјӣinteractive=true й»һж—ҘеҸҜйҒёгҖҒдёҠдёӢжңҲйҲ•еҸҜеҲҮжңҲ */
  function calMonthEl(size,o){
    o=o||{};
    const range=!!o.range;
    const TY=2026,TM=7; // гҖҢд»Ҡж—ҘгҖҚеҜ«жӯ»иҗҪеңЁ 2026 е№ҙ 7 жңҲ
    const todayD=(o.today!==undefined)?o.today:16;
    const events=(o.events!==undefined)?o.events:[3,10,16,21,24];
    const dis=(o.disabled!==undefined)?o.disabled:[5,26]; // жҜҸжңҲ 5гҖҒ26 зӨәж„ҸеҒңз”ЁпјҲе…¬дј‘ж—Ҙпјү
    let y=o.y||2026,m=o.m||7;
    let selY=2026,selM=7,sel=(o.selected!==undefined)?o.selected:18; // е–®ж—ҘйҒёеҸ–пјҲmonth з”Ёпјү
    let rY=2026,rM=7,rs=(o.rs!==undefined)?o.rs:12,re=(o.re!==undefined)?o.re:16,picking=false; // еҚҖй–“иө·иЁ–пјҲrange з”Ёпјү

    const root=ce('div','cal cal-v-'+(range?'range':'month')+' cal-sz-'+size
      +(o.weeknum?' cal-has-wk':'')+(o.live?' live':''));

    /* иЎЁй ӯпјҡдёҠдёӢжңҲйҲ•пјқButton еҺҹеӯҗпјҲv-text icon-onlyпјү */
    const head=ce('div','cal-head');
    const prev=ce('button','btn v-text i-secondary sz-s icon-only'+(o.live?' live':''));
    prev.type='button';prev.setAttribute('aria-label','дёҠдёҖжңҲ');prev.innerHTML=CAL_IC_CARET_L;
    const title=ce('div','cal-head-title');
    const next=ce('button','btn v-text i-secondary sz-s icon-only'+(o.live?' live':''));
    next.type='button';next.setAttribute('aria-label','дёӢдёҖжңҲ');next.innerHTML=CAL_IC_CARET_R;
    head.append(prev,title,next);root.appendChild(head);

    const dow=ce('div','cal-dow');root.appendChild(dow);
    const grid=ce('div','cal-grid');grid.setAttribute('role','grid');root.appendChild(grid);
    let foot=null;
    if(range&&o.rangeText){foot=ce('div','cal-foot');root.appendChild(foot);}

    function ftxt(){ // еҚҖй–“ж–Үеӯ—пјҡе·ІйҒё 7/12 вҖ“ 7/16пјҲ5 еӨ©пјү
      if(!foot)return;
      if(rs==null){foot.innerHTML='и«Ӣй»һйҒёиө·е§Ӣж—Ҙ';}
      else if(re==null){foot.innerHTML='иө· <b>'+rM+'/'+rs+'</b>пјҢи«ӢеҶҚй»һйҒёзөҗжқҹж—Ҙ';}
      else{foot.innerHTML='е·ІйҒё <b>'+rM+'/'+rs+' вҖ“ '+rM+'/'+re+'</b>пјҲ'+(re-rs+1)+' еӨ©пјү';}
    }
    function draw(){
      title.textContent=y+' е№ҙ '+m+' жңҲ';
      dow.innerHTML='';
      if(o.weeknum){const w=ce('span','cal-dow-c cal-wk-head');w.textContent='йҖұ';dow.appendChild(w);}
      ['ж—Ҙ','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ'].forEach(t=>{const s=ce('span','cal-dow-c');s.textContent=t;dow.appendChild(s);});
      grid.innerHTML='';
      const cells=calGridDays(y,m);
      cells.forEach((c,i)=>{
        if(o.weeknum&&i%7===0){ // жҜҸеҲ—й–Ӣй ӯиЈңйҖұж•ё
          const wk=ce('span','cal-wk');wk.textContent=calWeekNo(c.y,c.m,c.d);grid.appendChild(wk);
        }
        const b=ce('button','cal-day');b.type='button';b.textContent=c.d;
        const cur=!c.out;
        if(c.out)b.classList.add('is-out');
        if(cur&&dis.indexOf(c.d)>=0){b.classList.add('is-disabled');b.disabled=true;}
        if(cur&&y===TY&&m===TM&&todayD===c.d)b.classList.add('is-today');
        if(!range){
          if(cur&&y===selY&&m===selM&&sel===c.d){b.classList.add('is-selected');b.setAttribute('aria-selected','true');}
          if(cur&&events.indexOf(c.d)>=0)b.classList.add('has-event');
        }else if(cur&&y===rY&&m===rM&&rs!=null){
          if(c.d===rs)b.classList.add('is-range-start');
          if(re!=null&&c.d===re)b.classList.add('is-range-end');
          if(re!=null&&c.d>rs&&c.d<re)b.classList.add('is-in-range');
        }
        if(o.interactive&&cur&&!b.disabled){
          b.onclick=()=>{
            if(!range){selY=y;selM=m;sel=c.d;} // е–®ж—Ҙпјҡй»һиӘ°йҒёиӘ°
            else if(!picking){rY=y;rM=m;rs=c.d;re=null;picking=true;} // еҚҖй–“пјҡз¬¬дёҖдёӢпјқиө·й»һ
            else if(y===rY&&m===rM&&c.d>=rs){re=c.d;picking=false;}   // з¬¬дәҢдёӢпјҲдёҚж—©ж–јиө·й»һпјүпјқзөӮй»һ
            else{rY=y;rM=m;rs=c.d;re=null;}                            // й»һеҫ—жҜ”иө·й»һж—©пјқйҮҚж–°иө·з®—
            draw();
          };
        }
        grid.appendChild(b);
      });
      ftxt();
    }
    if(o.interactive){ // дёҠдёӢжңҲйҲ•еҲҮжңҲпјҲзҙ”ж•ёеӯёжҺЁз®—пјҢдёҚзў° Dateпјү
      prev.onclick=()=>{m--;if(m<1){m=12;y--;}draw();};
      next.onclick=()=>{m++;if(m>12){m=1;y++;}draw();};
    }
    draw();
    return root;
  }

  /* ---- жҷӮй–“жё…е–®е·Ҙе» пјҡcalTimeEl(size,o) ----
     o={selected(еҲҶйҗҳеҲ¶), h24, step, live, interactive}пјӣйҒёй …еҜ«жӯ» 09:00вҖ“18:00пјҢй җиЁӯйҒёдёӯ 09:30 */
  function calTimeEl(size,o){
    o=o||{};
    const step=o.step||30;
    const h24=(o.h24!==undefined)?o.h24:true;
    let sel=(o.selected!==undefined)?o.selected:570; // 570 еҲҶпјқ09:30пјҲеҜ«жӯ»зӨәж„Ҹпјү
    sel=Math.round(sel/step)*step; // жҸӣ step жҷӮиІјйҪҠжңҖиҝ‘йҒёй …
    const root=ce('div','cal cal-v-time cal-sz-'+size+(o.live?' live':''));
    const head=ce('div','cal-time-head'); // иЎЁй ӯйҮҚз”Ёж—ўжңү IC_CLOCK
    head.innerHTML='<span class="cal-time-ic">'+IC_CLOCK+'</span><span>йҒёж“ҮжҷӮй–“</span>';
    root.appendChild(head);
    const list=ce('div','cal-time-list');
    const pad=n=>(n<10?'0':'')+n;
    function fmt(t){const h=Math.floor(t/60),mm=t%60;
      return h24?pad(h)+':'+pad(mm):(h<12?'дёҠеҚҲ':'дёӢеҚҲ')+' '+(((h+11)%12)+1)+':'+pad(mm);}
    for(let t=9*60;t<=18*60;t+=step){
      const it=ce('button','cal-time-item'+(t===sel?' is-selected':''));
      it.type='button';it.textContent=fmt(t);
      it.setAttribute('aria-selected',t===sel?'true':'false');
      if(o.interactive){
        it.onclick=()=>{sel=t;
          [...list.children].forEach(x=>{x.classList.remove('is-selected');x.setAttribute('aria-selected','false');});
          it.classList.add('is-selected');it.setAttribute('aria-selected','true');};
      }
      list.appendChild(it);
    }
    root.appendChild(list);
    return root;
  }

  /* зҹ©йҷЈж јпјҡи©І variantГ—size зҡ„йқңж…Ӣзё®еҪұпјҲдёҚдә’еӢ•гҖҒзӨәж„ҸеҖјеҜ«жӯ»пјү */
  function calCell(variant,size){
    if(variant==='time')return calTimeEl(size,{});
    return calMonthEl(size,{range:variant==='range'});
  }

  /* е°ҲжЎҲжӣҙж–°зҙҖйҢ„пјҡи®Җи©Іе°ҲжЎҲ library.version.json зҡ„ historyпјҲжҜҸж¬Ўз¶Із«ҷжүӢеӢ•иӘҝж•ҙ / Figma еҗҢжӯҘзҡ„зҙҖйҢ„пјүпјҢйқһжҜҚжӘ”зүҲжң¬зҙҖйҢ„ */
  function projectChangelogData(){
    const v=window.__dsProjectData&&window.__dsProjectData.version;
    if(!v||!Array.isArray(v.history)||!v.history.length)return [];
    return v.history.slice().reverse().map(h=>({
      v:'v'+h.v, date:(h.at||'').slice(0,10),
      src:h.source==='figma'?'figma':'manual',
      title:h.source==='figma'?'еҫһ Figma еҗҢжӯҘ':'з¶Із«ҷжүӢеӢ•иӘҝж•ҙ',
      items:(h.changes||[]).map(c=>({t:c})) // з„Ў tag вҶ’ зҙ”й»һеҲ—
    }));
  }
  function renderChangelog(view){
    const isProj=!!window.__dsProject;
    const TAG={add:['ж–°еўһ','cl-add'],improve:['е„ӘеҢ–','cl-improve'],fix:['дҝ®жӯЈ','cl-fix']};
    const data=isProj?projectChangelogData():CHANGELOG_DATA;
    const eyebrow=isProj?'Changelog В· жӣҙж–°зҙҖйҢ„':'Release Notes В· зүҲжң¬зҙҖйҢ„';

    const lede=isProj
      ?'йҖҷеҖӢе°ҲжЎҲе…ғд»¶еә«зҡ„жҜҸж¬ЎиӘҝж•ҙвҖ”вҖ”жүӢеӢ•ж”№ tokenпјҸе…ғд»¶пјҢжҲ–еҫһ Figma еҗҢжӯҘеӣһдҫҶзҡ„е…§е®№пјҢжңҖж–°еңЁжңҖдёҠйқўгҖӮ'
      :'йҖҷеҖӢе…ғд»¶еә«зҡ„жҜҸж¬ЎзүҲжң¬жӣҙж–°е…§е®№пјҢжңҖж–°еңЁжңҖдёҠйқўпјҢеҗ„зӯҶжЁҷдёҠ<b>зүҲжң¬</b>иҲҮ<b>зҷјеёғж—Ҙжңҹ</b>гҖӮ';
    let h='<div class="sum-top"><div class="sum-head"><p class="eyebrow">'+eyebrow+'</p><h1>'+h1+'</h1></div></div>'
      +'<p class="lede">'+lede+'</p><div class="head-rule"></div>';
    if(!data.length){ h+='<p class="sub" style="padding:var(--sp-6) 0;">зӣ®еүҚйӮ„жІ’жңүд»»дҪ•иӘҝж•ҙзҙҖйҢ„гҖӮеңЁ Design Token иӘҝеҖјжҲ–еӢҫйҒёе…ғд»¶гҖҒжҢүеҸідёҠгҖҢе„ІеӯҳдёҰжӣҙж–°гҖҚпјҢжҲ–еҫһ Figma еҗҢжӯҘеҫҢпјҢе°ұжңғиЁҳйҢ„еңЁйҖҷиЈЎгҖӮ</p>'; view.innerHTML=h; return; }
    h+='<div class="cl-tl">';
    data.forEach(r=>{
      h+='<section class="cl-entry"><div class="cl-meta"><span class="cl-ver">'+r.v+'</span><time class="cl-date">'+r.date+'</time>'
        +(r.src?'<span class="cl-src cl-src-'+r.src+'">'+(r.src==='figma'?'Figma':'жүӢеӢ•')+'</span>':'')+'</div>'
        +'<div class="cl-body"><h2 class="cl-title">'+r.title+'</h2><ul class="cl-list">';
      r.items.forEach(it=>{

        else{h+='<li><span class="cl-dot"></span><span class="cl-txt">'+it.t+'</span></li>';}
      });
      h+='</ul></div></section>';
    });
    h+='</div>';
    view.innerHTML=h;
  }

          const rows=ce('div','tok-rows');
          gr.rows.forEach(lv=>{const d=gr.def[lv];
            const row=ce('div','tok-row ls2');
            const nm=ce('div','tok-name');nm.textContent=lv.toUpperCase();row.appendChild(nm);
            [['--ls-'+lv,d[0],'еӯ—и·қ дёӯ'],['--ls-en-'+lv,d[1],'еӯ—и·қ иӢұ']].forEach(([pn,pd,flab])=>{
              const c=ce('div','tok-ctl');c.innerHTML=`<span class="tok-flab">${flab}</span>`;const tx=document.createElement('input');tx.type='text';tx.className='tok-hex';tx.value=OV.root[pn]||pd;
              tx.onchange=()=>{OV.root[pn]=tx.value.trim();apply();};c.appendChild(tx);row.appendChild(c);});
            rows.appendChild(row);});
          box.appendChild(rows);bodyEl.appendChild(box);return;
        }
        if(gr.resp){const head=ce('div','tok-modehead resp');head.innerHTML=`<span>Token</span><span>рҹ–Ҙ Desktop</span><span>в–ӯ Tablet</span><span>в–Ҝ Mobile</span>`;box.appendChild(head);}
        const rows=ce('div','tok-rows');
        gr.rows.forEach(([name,lab])=>{
          if(gr.resp){ // йҹҝжҮүејҸпјҡDesktop / Tablet / Mobile дёүж¬„еҗ„иҮӘеҸҜиӘҝ
            const row=ce('div','tok-row resp');row.dataset.tokkey=name;
            const nm=ce('div','tok-name');nm.innerHTML=name+(lab?`<span class="lab">${lab}</span>`:'');
            row.appendChild(nm);

              const cell=ce('div','tok-ctl');cell.innerHTML=`<span class="tok-flab">${flab}</span>`;
              const tx=document.createElement('input');tx.type='text';tx.className='tok-hex';tx.value=OV[bk][name]||gr.def[name][i];
              tx.onchange=()=>{OV[bk][name]=tx.value.trim();apply();};
              cell.appendChild(tx);row.appendChild(cell);});

          const row=ce('div','tok-row');if(gr.kind!=='ref')row.dataset.tokkey=name;
          const nm=ce('div','tok-name');nm.innerHTML=name+(lab?`<span class="lab">${lab}</span>`:'');
          let ctl;
          if(gr.kind==='color'){ctl=mkColorCtl(name,cur,OV.root);}
          else if(gr.kind==='ref'){ctl=ce('div','tok-ctl');const s=ce('div','m-val');s.textContent=cur;s.style.fontSize='var(--fs-h11)';ctl.appendChild(s);}
          else if(gr.kind==='shadow'){ctl=ce('div','tok-ctl');
            const pv=ce('div','tok-shprev');pv.style.boxShadow=cur;

            tx.onchange=()=>{OV.root[name]=tx.value.trim();apply();pv.style.boxShadow=tx.value.trim();};
            ctl.append(pv,tx);}
          else{ctl=ce('div','tok-ctl');
            const tx=document.createElement('input');tx.type='text';tx.className='tok-hex';tx.value=cur;
            tx.onchange=()=>{OV.root[name]=tx.value.trim();apply();};ctl.appendChild(tx);}
          row.append(nm,ctl);rows.appendChild(row);

        box.appendChild(rows);

    (function decorateDisable(){
      const DIS=window.__tokDisabled||(window.__tokDisabled=new Set());
      const edit=!!window.__tokEditMode; bodyEl.classList.toggle('tok-editmode',edit);
      const paint=()=>bodyEl.querySelectorAll('.tok-row[data-tokkey]').forEach(row=>{

      }); paint();
    })();
    // еҢҜеҮәпјҡе®Ңж•ҙ token CSSпјҲL1 primitive base=desktopпјӢL2 lightпҪңdarkпҪңtablet mediaпҪңmobile mediaпјүпјӣеҒңз”ЁиҖ…дёҚеҢҜеҮә
    function buildCSS(){
      const DIS=window.__tokDisabled||new Set();
      let base='';TOK_L1.forEach(gr=>{if(gr.kind==='ref')return;
        if(gr.kind==='typo'){gr.rows.forEach(lv=>{const d=gr.def[lv];
          base+='  --fs-'+lv+':'+(OV.desktop['--fs-'+lv]||gr.sz[lv][0])+';\n  --fw-'+lv+':'+(OV.root['--fw-'+lv]||d[0])+';\n  --lh-'+lv+':'+(OV.root['--lh-'+lv]||d[1])+';\n  --lh-en-'+lv+':'+(OV.root['--lh-en-'+lv]||d[2])+';\n';});return;}
        if(gr.kind==='ls2'){gr.rows.forEach(lv=>{const d=gr.def[lv];base+='  --ls-'+lv+':'+(OV.root['--ls-'+lv]||d[0])+';\n  --ls-en-'+lv+':'+(OV.root['--ls-en-'+lv]||d[1])+';\n';});return;}
        gr.rows.forEach(([n])=>{ if(DIS.has(n))return;
        base+='  '+n+':'+(gr.resp?(OV.desktop[n]||gr.def[n][0]):(OV.root[n]||gr.def[n]))+';\n';});});
      let l='',d='';TOK_L2.forEach(gr=>gr.rows.forEach(([n,lab,lv,dv])=>{if(DIS.has(n))return;l+='  '+n+':'+(OV.root[n]||lv)+';\n';d+='  '+n+':'+(OV.dark[n]||dv)+';\n';}));
      let tab='',mob='';TOK_L1.forEach(gr=>{
        if(gr.kind==='typo'){gr.rows.forEach(lv=>{tab+='  --fs-'+lv+':'+(OV.tablet['--fs-'+lv]||gr.sz[lv][1])+';\n';mob+='  --fs-'+lv+':'+(OV.mobile['--fs-'+lv]||gr.sz[lv][2])+';\n';});return;}
        if(!gr.resp)return;gr.rows.forEach(([n])=>{ if(DIS.has(n))return;
        tab+='  '+n+':'+(OV.tablet[n]||gr.def[n][1])+';\n';mob+='  '+n+':'+(OV.mobile[n]||gr.def[n][2])+';\n';});});
      return '/* Design TokenпјҲv0 зЁ®еӯҗпјӣеҗ« light/dark иҲҮйҹҝжҮүејҸ device modeпјү*/\n:root{\n'+base+l+'}\n'+
        ':root[data-theme="dark"]{\n'+d+'}\n@media(max-width:1023px){:root{\n'+tab+'}}\n@media(max-width:767px){:root{\n'+mob+'}}\n';
    }
    document.getElementById('tokCopy').onclick=()=>{navigator.clipboard.writeText(buildCSS()).then(()=>{const s=document.getElementById('tokCopy').querySelector('span');s.textContent='е·ІиӨҮиЈҪ вң“';setTimeout(()=>s.textContent='иӨҮиЈҪжӯӨй Ғ CSS',1500);});};
  }

    view.innerHTML=`<div class="sum-top"><div class="sum-head"><p class="eyebrow">Overview В· йңҖжұӮеҢҜзёҪ</p><h1>йңҖжұӮеҢҜзёҪ</h1></div>
        <button class="btn v-soft i-secondary sz-s st-default live" id="copyBtn"><span>иӨҮиЈҪжӯӨй Ғ JSON</span></button></div>
      <p class="lede">жҜҸеҖӢе…ғд»¶<b>жңҖеҫҢйҒёе®ҡзҡ„иӨҮйӣңеәҰ</b>вҖ”вҖ”е…Ҳдҫқ<b>еӣӣеӨ§еҲҶйЎһ</b>еұ•й–ӢпјҢеҶҚеұ•й–ӢзүҢеҚЎзңӢи©Іе…ғд»¶зҡ„<b>еҜҰйҡӣж“ҚдҪң</b>пјҢзүҢеҚЎеүҚзҡ„еӢҫйҒёжЎҶжұәе®ҡ<b>иҰҒдёҚиҰҒз”ўеҮә</b>гҖӮеӣһеҗ„е…ғд»¶з”ЁгҖҢи®Ҡж•ёзҜ©йҒёеҷЁгҖҚиӘҝж•ҙзө„еҗҲпјҢйҖҷй ҒеҚіжҷӮеҪҷж•ҙгҖӮ</p>
      <div class="head-rule"></div>
      <div class="sum-actions">
        <button class="aitoggle" id="aiBtn">${ICON_SPARK}<span>AI е»әиӯ°з”ўеҮә</span><span class="sw"></span></button>
        <label class="sum-selall"><input type="checkbox" id="selAllChk"><span>е…ЁйҒё</span></label>
        <div class="spacer"></div>
        <div class="sumtotal" id="sumTotal"></div>
      </div>
      <div id="sumBody"></div>`;
    const allKeys=Object.keys(DIAL_SPECS);
    function syncTotal(){let comp=0,vari=0;allKeys.forEach(id=>{if(SUMSEL.has(id)){comp++;vari+=rep[id].count;}});
      document.getElementById('sumTotal').innerHTML=`е·ІйҒё <b>${comp}</b>/${allKeys.length} еҖӢе…ғд»¶ В· е…ұ <b>${vari}</b> еҖӢи®Ҡй«”е°Үе»әз«Ӣ`;
      const sa=document.getElementById('selAllChk');if(sa){sa.checked=comp===allKeys.length&&comp>0;sa.indeterminate=comp>0&&comp<allKeys.length;}}
    const pageOf=id=>DIAL_PAGE[id]||id;
    // дҫқеҒҙйӮҠж¬„еӣӣеӨ§зҫӨеҲҶзө„пјҲDIAL_SPECS id дҫқе°ҚжҮүй ҒйқўжӯёзҫӨпјҢеҰӮ checkbox/radioвҶ’selector дҪөе…Ҙ Basicпјү
    const GROUPS=NAV.map(g=>{const order=g.items.map(it=>it.id);
      const ids=allKeys.filter(id=>order.includes(pageOf(id))).sort((a,b)=>order.indexOf(pageOf(a))-order.indexOf(pageOf(b)));
      return {name:g.group,emoji:g.emoji,ids};}).filter(g=>g.ids.length);
    const body=document.getElementById('sumBody');
    function onManual(){if(aiOn){aiOn=false;aiSnapshot=null;const b=document.getElementById('aiBtn');if(b)b.classList.remove('on');}} // жүӢеӢ•ж”№еӢ•еҚіи„«йӣў AI е»әиӯ°
    const setSel=(id,on)=>{on?SUMSEL.add(id):SUMSEL.delete(id);};
    function updateCatCounts(){body.querySelectorAll('.sumcat').forEach((sec,i)=>{const g=GROUPS[i];if(!g)return;
      const selN=g.ids.filter(id=>SUMSEL.has(id)).length;const n=sec.querySelector('.sumcat-n');if(n)n.textContent=selN+' / '+g.ids.length;});}

    /* Live жҺӣијүпјҡBasic иө° LIVE[id] е…ұз”Ё registryпјӣComplex д»ҘеҫҢзҡ„ live demo и—ҸеңЁеҗ„иҮӘ buildX зҡ„
       гҖҢеҜҰйҡӣдә’еӢ• LiveгҖҚж®ө вҶ’ йӣўеұҸи·‘дёҖж¬Ў buildгҖҒжҠҪеҮәи©Іж®өжҗ¬йҖІеҚЎзүҮпјҲDOM зҙ” closureгҖҒеҸҜе®үе…Ёжҗ¬з§»пјүгҖӮ */
    function mountSummaryLive(id,host){
      if(LIVE[id]){LIVE[id](host);return;}
      if(BUILD[id]){
        const tmp=ce('div');tmp.setAttribute('aria-hidden','true');
        tmp.style.cssText='position:absolute;left:-99999px;top:0;width:820px;pointer-events:none;';
        document.body.appendChild(tmp);let moved=false;
        try{ BUILD[id](tmp);
          const live=[...tmp.querySelectorAll('section.block')].find(s=>{const h=s.querySelector(':scope>h2');return h&&/еҜҰйҡӣ[дә’ж“Қ][еӢ•дҪң] Live/.test(h.textContent);});
          if(live){const h2=live.querySelector(':scope>h2');if(h2)h2.remove();const sub=live.querySelector(':scope>.sub');if(sub)sub.remove();live.classList.remove('block');host.appendChild(live);moved=true;}
        }catch(e){console.warn('summary live extract fail:',id,e);}

      }
      host.innerHTML='<div class="sc-live-na">жӯӨе…ғд»¶зҡ„еҜҰйҡӣж“ҚдҪңзӨәзҜ„е°ҡжңӘжҸҗдҫӣгҖӮ<button class="sc-live-open" type="button">й–Ӣе•ҹе…ғд»¶й Ғ вҶ’</button></div>';

    /* е–®йЎҶеҸҜеұ•й–ӢзүҢеҚЎпјҲaccordion зүҲеһӢпјӣжІҝз”ЁеҺҹжң¬ sumcardпјӢlazy Liveпјү */
    function makeCard(id){const spec=DIAL_SPECS[id],rec=rep[id];
      const card=ce('div','sumcard collapsed');card.dataset.id=id;
      let axesHTML='';
      spec.order.forEach(k=>{const all=spec.axes[k];const sel=new Set(rec[k]);
        const chips=all.map(v=>`<span class="sum-chip ${sel.has(v)?'on':'off'}">${(spec.zh[k]&&spec.zh[k][v])||v}В·${v}</span>`).join('');
        axesHTML+=`<div class="sum-axis"><span class="sa-name">${spec.zh.axisName[k]}</span><span class="sa-chips">${chips}</span><span class="sa-n">${rec[k].length}/${all.length}</span></div>`;});
      card.innerHTML=`<div class="sc-head">
          <label class="sc-check"><input type="checkbox" ${SUMSEL.has(id)?'checked':''}></label>

          <span class="sc-chevron">${ICON_CARET}</span>
        </div>
        <div class="sc-body">${axesHTML}<div class="sc-sub">еҜҰйҡӣж“ҚдҪң Live</div><div class="sc-live"></div>
          <div class="sc-foot"><button class="adjustbtn">${ICON_PENCIL}<span>жҲ‘иҰҒиӘҝж•ҙ</span></button></div></div>`;
      card.classList.toggle('unpicked',!SUMSEL.has(id));

      chk.onchange=()=>{setSel(id,chk.checked);card.classList.toggle('unpicked',!chk.checked);onManual();syncTotal();updateCatCounts();};
      const head=card.querySelector('.sc-head'),liveHost=card.querySelector('.sc-live');
      head.onclick=()=>{const willOpen=card.classList.contains('collapsed');card.classList.toggle('collapsed');
        if(willOpen && !liveHost.dataset.mounted){mountSummaryLive(id,liveHost);liveHost.dataset.mounted='1';}};
      card.querySelector('.adjustbtn').onclick=()=>renderView(pageOf(id));
      return card;}

    /* з·Ҡж№Ҡжё…е–®еҲ—пјҲlist зүҲеһӢпјҡдёҖеҲ—дёҖе…ғд»¶пјҢй»һеҲ—и·ій ҒгҖҒеҸіеҒҙз®ӯй ӯиӘҝж•ҙпјү */
    function makeRow(id){const spec=DIAL_SPECS[id],rec=rep[id];
      const row=ce('div','sumrow'+(SUMSEL.has(id)?'':' unpicked'));row.dataset.id=id;
      const cb=ce('label','sr-check');cb.innerHTML=`<input type="checkbox" ${SUMSEL.has(id)?'checked':''}>`;
      cb.onclick=e=>e.stopPropagation();
      cb.querySelector('input').onchange=e=>{setSel(id,e.target.checked);row.classList.toggle('unpicked',!e.target.checked);onManual();syncTotal();updateCatCounts();};
      const nm=ce('span','sr-name');nm.textContent=spec.label;

      const go=ce('button','sr-go');go.innerHTML=IC_ARROW_RIGHT;go.setAttribute('aria-label','иӘҝж•ҙ');
      go.onclick=e=>{e.stopPropagation();renderView(pageOf(id));};
      row.append(cb,nm,cnt,go);row.onclick=()=>renderView(pageOf(id));
      return row;}

    /* з¶Іж јзЈҡпјҲgrid зүҲеһӢпјҡе°ҸеҚЎпјӢеӢҫйҒёпјӢи®Ҡй«”ж•ёпјҢй»һзЈҡи·ій Ғпјү */
    function makeTile(id){const spec=DIAL_SPECS[id],rec=rep[id];
      const tile=ce('div','sumtile'+(SUMSEL.has(id)?'':' unpicked'));tile.dataset.id=id;
      tile.innerHTML=`<label class="st-check"><input type="checkbox" ${SUMSEL.has(id)?'checked':''}></label>
        <span class="st-name">${spec.label}</span>
        <span class="st-count"><b>${rec.count}</b> и®Ҡй«”</span>
        <button class="st-go" aria-label="иӘҝж•ҙ">${ICON_PENCIL}</button>`;
      const inp=tile.querySelector('input');
      tile.querySelector('.st-check').onclick=e=>e.stopPropagation();
      inp.onchange=()=>{setSel(id,inp.checked);tile.classList.toggle('unpicked',!inp.checked);onManual();syncTotal();updateCatCounts();};
      tile.querySelector('.st-go').onclick=e=>{e.stopPropagation();renderView(pageOf(id));};
      tile.onclick=()=>renderView(pageOf(id));
      return tile;}

    /* еҲҶйЎһеӨ–ж®јпјҲеҸҜжҠҳз–ҠпјӣдёүзүҲеһӢе…ұз”ЁпјҢй җиЁӯж”¶еҗҲпјқе…ҲзңӢеҲҶйЎһеҶҚеұ•й–Ӣпјү */
    function catShell(g,inner){const sec=ce('div','sumcat collapsed');
      const selN=g.ids.filter(id=>SUMSEL.has(id)).length;
      const head=ce('button','sumcat-h');
      head.innerHTML=`<span class="sumcat-t">${g.emoji?g.emoji+' ':''}${g.name}</span>
        <span class="sumcat-n">${selN} / ${g.ids.length}</span><span class="sumcat-caret">${ICON_CARET}</span>`;
      head.onclick=()=>sec.classList.toggle('collapsed');
      const bw=ce('div','sumcat-body');bw.appendChild(inner);
      sec.append(head,bw);return sec;}

    function renderBody(){body.innerHTML='';body.className='sum-body sum-'+sumLayout;
      GROUPS.forEach(g=>{let inner;
        if(sumLayout==='accordion'){inner=ce('div','sumcat-cards');g.ids.forEach(id=>inner.appendChild(makeCard(id)));}
        else if(sumLayout==='list'){inner=ce('div','sumlist');g.ids.forEach(id=>inner.appendChild(makeRow(id)));}
        else{inner=ce('div','sumgrid');g.ids.forEach(id=>inner.appendChild(makeTile(id)));}
        body.appendChild(catShell(g,inner));});}

    renderBody();syncTotal();
    const selAll=document.getElementById('selAllChk');
    if(selAll)selAll.onchange=()=>{const on=selAll.checked;allKeys.forEach(id=>on?SUMSEL.add(id):SUMSEL.delete(id));onManual();renderBody();syncTotal();}; // е…ЁйҒё/е…ЁдёҚйҒё вҶ’ йҮҚз№ӘдёүзүҲеһӢеҚЎзүҮпјӢжӣҙж–°зёҪиЁҲ
    const aiBtn=document.getElementById('aiBtn');
    aiBtn.classList.toggle('on',aiOn);
    aiBtn.onclick=()=>{ // AI е»әиӯ° toggleпјҡй–ӢвҶ’еҘ—з”Ёе»әиӯ°дёҰеӯҳеҝ«з…§пјӣй—ңвҶ’йӮ„еҺҹй»һж“ҠеүҚйҒёж“Ү
      if(!aiOn){aiSnapshot=[...SUMSEL];SUMSEL.clear();RECOMMEND.forEach(x=>SUMSEL.add(x));aiOn=true;}
      else{if(aiSnapshot){SUMSEL.clear();aiSnapshot.forEach(x=>SUMSEL.add(x));}aiSnapshot=null;aiOn=false;}
      aiBtn.classList.toggle('on',aiOn);renderBody();syncTotal();
    };
    document.getElementById('copyBtn').onclick=()=>{
      const json={};allKeys.forEach(id=>{if(!SUMSEL.has(id))return;json[id]={};DIAL_SPECS[id].order.forEach(k=>json[id][k]=rep[id][k]);json[id].count=rep[id].count;});
      json._selected=[...SUMSEL];json._total=[...SUMSEL].reduce((a,id)=>a+rep[id].count,0);
      navigator.clipboard.writeText(JSON.stringify(json,null,2)).then(()=>{const s=document.getElementById('copyBtn').querySelector('span');s.textContent='е·ІиӨҮиЈҪ вң“';setTimeout(()=>s.textContent='иӨҮиЈҪжӯӨй Ғ JSON',1600);});
    };
  }

  /* ===== жӘўиҰ–еҲҮжҸӣ ===== */
  let current='summary';
  /* URL hash иЁҳдҪҸз•¶еүҚжӘўиҰ–пјҡйҮҚж–°ж•ҙзҗҶпјҸж·ұйҖЈзөҗжңғеҒңеңЁеҺҹе…ғд»¶й ҒпјҢдёҚи·іеӣһеҢҜеҮәйңҖжұӮ */
  function hashId(){const h=decodeURIComponent(location.hash.replace(/^#/,''));if(h==='summary'||h==='tokens'||h==='guideline'||h==='guide'||h==='changelog'||h==='settings')return h;
    const ids=NAV.flatMap(g=>g.items).map(x=>x.id);return ids.includes(h)?h:null;}
  function renderView(id){
    LIVE_REFRESH.clear(); // жҸӣй Ғжё…жҺүиҲҠ Live зҜ©йҒёеҷЁйҖЈеӢ•иЁ»еҶҠпјҢйҒҝе…ҚзҙҜз©Қ
    current=id;const view=document.getElementById('view');
    if(hashId()!==id)location.hash=id; // еҜ«е…Ҙ hash дҫӣйҮҚж•ҙеҫҢйӮ„еҺҹ
    const item=NAV.flatMap(g=>g.items).find(x=>x.id===id);
    if(id==='summary'){renderSummary(view);}
    else if(id==='guide'){renderGuide(view);}
    else if(id==='changelog'){renderChangelog(view);}
    else if(id==='guideline'){renderGuideline(view);}
    else if(id==='settings'){renderSettings(view);}
    else if(id==='tokens'){renderTokens(view);}
    else if(id==='button'){view.innerHTML=buttonViewHTML();renderSpecStrip();renderAxes();renderMatrix();renderSizes();renderBooleans();renderCount();renderLive();renderBindPanel(view,'button');}
    else if(BUILD[id]){BUILD[id](view);renderBindPanel(view,id);} // йӣҶдёӯжҺӣз¶Ғе®ҡеҚЎпјҡжңүе®ҡзҫ© TOKEN_SLOTS зҡ„е…ғд»¶иҮӘеӢ•еҮәзҸҫпјҢз„ЎеүҮ renderBindPanel е…§йғЁ early-return
    else{view.innerHTML=`<div class="placeholder"><div class="em">рҹ§©</div><h2>${item.name}</h2><p>йҖҷйЎҶе…ғд»¶йӮ„жІ’е®ҡжЎҲгҖӮе…ҲеңЁе·Іе®ҢжҲҗзҡ„е…ғд»¶дёҠжҠҠгҖҢе…ғд»¶и©ІеӨҡиӨҮйӣңгҖҚзҡ„жЁЎејҸе®ҡдёӢдҫҶпјҢжҲ‘еҶҚз”ЁеҗҢдёҖеҘ—ж–№ејҸеҘ—еҲ°йҖҷиЈЎгҖӮ</p><div class="axhint">й җе®ҡи»ёпјҡvariant Г— state Г— sizeпјҲпјӢеҗ„иҮӘзҡ„е…§е®№и»ёпјү</div></div>`;}
    document.querySelectorAll('.nav-item').forEach(el=>el.setAttribute('aria-current',el.dataset.id===id));
    if(window.innerWidth<=900)document.getElementById('shell').classList.remove('nav-open'); // зӘ„иһўе№•йҒёе®ҢиҮӘеӢ•ж”¶иө·
    const _m=document.querySelector('.main');if(_m)_m.scrollTo(0,0); // app-shellпјҡжҚІ main е®№еҷЁпјҲйқһ documentпјү
    buildTOC(); // жҸӣй ҒеҫҢйҮҚе»әеҸіз·Јжң¬й Ғзӣ®йҢ„
    armReveal(); // жҸӣй ҒеҫҢзӮәжң¬й Ғж®өиҗҪжҺӣжҚІеӢ•йҖІе ҙпјҲfade-upпјү
  }
  function armReveal(){ // е…Ёз«ҷж®өиҗҪйҖІе ҙпјҡйҰ–еұҸеҸҜиҰӢж®өиҗҪзўәе®ҡжҖ§ж·Ўе…ҘпјҲrAFпјүпјӢе…¶йӨҳжҚІеӢ•йҖІиҰ–зӘ—жүҚи§ёзҷјпјӣSPA жҸӣй ҒйҮҚе»әе…§е®№ж•…жҜҸж¬ЎжҸӣй ҒйҮҚжҺӣ
    const view=document.getElementById('view'); if(!view) return;
    if(view.__rvObs){view.__rvObs.disconnect();view.__rvObs=null;} // е…Ҳж–·й–ӢиҲҠ observer йҒҝе…ҚзҙҜз©Қ
    if(view.__rvRaf){cancelAnimationFrame(view.__rvRaf);view.__rvRaf=null;}
    if(matchMedia('(prefers-reduced-motion:reduce)').matches) return; // е°ҠйҮҚзі»зөұгҖҢжёӣе°‘еӢ•ж…ӢгҖҚиЁӯе®ҡпјҡдёҚйҡұи—ҸгҖҒдёҚеӢ•з•«
    const SECT='.gd-sec,.block,.tok-sec,.cl-entry,.dg-sec,.sumcat,.placeholder'; // е…§е®№ж®өиҗҪе–®дҪҚпјҲhero жңүиҮӘе·ұзҡ„ијүе…ҘеӢ•з•«пјҢдёҚзҙҚе…Ҙпјү
    const SKIP='.head-rule'; // еҲҶйҡ”з·ҡзӯүйқһе…§е®№е…ғзҙ жҺ’йҷӨпјҡдёҚеҠ  opacity:0пјҢйҒҝе…ҚеӢ•з•«жІ’ж’ӯеҲ°жҷӮж•ҙжўқж¶ҲеӨұ
    const guide=view.querySelector(':scope > .gd-guide');
    const root=guide||view; // guide й ҒйҷҚдёҖеұӨйҖІ .gd-guideпјҲи·ійҒҺ heroпјүпјӣе…¶йӨҳй Ғд»Ҙ #view зӮәж №
    const units=[...root.querySelectorAll(SECT)].filter(el=>!el.parentElement.closest(SECT) && !el.closest('.gd-hero')); // жңҖеӨ–еұӨж®өиҗҪе–®дҪҚпјҲеҺ»е·ўзӢҖгҖҒжҺ’йҷӨ hero е…§пјү
    const loose=[...root.children].filter(el=>!el.classList.contains('gd-hero') && el.tagName!=='FOOTER' && !el.matches(SKIP) && !el.matches(SECT) && !el.querySelector(SECT)); // й ӮеұӨеҚҖеЎҠжң¬иә«дёҚеҗ«ж®өиҗҪе–®дҪҚиҖ…пјҲеҗ„й ҒжЁҷйЎҢй ӯйғЁгҖҒtokens еҚЎзүҮеҚҖзӯүпјүж•ҙеЎҠзҙҚе…Ҙ вҶ’ и®“гҖҢз¬¬дёҖеҖӢж®өиҗҪгҖҚд№ҹж·Ўе…Ҙ
    const targets=[...loose,...units].sort((a,b)=> (a.compareDocumentPosition(b)&Node.DOCUMENT_POSITION_FOLLOWING)?-1:1); // дҫқ DOM й ҶеәҸжҺ’еәҸпјҢstagger жүҚжӯЈзўә
    if(!targets.length) return;
    const main=document.querySelector('.main'); // жҚІеӢ•е®№еҷЁпјқIntersectionObserver зҡ„ root
    targets.forEach(el=>el.classList.add('rv')); // еҗҢжӯҘе…Ҳйҡұи—ҸпјҲopacity:0пјүпјҡдҝқиӯүйҰ–е№Җе°ұжҳҜйҡұи—Ҹж…Ӣ
    const obs=new IntersectionObserver(ents=>{ ents.forEach(e=>{ // жҚІеӢ•йҖІиҰ–зӘ—гҖҒжҲ–е·ІжҚІйҒҺиҰ–зӘ—дёҠз·Ј вҶ’ йЎҜзӨәпјҢйҒҝе…Қеҝ«йҖҹжҚІеӢ•/TOC и·іиҪүзҡ„ж®өиҗҪеҚЎеңЁйҡұи—Ҹ
      if(e.isIntersecting || (e.rootBounds && e.boundingClientRect.top < e.rootBounds.top)){ e.target.classList.add('rv-in'); obs.unobserve(e.target); } }); },
      {root:main,rootMargin:'0px 0px -10% 0px',threshold:.02});
    view.__rvObs=obs;
    view.__rvRaf=requestAnimationFrame(()=>{ view.__rvRaf=null; // дёҖж¬Ў rAF зӯү layout з©©е®ҡеҶҚйҮҸдҪҚзҪ®пјҲ@keyframes еӢ•з•«дёҚйңҖйқ е№Җй–“йҡ”и§ёзҷјпјү
      const mr=main.getBoundingClientRect();
      const inView=[], below=[];

      const pool=(TOK_POOLS[s.cat]||[]).map(tok=>({value:tok,label:tok+(tokVal(tok)?'пјҲ'+tokVal(tok)+'пјү':'')+(tok===s.def?' В· й җиЁӯ':'')}));
      const picker=ddField('outline',Object.assign({options:pool,value:bc[s.slot]||s.def},
        isProj?{onChange:v=>{ if(v===s.def){delete bc[s.slot];}else{bc[s.slot]=v;} applyCompBindings(); }}:{})); // жҜҚеә«дёҚжҺҘ onChangeпјҲпјӢCSS pointer-events:none ж“Ӣдә’еӢ•пјү
      const fh=ce('span','fh');fh.textContent='й җиЁӯ '+s.def;
      fw.append(fl,picker,fh);rows.appendChild(fw);
    });
    bodyEl.appendChild(rows);
    card.append(head,bodyEl);
    const sec=ensureVarTokenSection(host);          // еҸ–еҫ—пјҲжҲ–е»әз«ӢпјүгҖҢи®Ҡж•ёиҲҮ TokenгҖҚж®өиҗҪ
    if(sec){ const d=sec.querySelector('.bh-d'); if(d)d.textContent=isProj?'зҜ©йҒёиҰҒдҝқз•ҷзҡ„и®Ҡй«”пјҢдёҰжҠҠеұ¬жҖ§жҸӣз¶Ғе…¶д»– token':'зҜ©йҒёи®Ҡй«”пјҢдёҰжӘўиҰ–еҸҜжҸӣз¶Ғзҡ„ tokenпјҲжҜҚеә«е”Ҝи®Җпјү'; sec.appendChild(card); } // жңүз¶Ғе®ҡеҚЎвҶ’еүҜжЁҷиЈңдёҠ token иӘӘжҳҺ
    else host.appendChild(card);
  }
  function dsBuildExport(){
    const logo={light:PROJECT_LOGOS.light||null,dark:PROJECT_LOGOS.dark||null};
    const rep=choiceReport();
    const comp={selected:[...SUMSEL],axes:{},counts:{}};
    [...SUMSEL].forEach(id=>{const spec=DIAL_SPECS[id];if(!spec||!rep[id])return;comp.axes[id]={};spec.order.forEach(k=>comp.axes[id][k]=rep[id][k]);comp.counts[id]=rep[id].count;});
    const disabled=[...(window.__tokDisabled||[])].sort();
    const bindings=window.__compBindings||{};
    const state={tokens:window.__tokOverrides||{},logo,disabled,bindings,components:comp};
    return {tokens:{overrides:window.__tokOverrides||{},logo,disabled,bindings},components:comp,state};
  }
  function dsDownload(name,obj){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:'application/json'}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
  /* в”Җв”Җ е°ҲжЎҲе…ғд»¶еә«зүҲжң¬еҢ–пјҲPhase FпјүпјҡCTAпјқе„ІеӯҳдёҰжӣҙж–° vNгҖҒйҳІе‘ҶеҪҲзӘ—гҖҒйҖІз«ҷзүҲжң¬жҜ”е°ҚпјӣеҸӘеӢ•е°ҲжЎҲеұӨгҖҒдёҚзў°е…ұз”Ёеј•ж“Һ в”Җв”Җ */
  function dsVerKey(){return 'dsv:'+(window.__dsProject||'');}
  function dsToast(msg){const b=document.getElementById('dsExportBtn');if(!b)return;const s=b.querySelector('span');const o=s.dataset.o||s.textContent;s.textContent=msg;setTimeout(()=>{s.textContent=o;},1800);}
  function updateBadgeVersion(){
    const b=document.getElementById('dsExportBtn');if(b){const s=b.querySelector('span');s.textContent=window.__dsProject?'е„ІеӯҳдёҰжӣҙж–°':'еҢҜеҮәпјҲдёӢијүпјү';s.dataset.o=s.textContent;}
    const pj=document.getElementById('dsBadgeProj');if(pj&&window.__dsProject){pj.textContent=window.__dsProject+' В· v'+(window.__dsVersion||0);} // зүҲжң¬иҷҹи·ҹи‘—е°ҲжЎҲеҗҚиө°
    const sf=document.getElementById('sbFoot');if(sf)sf.innerHTML=sbFootHTML(); // йҒёе–®еә•йғЁзүҲжң¬иҷҹеҗҢжӯҘ
    const fv=document.getElementById('ftrVer');if(fv){const ver=window.__dsProject?('v'+(window.__dsVersion||0)):((CHANGELOG_DATA[0]&&CHANGELOG_DATA[0].v)||'');fv.textContent=ver?' В· '+ver:'';} // footer е°ҫз«ҜзүҲжң¬иҷҹ
  }
  // зӣ®еүҚзӢҖж…Ӣзҡ„еҸҜжҜ”ијғеҝ«з…§пјҲtoken override + logo + йҒёз”Ёе…ғд»¶ + еҗ„и»ёпјү
  function dsSnap(){
    const rep=(typeof choiceReport==='function')?choiceReport():{}; const axes={};
    [...SUMSEL].forEach(id=>{const spec=DIAL_SPECS[id];if(spec&&rep[id]){axes[id]={};spec.order.forEach(k=>axes[id][k]=(rep[id][k]||[]));}});
    return {ov:JSON.parse(JSON.stringify(window.__tokOverrides||{})),logo:{light:PROJECT_LOGOS.light||null,dark:PROJECT_LOGOS.dark||null},sel:[...SUMSEL].sort(),axes,disabled:[...(window.__tokDisabled||[])].sort(),bindings:JSON.parse(JSON.stringify(window.__compBindings||{}))};
  }
  // baseline вҶ’ current е·®з•° вҶ’ [{t:'add'|'rm'|'chg', s}]
  function dsDiff(a,b){
    const out=[];
    ['root','dark','desktop','tablet','mobile'].forEach(m=>{
      const oa=(a.ov&&a.ov[m])||{}, ob=(b.ov&&b.ov[m])||{};
      new Set([...Object.keys(oa),...Object.keys(ob)]).forEach(k=>{
        const va=oa[k], vb=ob[k]; if(va===vb)return;
        const tag=m==='root'?'':' ('+m+')';
        if(va===undefined)out.push({t:'add',s:'token '+k+tag+' вҶ’ '+vb});
        else if(vb===undefined)out.push({t:'rm',s:'token '+k+tag+' з§»йҷӨ'});
        else out.push({t:'chg',s:'token '+k+tag+'пјҡ'+va+' вҶ’ '+vb});
      });
    });
    ['light','dark'].forEach(k=>{ if((a.logo[k]||null)!==(b.logo[k]||null)) out.push({t:'chg',s:'logoпјҲ'+k+'пјүжӣҙж–°'}); });
    const sa=new Set(a.sel), sb=new Set(b.sel);
    b.sel.filter(x=>!sa.has(x)).forEach(id=>out.push({t:'add',s:'е…ғд»¶ '+id}));
    a.sel.filter(x=>!sb.has(x)).forEach(id=>out.push({t:'rm',s:'е…ғд»¶ '+id+' з§»йҷӨ'}));
    b.sel.filter(x=>sa.has(x)).forEach(id=>{
      const axa=a.axes[id]||{}, axb=b.axes[id]||{};
      new Set([...Object.keys(axa),...Object.keys(axb)]).forEach(k=>{
        const la=(axa[k]||[]).join(','), lb=(axb[k]||[]).join(',');
        if(la!==lb)out.push({t:'chg',s:id+' В· '+k+'пјҡ['+la+'] вҶ’ ['+lb+']'});
      });
    });
    const da=new Set(a.disabled||[]), db=new Set(b.disabled||[]);
    (b.disabled||[]).filter(x=>!da.has(x)).forEach(k=>out.push({t:'rm',s:'еҒңз”Ё '+k}));
    (a.disabled||[]).filter(x=>!db.has(x)).forEach(k=>out.push({t:'add',s:'жҒўеҫ© '+k}));
    const ba=a.bindings||{}, bb=b.bindings||{};
    new Set([...Object.keys(ba),...Object.keys(bb)]).forEach(cid=>{
      const sa=ba[cid]||{}, sb=bb[cid]||{};
      new Set([...Object.keys(sa),...Object.keys(sb)]).forEach(slot=>{
        const va=sa[slot], vb=sb[slot]; if(va===vb)return;
        if(va===undefined)out.push({t:'add',s:'з¶Ғе®ҡ '+cid+' '+slot+' вҶ’ '+vb});
        else if(vb===undefined)out.push({t:'rm',s:'з¶Ғе®ҡ '+cid+' '+slot+' йӮ„еҺҹ'});
        else out.push({t:'chg',s:'з¶Ғе®ҡ '+cid+' '+slot+'пјҡ'+va+' вҶ’ '+vb});
      });
    });
    return out;
  }
  function dsDialog(o){
    const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
    const ovl=document.createElement('div');ovl.className='ds-ovl';
    const dlg=document.createElement('div');dlg.className='ds-dlg';
    let bd;
    if(o.changes&&o.changes.length)bd='<ul class="ds-chg">'+o.changes.map(c=>'<li class="'+c.t+'">'+esc(c.s)+'</li>').join('')+'</ul>';
    else if(o.changes)bd='<div style="color:var(--muted);font-size:var(--fs-h11)">жІ’жңүи®ҠжӣҙгҖӮ</div>';
    else bd=o.bodyHTML||'';
    dlg.innerHTML='<div class="ds-dlg-hd"><div class="ds-dlg-ttl">'+esc(o.title)+'</div>'+(o.sub?'<div class="ds-dlg-sub">'+esc(o.sub)+'</div>':'')+'</div><div class="ds-dlg-bd">'+bd+'</div>';
    const ft=document.createElement('div');ft.className='ds-dlg-ft';
    const close=()=>ovl.remove();
    if(o.cancelText){const c=mkBtn({variant:'outline',intent:'secondary',size:'s',isLive:true});c.type='button';c.querySelector('span').textContent=o.cancelText;c.onclick=close;ft.appendChild(c);}
    if(o.okText){const k=mkBtn({variant:'solid',intent:'primary',size:'s',isLive:true});k.type='button';k.querySelector('span').textContent=o.okText;k.onclick=()=>{close();o.onOk&&o.onOk();};ft.appendChild(k);}
    dlg.appendChild(ft);ovl.appendChild(dlg);document.body.appendChild(ovl);
    ovl.addEventListener('click',e=>{if(e.target===ovl)close();});
  }
  // CTAпјҡе…Ҳз®— diffпјҢзўәиӘҚеҶҚеҜ«пјӣз„Ў projпјҲе…¬й–Ӣ/з„Ў serverпјүд»ҚзөҰ diff зўәиӘҚеҫҢдёӢијү
  function dsSave(){
    const proj=window.__dsProject;
    const changes=dsDiff(window.__dsBaseline||dsSnap(), dsSnap());
    if(!proj){ dsDialog({title:'еҢҜеҮәпјҲдёӢијүпјү',sub:changes.length+' й …и®Ҡжӣҙ',changes,okText:'дёӢијү',cancelText:'еҸ–ж¶Ҳ',onOk:dsExport}); return; }
    if(!changes.length){ dsToast('з„Ўи®Ҡжӣҙ'); return; }
    const v=window.__dsVersion||0;
    dsDialog({title:'е„ІеӯҳдёҰжӣҙж–°жӯӨе…ғд»¶еә«',sub:'v'+v+' вҶ’ v'+(v+1)+'гҖҖВ·гҖҖ'+changes.length+' й …и®Ҡжӣҙ',changes,okText:'зўәе®ҡжӣҙж–°',cancelText:'еҸ–ж¶Ҳ',onOk:()=>dsCommit(changes)});
  }
  function dsCommit(changes){
    const proj=window.__dsProject; const payload=dsBuildExport();
    payload.version={historyEntry:{at:new Date().toISOString(),source:'website',changes:changes.map(c=>c.s)}};
    fetch('/api/project/'+encodeURIComponent(proj)+'/export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
      .then(r=>r.json()).then(()=>{ window.__dsVersion=(window.__dsVersion||0)+1; window.__dsBaseline=dsSnap(); localStorage.setItem(dsVerKey(),String(window.__dsVersion)); updateBadgeVersion(); dsToast('е·Іжӣҙж–° вҶ’ v'+window.__dsVersion+' вң“'); })
      .catch(()=>{ const p=dsBuildExport(); dsDownload('tokens.export.json',p.tokens);dsDownload('components.export.json',p.components); dsToast('з„Ў server В· ж”№з”ЁдёӢијү'); });
  }
  // зҙ”дёӢијүпјҲе…¬й–ӢжЁЎејҸжҲ– server fallbackпјү
  function dsExport(){ const p=dsBuildExport(); dsDownload('tokens.export.json',p.tokens);dsDownload('components.export.json',p.components); dsToast('е·ІдёӢијү вң“'); }
  // йҖІз«ҷзүҲжң¬жҜ”е°Қпјҡе°ҲжЎҲеұӨзүҲжң¬иў«пјҲFigma еҗҢжӯҘзӯүпјүжҺЁйҖІйҒҺ вҶ’ и·ігҖҢзүҲжң¬е·Іжӣҙж–°гҖҚиӘӘжҳҺ
  function dsVersionPopup(){
    const proj=window.__dsProject; if(!proj)return;
    const vinfo=window.__dsProjectData&&window.__dsProjectData.version; if(!vinfo)return;
    const cur=vinfo.version||0;
    const seenRaw=localStorage.getItem(dsVerKey());
    const seen=seenRaw==null?null:parseInt(seenRaw,10);
    if(seen==null){ localStorage.setItem(dsVerKey(),String(cur)); return; } // йҰ–иЁӘйқңй»ҳиЁҳдҪҸ
    if(cur>seen){
      const changes=[];
      (vinfo.history||[]).filter(h=>h.v>seen).forEach(h=>{(h.changes||[]).forEach(s=>changes.push({t:'chg',s:'v'+h.v+(h.source==='figma'?'пјҲFigmaпјү':'')+'пјҡ'+s}));});
      dsDialog({title:'зүҲжң¬е·Іжӣҙж–°',sub:'v'+seen+' вҶ’ v'+cur,changes:changes.length?changes:null,okText:'зҹҘйҒ“дәҶ'});
      localStorage.setItem(dsVerKey(),String(cur));
    }
  }
  function showStudioBadge(proj){
    const tb=document.querySelector('.topbar'); if(!tb||document.getElementById('dsBadge'))return;
    const wrap=document.createElement('div');wrap.id='dsBadge';wrap.className='ds-badge';
    wrap.innerHTML='<span class="ds-badge-proj'+(proj?'':' full')+'" id="dsBadgeProj">'+(proj||'жӯӨзӮәжҜҚе…ғд»¶еә«пјҢиӢҘйңҖжӣҙж–°и«ӢиӘҝж•ҙеҺҹе§ӢжӘ”')+'</span>';
    const ghb=mkBtn({variant:'outline',intent:'secondary',size:'s',isLive:true});ghb.type='button';ghb.classList.add('gh-topbar'); // CTA е·ҰйӮҠзҡ„ GitHub еӨ–йҖЈе…ҘеҸЈпјҲlibrary еӨ–жЎҶж¬ЎиҰҒеҺҹеӯҗпјү
    ghb.querySelector('span').textContent='Github';ghb.insertAdjacentHTML('afterbegin',ICON_GITHUB);
    ghb.onclick=()=>window.open('https://github.com/edward890131/cool-ds-library','_blank','noopener');
    wrap.appendChild(ghb);
    const btn=mkBtn({variant:'solid',intent:'primary',size:'s',isLive:true});btn.type='button';btn.id='dsExportBtn';btn.onclick=dsSave; // е…©жЁЎејҸйғҪ s
    wrap.appendChild(btn);
    tb.appendChild(wrap); // еҢҜеҮә badge йқ еҸіпјҲspacer еҫҢпјү
    updateBadgeVersion();
  }
  function applyProposal(p){
    if(!p)return;
    const tok=p.tokens&&(p.tokens.overrides||p.tokens); // е…је®№ {overrides} жҲ–зӣҙжҺҘ OV зөҗж§Ӣ
    if(tok&&typeof tok==='object'){window.__tokOverrides=Object.assign({root:{},dark:{},desktop:{},tablet:{},mobile:{}},tok);applyTokOverrides();}
    const dis=(p.tokens&&p.tokens.disabled)||p.disabled;
    if(Array.isArray(dis))window.__tokDisabled=new Set(dis);
    const bind=(p.tokens&&p.tokens.bindings)||p.bindings;
    window.__compBindings=(bind&&typeof bind==='object')?bind:{};
    applyCompBindings();
    const logo=p.logo||(p.tokens&&p.tokens.logo);
    if(logo){PROJECT_LOGOS.light=logo.light||null;PROJECT_LOGOS.dark=logo.dark||null;}
    if(p.components&&Array.isArray(p.components.selected)){SUMSEL.clear();p.components.selected.forEach(id=>SUMSEL.add(id));}
    if(p.components&&p.components.axes){Object.entries(p.components.axes).forEach(([id,ax])=>{if(CHOICE[id])Object.entries(ax).forEach(([k,vals])=>{if(CHOICE[id].active[k]&&Array.isArray(vals))CHOICE[id].active[k]=new Set(vals);});});}
  }
  /* йҮҚж•ҙпјҸж·ұйҖЈзөҗпјҡеҫһ hash йӮ„еҺҹжӘўиҰ–пјӣжңү ?project= еүҮе…ҲжҠ“ proposal/state еҶҚжёІжҹ“ */
  (function studioInit(){
    const proj=new URLSearchParams(location.search).get('project');
    window.__dsProject=proj||null;
    const boot=()=>{ current=hashId()||'guide'; renderNav(); renderView(current); if(typeof refreshLogo==='function')refreshLogo(); showStudioBadge(proj); }; // жҜҚеә«пјӢе°ҲжЎҲжЁЎејҸзҡҶй җиЁӯйҖІ guide йҰ–еұҸ
    if(!proj){ boot(); window.__dsBaseline=dsSnap(); return; }
    fetch('/api/project/'+encodeURIComponent(proj)).then(r=>r.ok?r.json():null).then(d=>{
      window.__dsProjectData=d||null;
      window.PROJECT_ICONS=(d&&d.icons)||[]; // е°ҲжЎҲиҮӘиЁӮ iconпјҲдҫҶжәҗ projects/<name>/icons.jsonпјү
      applyProposal(d&&(d.state||d.proposal)); // жңү stateпјҲзәҢз·Ёпјүе„Әе…ҲпјҢеҗҰеүҮ proposalпјҲеҲқе§Ӣпјү
      window.__dsVersion=(d&&d.version&&d.version.version)||0;
    }).catch(()=>{}).finally(()=>{ boot(); window.__dsBaseline=dsSnap(); dsVersionPopup(); });
  })();
  window.addEventListener('hashchange',()=>{const id=hashId()||'guide';if(id!==current){current=id;renderNav();renderView(id);}});

  /* ===== дёӢжӢүйҮҚж–°ж•ҙзҗҶпјҲжүӢж©ҹи§ёжҺ§ pull-to-refreshпјүпјҡ.main жҚІеҲ°й ӮеҶҚдёӢжӢү вҶ’ ең“еңҲ loader вҶ’ ж”ҫжүӢйҒҺй–ҫеҖј reload ===== */
  (function(){
    const main=document.querySelector('.main'); const shell=document.getElementById('shell');
    const view=document.getElementById('view');
    if(!main||!shell||!view)return;
    const loader=document.createElement('div'); loader.className='ptr-loader';
    loader.innerHTML='<div class="ptr-spinner"></div>';
    shell.appendChild(loader);
    const spin=loader.querySelector('.ptr-spinner');
    const TH=72, MAXSHIFT=88; let startY=0, dist=0, pulling=false;
    const shiftFor=d=>Math.min(d*0.55,MAXSHIFT);              // rubber-band йҳ»е°ј
    const reset=()=>{ loader.classList.remove('spin'); loader.style.opacity='0'; loader.style.transform='translate(-50%,-6px)'; spin.style.transform='';
      view.style.transition='transform .3s cubic-bezier(.2,.7,.2,1)'; view.style.transform=''; };
    main.addEventListener('touchstart',e=>{ if(main.scrollTop<=0){startY=e.touches[0].clientY;dist=0;pulling=true;view.style.transition='';} },{passive:true});
    main.addEventListener('touchmove',e=>{ if(!pulling)return;
      dist=e.touches[0].clientY-startY;
      if(dist>0 && main.scrollTop<=0){
        e.preventDefault();                                   // ж””жҺүеҺҹз”ҹ overscrollпјҢж”№и·‘иҮӘиЁӮдёӢжӢү
        const sh=shiftFor(dist);
        view.style.transform='translateY('+sh+'px)';          // е…§е®№и·ҹи‘—еҫҖдёӢдҪҚз§»
        loader.style.opacity=String(Math.min(dist/TH,1));
        loader.style.transform='translate(-50%,'+(sh/2)+'px)'; // loader зҪ®ж–ј header иҲҮе…§е®№й–“и®“еҮәзҡ„з©әй–“
        spin.style.transform='rotate('+(dist*2.6)+'deg)';
      } else { pulling=false; reset(); }
    },{passive:false});
    main.addEventListener('touchend',()=>{ if(!pulling)return; pulling=false;
      if(dist>TH){ loader.classList.add('spin'); loader.style.opacity='1';
        view.style.transition='transform .25s ease'; view.style.transform='translateY('+MAXSHIFT+'px)';  // дҝқжҢҒдёӢз§»йңІеҮә loader
        loader.style.transform='translate(-50%,'+(MAXSHIFT/2)+'px)'; spin.style.transform='';
        setTimeout(()=>location.reload(),650);
      } else { reset(); }
    });
  })();

  /* ===== еҒҙйӮҠж¬„жӢ–жӣіиӘҝеҜ¬ ===== */
  (function(){
    const shell=document.getElementById('shell');
    const handle=document.getElementById('sidebarResize');
    if(!shell||!handle)return;
    const KEY='ds-sidebar-w', MIN=180, MAX=480;
    const clamp=x=>Math.max(MIN,Math.min(MAX,Math.min(window.innerWidth*0.42,x))); // еӨҫеңЁ 180 ~ min(480, 42vw)
    const saved=parseInt(localStorage.getItem(KEY),10);
    if(saved) shell.style.setProperty('--sb',clamp(saved)+'px'); // йӮ„еҺҹдёҠж¬ЎеҜ¬еәҰ
    let dragging=false;
    handle.addEventListener('pointerdown',e=>{
      if(window.innerWidth<=900)return; // иЎҢеӢ•/ж”¶еҗҲжЁЎејҸдёҚе•ҹз”Ё
      dragging=true; handle.classList.add('is-drag'); document.body.classList.add('is-resizing');
      try{handle.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault();
    });
    handle.addEventListener('pointermove',e=>{ if(dragging) shell.style.setProperty('--sb',clamp(e.clientX)+'px'); }); // sidebar е·Ұз·Јпјқ0пјҢж•… clientXвүҲеҜ¬еәҰ
    function end(){ if(!dragging)return; dragging=false; handle.classList.remove('is-drag'); document.body.classList.remove('is-resizing');
      const px=parseInt(shell.style.getPropertyValue('--sb'),10); if(px) localStorage.setItem(KEY,px); }
    handle.addEventListener('pointerup',end);
    handle.addEventListener('pointercancel',end);
    handle.addEventListener('dblclick',()=>{ shell.style.removeProperty('--sb'); localStorage.removeItem(KEY); }); // йӣҷж“ҠйӮ„еҺҹй җиЁӯ 20vw
  })();
</script>
