  function buildModal(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component В· Modal',title:'Modal е°Қи©ұжЎҶ',
      lede:'иҰҶи“ӢеңЁй Ғйқўд№ӢдёҠгҖҒйңҖ<b>е…ҲеӣһжҮүжүҚиғҪз№јзәҢ</b>зҡ„жө®еұӨе®№еҷЁпјҡз”ұ <b>backdrop йҒ®зҪ©</b>пјӢ<b>еҚЎзүҮ</b>зө„жҲҗгҖӮдҫқ Figma е®ҡзҫ©еҲҶе…©зЁ®еӨ§е°ҸвҖ”вҖ”<b>popup е°ҸеҪҲзӘ—</b>пјҲзҪ®дёӯе°ҸеҚЎпјҡзҪ®дёӯжЁҷйЎҢпјӢиӘӘжҳҺпјӢеҸҜйҒё iconпјҸеӮҷиЁ»пјҸиЁҳдҪҸеёіиҷҹпјӣicon зӮәеҸҜйҒёж——жЁҷгҖҒ<b>йЎҸиүІдҫқиӘһж„Ҹ</b>пјҡдёҖиҲ¬пјқдё»иүІгҖҒиӯҰзӨәпјқзҙ…пјӣfooter жҺ’еҲ—еҸҜиҮӘз”ұзө„еҗҲпјҡ<b>дёҰжҺ’</b>пјҸ<b>еһӮзӣҙе Ҷз–Ҡ</b>пјҢеҸҜеҶҚеҠ <b>ж–Үеӯ—жҢүйҲ•</b>з¬¬дёүеӢ•дҪңпјүиҲҮ <b>modal еӨ§иҰ–зӘ—</b>пјҲheader жЁҷйЎҢпјӢеүҜжЁҷйЎҢпјӢй—ңй–ү Г—гҖҒеҸҜжҚІеӢ• contentгҖҒfooter еҸіе°ҚйҪҠпјӣregular жЎҢж©ҹжЁҷжә–еҜ¬ 800pxгҖҒlarger еҜ¬й«ҳ auto дёҠйҷҗ 1224pxпјӣ<b>иЎҢеӢ•зүҲиҪүзӮә bottom sheet</b>пјҡиІјйҪҠеә•йғЁгҖҒе…ЁеҜ¬гҖҒдёҠз·Јең“и§’гҖҒжңҖй«ҳзҙ„ 95vhгҖҒз”ұдёӢеҫҖдёҠж»‘е…ҘпјүгҖӮй»һ Г— жҲ–йҒ®зҪ©з©әзҷҪиҷ•зҡҶеҸҜй—ңй–үгҖӮ',
      specRows:[['axes','<code>kind Г— variant</code>'],['formula','<code>popup(2) + modal(2) = 4</code>'],['token-policy','<code>semantic.*.modal.*</code>'],['features','icon(иӘһж„ҸиүІ) / note / remember / дёҰжҺ’В·е Ҷз–ҠВ·ж–Үеӯ—жҢүйҲ• / close-icon / subtitle / scroll-content / footer / bottom-sheet(иЎҢеӢ•зүҲ)']]});
    const axes=DIAL_SPECS.modal.axes, zh=DIAL_SPECS.modal.zh, active=CHOICE.modal.active; // жҺҘдёӯеӨ® store
    const PV={normal:['дёҖиҲ¬','normal'],illustration:['иӯҰзӨә','illustration']};             // popup зҡ„ variantпјҡиӘһж„Ҹе·®з•°пјҢicon йЎҸиүІиҲҮдё»жҢүйҲ• intent йҡЁд№Ӣи®ҠеҢ–
    const MV={regular:['жЁҷжә– 800px','regular'],larger:['еӨ§зүҲ вүӨ1224px','larger']};        // modal зҡ„ variant
    let p;
    function renderM(){ if(!p)return; p.innerHTML='';
      const ks=axes.kind.filter(k=>active.kind.has(k));
      const pv=['normal','illustration'].filter(v=>active.variant.has(v));
      const mv=['regular','larger'].filter(v=>active.variant.has(v));
      if(ks.includes('popup')&&pv.length){
        const ARRZH={row:'дёҰжҺ’',stack:'еһӮзӣҙе Ҷз–Ҡ',primary:'е–®йЎҶдё»жҢүйҲ•',secondary:'е–®йЎҶж¬ЎжҢүйҲ•'};
        p.appendChild(matrixPanel({badge:'kind В· popup',name:'Popup е°ҸеҪҲзӘ—пјҲеҲ—пјқvariantгҖҒж¬„пјқжҢүйҲ•жҺ’еҲ—пјҡдёҰжҺ’пјҸеһӮзӣҙпјҸе–®йЎҶдё»пјҸе–®йЎҶж¬ЎпјҢжҺ’еҲ—зӮәзҚЁз«Ӣж——жЁҷгҖҒдёҚз¶ҒиЈқзҪ®пјү',
          rows:pv,cols:['row','stack','primary','secondary'],
          rowLab:v=>labHTML(PV[v][0],PV[v][1]),
          colLab:a=>labHTML(ARRZH[a],a),
          cell:(v,a)=>mdlCard('popup',{variant:v,icon:v==='illustration',note:v==='illustration',remember:v==='illustration',arrange:a,compact:true}),mincol:230}));
      }
      if(ks.includes('modal')&&mv.length){

          rows:mv,cols:['fit','overflow'],
          rowLab:v=>labHTML(MV[v][0],MV[v][1]),
          colLab:c2=>labHTML(c2==='fit'?'е…§е®№йҒ©дёӯ':'е…§е®№жәўеҮәпјҲеҚ·и»ёпјү',c2),
          cell:(v,c2)=>mdlCard('modal',{variant:v,long:c2==='overflow',clip:c2==='overflow',compact:true}),mincol:300}));

    }

    const axes=DIAL_SPECS.drawer.axes, zh=DIAL_SPECS.drawer.zh, active=CHOICE.drawer.active; // жҺҘдёӯеӨ® store

    function renderM(){ if(!p)return; p.innerHTML='';

/* step icons */
/* ---- STEP жӯҘй©ҹжҢҮзӨәеҷЁ е°Ҳз”Ё icon ---- */
  /* error зӢҖж…Ӣз”Ё Phosphor warningпјҲиӯҰзӨәдёүи§’пјүпјӣdone жІҝз”Ёж—ўжңү ICON_CHECK */
  const STP_ICON_WARN='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M236.8,188.09,149.35,36.22h0a24.76,24.76,0,0,0-42.7,0L19.2,188.09a23.51,23.51,0,0,0,0,23.72A24.35,24.35,0,0,0,40.55,224h174.9a24.35,24.35,0,0,0,21.33-12.19A23.51,23.51,0,0,0,236.8,188.09ZM120,104a8,8,0,0,1,16,0v40a8,8,0,0,1-16,0Zm8,88a12,12,0,1,1,12-12A12,12,0,0,1,128,192Z"/></svg>';
  /* icon variant жҜҸжӯҘзҡ„ең–зӨәжұ пјҲжІҝз”Ёж—ўжңү Phosphor constпјү */
  const STP_ICONS=[ICON_HOUSE,ICON_LIST,ICON_UPLOAD,ICON_GEAR];

/* step build */
/* ==================== step жӯҘй©ҹжҢҮзӨәеҷЁ ==================== */
  /* е–®дёҖзҜҖй»һпјҡstate = done/current/todo/error/disabledпјӣvariant жҺ§еҲ¶е…§е®№зү© */
  function stpNode(state,variant,o){
    o=o||{};
    const n=ce('div','stp-node stp-'+state);
    if(variant!=='dotted'){                 // dotted зӮәзҙ”е°Ҹең“й»һгҖҒе…§йғЁз•ҷз©ә
      if(state==='done')n.innerHTML=ICON_CHECK;          // е®ҢжҲҗжү“еӢҫ
      else if(state==='error')n.innerHTML=STP_ICON_WARN; // йҢҜиӘӨиӯҰзӨә
      else if(variant==='icon')n.innerHTML=o.icon||STP_ICONS[0];
      else n.textContent=o.num;             // numberedпјҡйЎҜзӨәжӯҘй©ҹз·Ёиҷҹ
    }
    return n;
  }
  /* е®Ңж•ҙ stepperпјҡorientation жұәе®ҡж©«еҗ‘/зёұеҗ‘гҖҒvariant жұәе®ҡзҜҖй»һжЁЈејҸ */
  function stpStepper(orientation,variant,steps){
    const vcls=variant==='dotted'?'stp-dot':(variant==='icon'?'stp-icon':'stp-num');
    if(orientation==='vertical'){
      const w=ce('div','stp-vertical '+vcls);
      steps.forEach((s,i)=>{
        const step=ce('div','stp-vstep stp-is-'+s.state);
        const rail=ce('div','stp-vrail');
        rail.appendChild(stpNode(s.state,variant,{num:i+1,icon:s.icon}));
        if(i<steps.length-1)rail.appendChild(ce('div','stp-vconn'+(s.state==='done'?' stp-conn-done':'')));
        const labels=ce('div','stp-labels');
        labels.innerHTML=`<span class="stp-title">${s.label}</span>`+(s.description?`<span class="stp-desc">${s.description}</span>`:'');
        step.append(rail,labels);
        w.appendChild(step);
      });
      return w;
    }
    const w=ce('div','stp-horizontal '+vcls);
    steps.forEach((s,i)=>{
      const step=ce('div','stp-step stp-is-'+s.state);
      step.appendChild(stpNode(s.state,variant,{num:i+1,icon:s.icon}));
      const labels=ce('div','stp-labels');
      labels.innerHTML=`<span class="stp-title">${s.label}</span>`+(s.description?`<span class="stp-desc">${s.description}</span>`:'');
      step.appendChild(labels);
      w.appendChild(step);
      if(i<steps.length-1)w.appendChild(ce('div','stp-conn'+(s.state==='done'?' stp-conn-done':'')));
    });
    return w;

  /* дё»зҹ©йҷЈз”Ёзҡ„ 4 жӯҘжөҒзЁӢпјҲзөҗеёіжғ…еўғпјүпјҡзӢҖж…Ӣж··еҗҲ doneвҶ’currentвҶ’todoвҶ’todo */
  const STP_MX_LABELS=['еёіиҷҹ','иіҮж–ҷ','д»ҳж¬ҫ','е®ҢжҲҗ'];

  /* Live з”Ёзҡ„ 4 жӯҘжөҒзЁӢпјҲжҜҸжӯҘеҸҜеё¶еүҜжЁҷпјү */

    const sec=section(body,'Orientation Г— Variant зҹ©йҷЈ','еҲ—пјқж–№еҗ‘пјҲж°ҙе№іпјҸеһӮзӣҙпјүгҖҒж¬„пјқжЁЈејҸпјҲз·ЁиҷҹпјҸең“й»һпјҸең–зӨәпјүпјӣжҜҸж јжҳҜдёҖжўқ 4 жӯҘ stepperпјҢж··еҗҲ doneпјҸcurrentпјҸtodo зӢҖж…ӢпјҢе·Іе®ҢжҲҗж®өиҗҪйҖЈжҺҘз·ҡиҪүзӮә accentгҖӮ');

    const rd=ce('div','row-demo');

    ss.appendChild(rd);

    const sl=section(body,'еҜҰйҡӣдә’еӢ• Live','жҢүгҖҢдёҠдёҖжӯҘпјҸдёӢдёҖжӯҘгҖҚз§»еӢ• currentпјҢиө°йҒҺзҡ„жӯҘй©ҹиҮӘеӢ•и®Ҡ doneпјӣеҲҮжҸӣж–№еҗ‘пјҲж°ҙе№іпјҸеһӮзӣҙпјүиҲҮжЁЈејҸпјҲз·ЁиҷҹпјҸең“й»һпјҸең–зӨәпјүпјҢеӢҫ description йЎҜзӨәжҜҸжӯҘеүҜжЁҷгҖӮ');

  /* ==================== Quantity е•Ҷе“ҒиЁҲж•ё ==================== */

    p=panelsIn(sec);renderM();

     labelпјҸgradient дәҰеҸҜз”Ё o.label / o.gradient ж——жЁҷзҚЁз«Ӣз–ҠеҠ пјҲLive з”ЁпјүпјҢеҪјжӯӨжӯЈдәӨ */
  function prgEl(variant,size,o){
    o=o||{};
    const intent=o.intent||'primary';
    const val=(o.value!=null)?o.value:60;
    const showLabel=(o.label!=null)?o.label:(variant==='label');
    const gradient=(o.gradient!=null)?o.gradient:(variant==='gradient');
    const wrap=ce('div','prg prg-sz-'+size);
    wrap.setAttribute('role','progressbar');
    wrap.setAttribute('aria-valuenow',val);wrap.setAttribute('aria-valuemin','0');wrap.setAttribute('aria-valuemax','100');
    if(showLabel){
      const lab=ce('div','prg-label');
      const t=ce('span','prg-cap');t.textContent=o.cap||'дёҠеӮійҖІеәҰ';
      const pct=ce('span','prg-pct');pct.textContent=val+'%';
      lab.append(t,pct);wrap.appendChild(lab);
    }
    const track=ce('div','prg-track');
    const fill=ce('div','prg-fill i-'+intent+(gradient?' is-grad':''));
    fill.style.width=val+'%';
    track.appendChild(fill);wrap.appendChild(track);
    return wrap;
  }

    // иҮӘиЁӮ LiveпјҲйқһ mountLiveпјүпјҡж»‘жЎҝиҰҒи·ҹеӢҫйҒёй …еҗҢеҲ—пјҢж•…жүӢеҲ»жҺ§еҲ¶еҲ—пјқsegГ—2 пјӢпјҲеӢҫйҒёй …пјӢж»‘жЎҝеҗҢдёҖ ctlпјү

  /* ===== Card group build: card ===== */
  /* ==================== Card еҹәзӨҺеҚЎзүҮпјҲcrd-пјү==================== */
  /* жіӣз”Ёе…§е®№е®№еҷЁеҚЎпјҡmediaпјҲimEl ең–пјүпјӢ badgeпјҲ.tg жЁҷзұӨпјүпјӢ title пјӢ desc пјӢ footer actionsпјҲ.btnпјүгҖӮ
     variantпјҡelevated жө®иө·пјҸoutlined еӨ–жЎҶпјҸfilled еЎ«иүІ Г— stateпјҡdefaultпјҸhoverпјҸselectedпјҸdisabledгҖӮ
     е…ЁйғЁйҮҚз”Ёж—ўжңүеҺҹеӯҗпјҡimElпјҲImageпјүгҖҒ.tgпјҲTagпјүгҖҒ.btnпјҲButtonпјүпјҢдёҚ inline йҮҚз•« primitiveгҖӮ */

  /* еҚЎзүҮе·Ҙе» пјҡo={variant, state, media, badge, title, desc, actions, live, compact, src}
     state з”Ёйқңж…Ӣ class жЁЎж“¬пјҲзҹ©йҷЈз”Ёпјүпјӣlive=true жҷӮжҺӣ .live иө°зңҹеҜҰ :hoverгҖҒdisabled еҗҢжӯҘйҺ–е…§йғЁжҢүйҲ• */
  function crdCard(o){
    o=o||{};
    const variant=o.variant||'elevated';
    const state=o.state||'default';
    const card=ce('div','crd crd-v-'+variant
      +(state!=='default'?' is-'+state:'')
      +(o.live?' live':'')
      +(o.compact?' crd-mx':'')
      +(o.size==='s'?' crd-sz-s':''));

    /* media slotпјҡйҮҚз”Ё Image еҺҹеӯҗпјҲ16:9 ж»ҝзүҲпјүпјҢCSS иҰҶеҜ«зӮәеҚЎзүҮж»ҝеҜ¬ */
    if(o.media){
      const md=ce('div','crd-media');
      md.appendChild(imEl('rectangular','default','l',{src:o.src||IM_POOL[5],alt:o.title||'еҚЎзүҮең–зүҮ',ratio:'16:9'}));
      card.appendChild(md);
    }
    /* badge slotпјҡйҮҚз”Ё Tag еҺҹеӯҗпјҢйҮҳеҸідёҠи§’пјҲжңүең–еЈ“ең–дёҠгҖҒз„Ўең–еЈ“еҚЎдёҠпјү */
    if(o.badge){
      const bd=ce('div','crd-badge');
      const onImg=!!o.media; // еЈ“еңЁз…§зүҮдёҠз”ЁеҚҠйҖҸжҳҺй»‘зҺ»з’ғгҖҒз„Ўең–жҷӮз”ЁдёҖиҲ¬жҹ”иүІжЁҷ
      const t=ce('div','tg c-round st-default '+(onImg?'v-soft i-neutral tg-glass':'v-soft i-brand'));t.innerHTML='<span>зІҫйҒё</span>';
      bd.appendChild(t);
      (onImg?card.firstChild:card).appendChild(bd);
    }
    /* body slotпјҡtitle жҒҶжңүгҖҒdesc еҸҜйҒёпјҲCSS е…©иЎҢжҲӘж–·пјү */
    const body=ce('div','crd-body');
    const ti=ce('div','crd-title');ti.textContent=o.title||'еҗҲжӯЎеұұж—ҘеҮәеӯЈй–Ӣи·‘';
    body.appendChild(ti);

      body.appendChild(de);
    }
    card.appendChild(body);
    /* footer actions slotпјҡйҮҚз”Ё Button еҺҹеӯҗпјҲдё» solid primaryпјӢж¬Ў text secondaryпјү */
    if(o.actions){
      const ft=ce('div','crd-foot');
      const bp=ce('button','btn v-solid i-primary sz-s'+(o.live?' live':''));bp.innerHTML='<span>жҹҘзңӢи©іжғ…</span>';
      const bs=ce('button','btn v-text i-secondary sz-s'+(o.live?' live':''));bs.innerHTML='<span>зЁҚеҫҢ</span>';
      if(state==='disabled'){bp.disabled=true;bs.disabled=true;} // disabled ж•ҙеҚЎдёҚеҸҜй»һпјҢжҢүйҲ•еҗҢжӯҘйҺ–
      ft.append(bs,bp); // ж¬ЎиҰҒеңЁе·ҰгҖҒдё» CTA йқ жңҖеҸі
      card.appendChild(ft);
    }
    return card;
  }

const PCD_IC_HEART_FILL='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M240,102c0,70-103.79,126.66-108.21,129a8,8,0,0,1-7.58,0C119.79,228.66,16,172,16,102A62.07,62.07,0,0,1,78,40c20.65,0,38.73,8.88,50,23.89C139.27,48.88,157.35,40,178,40A62.07,62.07,0,0,1,240,102Z"/></svg>';
/* зңҹеҜҰе•Ҷе“Ғз…§пјҲе·Ій©—иӯү 200пјүпјҡжүҳзү№еҢ…пјҸзҫҠжҜӣеңҚе·ҫпјҸдҝқжә«з“¶ */
const PCD_IMG={bag:'photo-1544816155-12df9643f363',scarf:'photo-1601924994987-69e26d50dc26',bottle:'photo-1602143407151-7111542de6e8'};

/* и©•еҲҶжҳҹеҲ—пјҡеҜҰжҳҹпјҲPCD_IC_STAR_FILLгғ»warn й»ғпјү+ з©әжҳҹпјҲIC_STAR regularгғ»faintпјүпјҢеҫҢз¶ҙеҲҶж•ёиҲҮи©•и«–ж•ё */
function pcdStars(val,count){
  const full=Math.floor(val);                                   // 4.5 вҶ’ 4 йЎҶеҜҰжҳҹ + 1 йЎҶз©әжҳҹ
  const box=ce('span','pcd-rating');
  const stars=ce('span','pcd-stars');
  for(let i=0;i<5;i++){
    const s=ce('span',i<full?'pcd-star-full':'pcd-star-empty');
    s.innerHTML=i<full?PCD_IC_STAR_FILL:IC_STAR;
    stars.appendChild(s);
  }
  box.appendChild(stars);
  box.insertAdjacentHTML('beforeend',`<span class="pcd-rate-val">${val}</span><span class="pcd-rate-cnt">(${count})</span>`);
  box.setAttribute('aria-label',`и©•еҲҶ ${val} еҲҶпјҢе…ұ ${count} еүҮи©•и«–`);
  return box;
}

/* е•Ҷе“ҒеҚЎжң¬й«”пјҡvariant=vertical|horizontal|minimalпјӣstate=default|hover|soldout
   o={live, badge, badgeText, badgeIntent, rating, wishlist, wished, discount, price, name, src, onWish} */
function pcdCard(variant,state,o){
  o=o||{};
  const soldout=state==='soldout';
  const card=ce('div','pcd-card pcd-v-'+variant
    +(state==='hover'?' is-hover':'')                            // зҹ©йҷЈж јз”Ёйқңж…Ӣ class жЁЎж“¬ hover
    +(soldout?' is-soldout':'')
    +(o.live?' live':'')                                       // Live/showcase жүҚеҗғзңҹеҜҰ :hover
    +(o.size==='s'?' pcd-sz-s':''));

  /* ж”¶и—Ҹж„ӣеҝғпјҡ.btn v-text icon-only еҺҹеӯҗпјӣе·Іж”¶и—ҸжҸӣ fill зүҲ + is-on иҪүзҙ… */
  function mkWish(){
    const w=ce('button','btn v-text i-secondary sz-s icon-only pcd-wish'+(o.live?' live':'')+(o.wished?' is-on':''));
    w.innerHTML=o.wished?PCD_IC_HEART_FILL:IC_HEART;
    w.setAttribute('aria-label',o.wished?'з§»йҷӨж”¶и—Ҹ':'еҠ е…Ҙж”¶и—Ҹ');
    w.setAttribute('aria-pressed',o.wished?'true':'false');
    if(soldout)w.disabled=true;
    if(o.onWish&&!soldout)w.onclick=o.onWish;
    return w;
  }
  /* и§’жЁҷпјҡ.tg еҺҹеӯҗпјҲж–°е“Ғ=i-brandпјҸзҶұй–Җ=i-dangerпјү */
  function mkBadge(inline){ // inline=trueпјҲзІҫз°ЎзүҲз„Ўең–пјүпјҡдёҚзө•е°Қе®ҡдҪҚгҖҒдёҚзҺ»з’ғпјҢжӯЈеёёжҺ’йҖІ toprow
    const t=ce('div','tg v-soft c-round i-'+(o.badgeIntent||'brand')+' st-default'+(inline?'':' pcd-badge tg-glass'));
    t.innerHTML='<span>'+(o.badgeText||'ж–°е“Ғ')+'</span>';
    return t;
  }

  /* зё®ең–еҚҖпјҲminimal з„Ўең–пјүпјҡimEl еҺҹеӯҗ 1:1пјҢи§’жЁҷе·ҰдёҠгҖҒж”¶и—ҸеҸідёҠпјҢе”®е®ҢеҠ зҒ°йҡҺиҰҶи“ӢжЁҷ */
  if(variant!=='minimal'){
    const th=ce('div','pcd-thumb');
    th.appendChild(imEl('rectangular','default','l',{ratio:'1:1',alt:o.name||'е•Ҷе“Ғең–',src:o.src||PCD_IMG.bag}));
    if(o.badge!==false)th.appendChild(mkBadge());
    if(o.wishlist!==false)th.appendChild(mkWish());
    if(soldout){
      const ov=ce('div','pcd-soldout-ov');
      const t=ce('div','tg v-solid c-round i-neutral st-default');t.innerHTML='<span>е”®е®Ң</span>';
      ov.appendChild(t);th.appendChild(ov);
    }
    card.appendChild(th);
  }

  /* иіҮиЁҠеҚҖпјҡе“ҒеҗҚ + и©•еҲҶжҳҹеҲ— + еғ№ж ј(prEl) + еҠ е…Ҙиіјзү©и»Ҡ(.btn) */
  const info=ce('div','pcd-info');
  if(variant==='minimal'&&(o.badge!==false||o.wishlist!==false||soldout)){
    const top=ce('div','pcd-toprow');                            // minimal з„Ўең–пјҡи§’жЁҷпјҸе”®е®ҢжЁҷиҲҮж”¶и—Ҹж”№ж”ҫеҗҢдёҖеҲ—
    const lf=ce('span','');
    if(soldout){const t=ce('div','tg v-solid c-round i-neutral st-default');t.innerHTML='<span>е”®е®Ң</span>';lf.appendChild(t);}
    else if(o.badge!==false)lf.appendChild(mkBadge(true));
    top.appendChild(lf);
    if(o.wishlist!==false)top.appendChild(mkWish());
    info.appendChild(top);
  }
  const nm=ce('div','pcd-name');nm.textContent=o.name||'з¶“е…ёеёҶеёғжүҳзү№еҢ…гғ»еӨ§е®№йҮҸйҖҡеӢӨж¬ҫ';
  info.appendChild(nm);
  if(o.rating!==false)info.appendChild(pcdStars(o.rating||4.5,o.count||128));

  const buy=ce('div','pcd-buy');
  buy.appendChild(prEl(o.price||(o.discount?'discount':'normal'),'md'));   // еғ№ж јеҺҹеӯҗпјҡnormalпјҸdiscountпјҸsale
  const b=ce('button','btn v-solid i-primary sz-s'+(o.live?' live':''));
  b.innerHTML=IC_CART+'<span>'+(soldout?'е·Іе”®е®Ң':'еҠ е…Ҙиіјзү©и»Ҡ')+'</span>';
  if(soldout)b.disabled=true;
  buy.appendChild(b);
  info.appendChild(buy);
  card.appendChild(info);
  return card;
}

/* зҹ©йҷЈж јпјҡйқңж…Ӣе‘ҲзҸҫпјҲhover з”Ё is-hover жЁЎж“¬гҖҒе”®е®ҢзҒ°йҡҺпјӢиҰҶи“ӢжЁҷпјӢжҢүйҲ•еҒңз”Ёпјү */

  });

/* category-tile build */
/* ==================== category-tile еҲҶйЎһзЈҡ ==================== */
  /* еҲҶйЎһзӨәж„ҸиіҮж–ҷжұ пјҡzhпјҸenпјҸcountпјҸdescпјҸiconпјҲж—ўжңү Phosphor constпјүпјҸimgпјҲIM_POOL зҙўеј•пјү */
  const CAT_DATA=[
    {zh:'йӣ»еӯҗз”ўе“Ғ',en:'electronics',count:'128 д»¶',desc:'жүӢж©ҹгҖҒе№іжқҝиҲҮйҖұйӮҠй…Қд»¶',ic:IC_PHONE,img:0},
    {zh:'жңҚйЈҫй…Қд»¶',en:'fashion',count:'86 д»¶',desc:'з”·еҘіиЈқгҖҒйһӢеҢ…иҲҮйЈҫе“Ғ',ic:IC_BAG,img:1},
    {zh:'еұ…е®¶з”ҹжҙ»',en:'home',count:'54 д»¶',desc:'е®¶е…·гҖҒеҜўе…·иҲҮж”¶зҙҚ',ic:IC_HOUSE,img:2},
    {zh:'зҫҺйЈҹйӨҗйЈІ',en:'food',count:'212 д»¶',desc:'з”ҹй®®гҖҒйӣ¶йЈҹиҲҮйЈІе“Ғ',ic:IC_FOOD,img:3,imgId:'photo-1504674900247-0877df9cc836'},
    {zh:'ж—…йҒҠиЎҢзЁӢ',en:'travel',count:'37 д»¶',desc:'еңӢе…§еӨ–иЎҢзЁӢиҲҮзҘЁеҲё',ic:IC_AIRPLANE,img:4},
    {zh:'йҹіжЁӮе”ұзүҮ',en:'music',count:'65 д»¶',desc:'й»‘иҶ гҖҒCD иҲҮе‘ЁйӮҠ',ic:IC_MUSIC,img:5}
  ];
  /* зҹ©йҷЈпјҸLive жҜҸеҖӢ variant з¶Ғе®ҡзҡ„еӣәе®ҡзӨәж„ҸиіҮж–ҷпјҲicon=йӣ»еӯҗз”ўе“ҒгҖҒimage=зҫҺйЈҹгҖҒgradient=йҹіжЁӮпјү */
  const CAT_MDATA={icon:3,image:3,gradient:3}; // дёү variant зөұдёҖз”ЁгҖҢзҫҺйЈҹйӨҗйЈІгҖҚпјҢеҸӘе·®жЁЈејҸ
  /* е–®йЎҶеҲҶйЎһзЈҡпјҡvariant=icon|image|gradientпјӣstate=default|hover|active
     o={data:CAT_DATA й …, count:йЎҜзӨәж•ёйҮҸ(й җиЁӯ true), desc:йЎҜзӨәжҸҸиҝ°(й җиЁӯ false), arrow:йЎҜзӨәз®ӯй ӯ(й җиЁӯ true), live:зңҹеҜҰ hover} */
  function catTile(variant,state,o){o=o||{};
    const d=o.data||CAT_DATA[0];
    const t=ce('div','cat-tile cat-'+variant+(o.size==='s'?' cat-sz-s':''));
    if(state==='hover')t.classList.add('is-hover');      // зҹ©йҷЈз”Ёйқңж…Ӣ class жЁЎж“¬ж»‘йҒҺ
    if(state==='active')t.classList.add('is-active');    // йҒёдёӯпјҲзӣ®еүҚжүҖеңЁеҲҶйЎһпјү
    if(o.live)t.classList.add('live');                   // LiveпјҸshowcase жүҚеҗғзңҹеҜҰ :hover
    t.setAttribute('role','link');t.setAttribute('tabindex','0');
    if(state==='active')t.setAttribute('aria-current','true');
    if(variant==='image'){
      const m=ce('div','cat-media');                     // йҮҚз”Ё Image еҺҹеӯҗпјҲimElпјүпјҢCSS ж”Өе№іжҲҗж»ҝзүҲиғҢжҷҜ
      m.appendChild(imEl('rectangular','default','m',{src:d.imgId||IM_POOL[d.img],alt:''}));
      t.appendChild(m);
      t.appendChild(ce('div','cat-scrim'));              // еә•йғЁжҡ—иүІжјёеұӨйҒ®зҪ©пјҢзўәдҝқз–Ҡеӯ—еҸҜи®Җ
    } else {
      const c=ce('div','cat-circle');c.innerHTML=d.ic;c.setAttribute('aria-hidden','true');
      t.appendChild(c);                                  // icon зЈҡпјқдё»иүІж·Ўеә•ең“еңҲпјӣgradient зЈҡпјқеҚҠйҖҸжҳҺзҷҪең“еңҲпјҲCSS жҺ§иүІпјү
    }
    const body=ce('div','cat-body');
    const nm=ce('div','cat-name');nm.textContent=d.zh;body.appendChild(nm);
    if(o.desc){const ds=ce('div','cat-desc');ds.textContent=d.desc;body.appendChild(ds);}
    if(o.count!==false){const meta=ce('div','cat-meta');
      const tg=ce('div','tg v-soft c-round i-neutral st-default');   // йҮҚз”Ё Tag еҺҹеӯҗйЎҜзӨәж•ёйҮҸ
      tg.innerHTML='<span>'+d.count+'</span>';
      meta.appendChild(tg);body.appendChild(meta);}
    t.appendChild(body);
    if(o.arrow!==false){const a=ce('span','cat-arrow');a.innerHTML=ICON_ARROW;a.setAttribute('aria-hidden','true');t.appendChild(a);}
    return t;
  }
  /* зҹ©йҷЈж јпјҡcountпјӢarrowгҖҒз„ЎжҸҸиҝ°пјҢиіҮж–ҷдҫқ variant еӣәе®ҡ */
  function catCell(v,s,size){return catTile(v,s,{data:CAT_DATA[CAT_MDATA[v]],count:true,desc:false,arrow:true,size});}

  function buildCategoryTile(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component В· Category Tile',title:'Category Tile еҲҶйЎһзЈҡ',
      lede:'еҲҶйЎһе°ҺиҰҪзЈҡпјҡй»һж“ҠйҖІе…ҘжҹҗеҲҶйЎһзҡ„е…ҘеҸЈе…ғд»¶пјҢең–зӨәпјҸең–зүҮпјӢеҲҶйЎһеҗҚпјӢж•ёйҮҸгҖӮ<b>variant Г— state</b>пјҡicon ең–зӨәзЈҡпјҲдё»иүІж·Ўеә•ең“еңҲпјӢPhosphor iconпјүпјҸimage ең–зүҮзЈҡпјҲImage еҺҹеӯҗж»ҝзүҲиғҢжҷҜпјӢжҡ—иүІйҒ®зҪ©з–ҠзҷҪеӯ—пјүпјҸgradient жјёеұӨзЈҡпјҲaccent жјёеұӨеә•пјӢзҷҪеӯ—пјүГ— defaultпјҸhoverпјҸactiveпјҲйҒёдёӯпјүгҖӮleading йҮҚз”Ё <b>Icon</b>гҖҒиғҢжҷҜйҮҚз”Ё <b>ImageпјҲimElпјү</b>гҖҒж•ёйҮҸйҮҚз”Ё <b>TagпјҲ.tgпјү</b>пјҢз®ӯй ӯз”Ёж—ўжңү ICON_ARROWгҖӮ',
      specRows:[['axes','<code>variant Г— state</code>'],['formula','<code>3 Г— 3 = 9</code>'],
        ['token-policy','<code>semantic.surface.* / semantic.accent.* / --primary-on</code>'],
        ['slots','leadingпјҲicon ең“еңҲпјҸimageпјҸgradient зҷҪеңҲпјү/ name / count / desc? / arrow?'],
        ['a11y','role="link" tabindex=0пјӣйҒёдёӯ aria-current="true"пјӣеӘ’й«”ең– alt=""пјҲиЈқйЈҫжҖ§пјү']]});
    const axes=DIAL_SPECS['category-tile'].axes, zh=DIAL_SPECS['category-tile'].zh, active=CHOICE['category-tile'].active; // жҺҘдёӯеӨ® store
    const VN={icon:['ең–зӨәзЈҡ','icon'],image:['ең–зүҮзЈҡ','image'],gradient:['жјёеұӨзЈҡ','gradient']};
    const STN={default:['й җиЁӯ','default'],hover:['ж»‘йҒҺ','hover'],active:['йҒёдёӯ','active']};
    let p;
    function renderM(){ if(!p)return; p.innerHTML='';
      const vs=axes.variant.filter(v=>active.variant.has(v));
      const ss=axes.state.filter(s=>active.state.has(s));
      const csz=axes.size.filter(z=>active.size.has(z))[0]||'m';
      p.appendChild(matrixPanel({badge:'category-tile',name:'Variant Г— State',rows:vs,cols:ss,
        rowLab:v=>labHTML(VN[v][0],VN[v][1]),
        colLab:s=>labHTML(STN[s][0],STN[s][1]),
        cell:(v,s)=>catCell(v,s,csz),mincol:240})); }
    mountDial(body,{axes,zh,active,onRender:renderM});
    const sec=section(body,'Variant Г— State зҹ©йҷЈ','еҲ—пјқдёүзЁ®зЈҡеһӢгҖҒж¬„пјқдёүзЁ®зӢҖж…ӢгҖӮhover жө®иө·пјӢеә•иүІпјҸйҒ®зҪ©еҠ ж·ұгҖҒactive еҮәзҸҫ accent йӮҠжЎҶпјҲicon зЈҡең“еңҲи®ҠеҜҰеҝғ accentпјӣgradient зЈҡд»Ҙ panel й–“йҡҷпјӢеӨ–еңҲиЎЁйҒ”пјүгҖӮ');
    p=panelsIn(sec);renderM();
    /* ShowcaseпјҡдёүзЈҡеһӢдёҰжҺ’пјҲеҗ«жҸҸиҝ°гҖҒзңҹеҜҰ hoverпјү */
    const sc=section(body,'дёүзЁ®зЈҡеһӢ Showcase','еҗҢдёҖйЎҶе…ғд»¶зҡ„дёүзЁ®еӨ–и§Җпјҡicon йҒ©еҗҲеҜҶйӣҶе°ҺиҰҪжё…е–®гҖҒimage йҒ©еҗҲиҰ–иҰәдё»е°Һзҡ„еҲҶйЎһе…ҘеҸЈгҖҒgradient йҒ©еҗҲеј·иӘҝдё»жү“еҲҶйЎһпјӣжӯӨеҚҖзҡҶзӮәзңҹеҜҰ hoverгҖӮ');
    const row=ce('div','cat-row');
    [['icon',3],['image',3],['gradient',3]].forEach(pair=>{
      row.appendChild(catTile(pair[0],'default',{data:CAT_DATA[pair[1]],count:true,desc:true,arrow:true,live:true}));});
    sc.appendChild(row);
    /* Grid зӨәж„Ҹпјҡ4~6 зЈҡиҮӘйҒ©жҮүз¶Іж ј */
    const gs=section(body,'еҲҶйЎһзЈҡ Grid зӨәж„Ҹ','е…ӯеҖӢеҲҶйЎһжҺ’жҲҗиҮӘйҒ©жҮүз¶Іж јпјҲauto-fillпјҸminmax 220pxпјүпјҢе…¶дёӯгҖҢзҫҺйЈҹйӨҗйЈІгҖҚзӮәйҒёдёӯж…ӢпјҲaria-currentпјүпјӣзңҹеҜҰ hoverгҖӮ');
    const grid=ce('div','cat-grid');
    CAT_DATA.forEach((d,i)=>{grid.appendChild(catTile('icon',i===3?'active':'default',{data:d,count:true,desc:false,arrow:true,live:true}));});
    gs.appendChild(grid);
    /* Live */
    const sl=section(body,'еҜҰйҡӣдә’еӢ• Live','еҲҮзЈҡеһӢгҖҒеӢҫж•ёйҮҸпјҸжҸҸиҝ°пјҸз®ӯй ӯпјҸйҒёдёӯеҚіжҷӮй җиҰҪпјӣhover зӮәзңҹеҜҰдә’еӢ•гҖҒеҸҜиҲҮйҒёдёӯз–ҠеҠ гҖӮ');
    mountLive(sl,{
      initial:{variant:'icon',size:'m',count:true,description:false,arrow:true,active:false},
      segs:[{key:'variant',label:'Variant',options:['icon','image','gradient'],labels:['ең–зӨәзЈҡ','ең–зүҮзЈҡ','жјёеұӨзЈҡ']},{key:'size',label:'Size',options:['m','s']}],
      bools:[{key:'count',label:'count ж•ёйҮҸ'},{key:'description',label:'description жҸҸиҝ°'},{key:'arrow',label:'arrow з®ӯй ӯ'},{key:'active',label:'active йҒёдёӯ'}],
      boolLabel:'е…§е®№пјҸзӢҖж…Ӣ',
      render:st=>{
        const wrap=ce('div','cat-live');
        wrap.appendChild(catTile(st.variant,st.active?'active':'default',
          {data:CAT_DATA[CAT_MDATA[st.variant]],count:st.count,desc:st.description,arrow:st.arrow,size:st.size,live:true}));
        return wrap;},
      note:'active зӮәгҖҢзӣ®еүҚжүҖеңЁеҲҶйЎһгҖҚзҡ„жҢҒзәҢйҒёдёӯж…ӢпјҲ<code>aria-current="true"</code>пјүпјӣimage зЈҡзҷҪеӯ—йқ жҡ—иүІжјёеұӨйҒ®зҪ©дҝқеҸҜи®ҖгҖҒgradient зЈҡж–Үеӯ—дёҖеҫӢ <code>--primary-on</code>гҖӮ'});
  }

const ART_DATA={

/* ж–Үз« еҚЎжң¬й«”пјҡvariant=vertical|horizontal|overlayпјӣstate=default|hoverпјҲзҹ©йҷЈйқңж…Ӣз”Ё is-hoverпјү
   opts={live:зңҹеҜҰ hover, more:йЎҜзӨәгҖҢй–ұи®ҖжӣҙеӨҡгҖҚ, category/excerpt/author/meta:е…§е®№й–Ӣй—ңпјҲй җиЁӯе…Ёй–Ӣпјү} */
function artCard(variant,state,opts){opts=opts||{};
  const on=k=>opts[k]!==false; // жңӘжҢҮе®ҡиҰ–зӮәй–Ӣе•ҹ
  const d=ART_DATA[variant]||ART_DATA.vertical;
  const card=ce('article','art-card v-'+variant+(state==='hover'?' is-hover':'')+(opts.live?' live':'')+(opts.size==='s'?' art-sz-s':''));
  // е°ҒйқўпјҡйҮҚз”Ё Image еҺҹеӯҗ imElпјҲ16:9пјӣж©«ејҸ/з–Ҡеӯ—з”ұ CSS иҰҶеҜ«жҲҗеЎ«ж»ҝпјү
  const cover=ce('div','art-cover');
  cover.appendChild(imEl('rectangular','default','l',{src:d.srcId,alt:d.title,ratio:'16:9'}));
  // е…§е®№еҚҖ
  const body=ce('div','art-body');
  if(on('category')){ // еҲҶйЎһжЁҷпјҡйҮҚз”Ё Tag еҺҹеӯҗ .tgпјҲз–Ҡеӯ—зүҲж”№ v-solid дҝқе°ҚжҜ”пјү

   variantпјҲbordered ж јз·ҡпјҸstriped ж–‘йҰ¬зҙӢпјҸplain з°ЎжҪ”пјүГ— densityпјҲcomfortable еҜ¬й¬ҶпјҸcompact з·Ҡж№Ҡпјү

             ICON_CHECKпјҲеӢҫпјүгҖҒICON_CARETпјҲжҺ’еәҸж–№еҗ‘пјҸеҲҶй Ғз®ӯй ӯпјү
   ж–°еўһ iconпјҡTBL_IC_SORTпјҲPhosphor caret-up-downпјӣиЎЁй ӯгҖҢжңӘжҺ’еәҸгҖҚдёӯжҖ§жҢҮзӨәпјү */

/* ---- ж–°еўһ iconпјҡcaret-up-downпјҲжңӘжҺ’еәҸдёӯжҖ§йӣҷз®ӯй ӯпјү ---- */
  const TBL_IC_SORT='<svg viewBox="0 0 256 256" fill="currentColor"><path d="M181.66,170.34a8,8,0,0,1,0,11.32l-48,48a8,8,0,0,1-11.32,0l-48-48a8,8,0,0,1,11.32-11.32L128,212.69l42.34-42.35A8,8,0,0,1,181.66,170.34ZM85.66,85.66,128,43.31l42.34,42.35a8,8,0,0,0,11.32-11.32l-48-48a8,8,0,0,0-11.32,0l-48,48A8,8,0,0,0,85.66,85.66Z"/></svg>';

/* ---- зӢҖж…Ӣж¬„жЁҷзұӨе°Қз…§пјҲйҮҚз”Ё .tg еҺҹеӯҗпјҡе®ҢжҲҗ i-brandпјҸйҖІиЎҢдёӯ i-neutralпјҸйҖҫжңҹ i-dangerпјү ---- */
  const TBL_STATUS={done:['е®ҢжҲҗ','i-brand'],doing:['йҖІиЎҢдёӯ','i-neutral'],late:['йҖҫжңҹ','i-danger']};

/* ---- зӨәж„ҸиіҮж–ҷжұ пјҲжҜҸејөиЎЁйғҪеҸ–ж·ұжӢ·иІқпјҢжҺ’еәҸпјҸйҒёеҸ–дә’дёҚжұЎжҹ“пјү ---- */
  const TBL_DATA=[

/* ---- е°Ҹе·Ҙе…· ---- */
  function tblFmt(n){return 'NT$ '+n.toLocaleString('en-US');}                     // йҮ‘йЎҚж јејҸеҢ–
  function tblTagEl(status){                                                       // зӢҖж…ӢжЁҷзұӨпјҡйҮҚз”Ё .tg

  function tblCbxEl(density,checked){                                              // еӢҫйҒёжЎҶпјҡйҮҚз”Ё .cbxпјҲз·Ҡж№Ҡзё® sz-sпјү

/* ---- еҲҶй ҒеҲ—пјҲshowcase зӨәж„ҸпјӣзӣҙжҺҘйҮҚз”Ё library Pagination е…ғд»¶ pgBarпјҢйқһиҮӘз•«жҢүйҲ•пјү ---- */
  function tblPagerEl(){
    const bar=ce('div','tbl-pgbar');
    const info=ce('div','tbl-pginfo');bar.appendChild(info);
    let cur=1;const total=3,per=5,all=13;                                          // 3 й ҒзӨәж„Ҹ
    const nav=ce('div','tbl-pgnav');
    function draw(){
      const from=(cur-1)*per+1,to=Math.min(cur*per,all);
      info.textContent='е…ұ '+all+' зӯҶ В· з¬¬ '+from+'-'+to+' зӯҶ';
      nav.innerHTML='';
      nav.appendChild(pgBar('numbered','s',{total,current:cur,onNav:n=>{cur=Math.max(1,Math.min(total,n));draw();}})); // з”Ё Pagination е…ғд»¶пјҲpg-btnпјӢpgArrowпјү
    }
    draw();bar.appendChild(nav);
    return bar;}

/* ---- ж¬„дҪҚеһӢеҲҘе„Іеӯҳж јпјҡж–Үеӯ—жҢүйҲ•пјҲйҮҚз”Ё Button v-textпјүпјҸDropdownпјҲйҮҚз”Ё Dropdown е…ғд»¶пјү ---- */
  function tblActionEl(){                                                          // ж–Үеӯ—жҢүйҲ•е„Іеӯҳж ј
    const b=ce('button','btn v-text i-primary sz-s live tbl-actbtn');b.innerHTML='<span>жӘўиҰ–</span>';return b;}
  function tblOwnerEl(){                                                           // Dropdown е„Іеӯҳж јпјҲеҸҜеұ•й–ӢйҒёе–®пјү
    const w=ddField('outline');w.classList.add('tbl-dd');return w;}

/* ---- дё»иҰҒе·Ҙе» пјҡtblTable(variant,density,opts) вҶ’ .tbl-wrap ----
   optsпјҡcheckbox еӢҫйҒёж¬„пјҸsortable еҸҜжҺ’еәҸиЎЁй ӯпјҸzebra йЎҚеӨ–ж–‘йҰ¬зҙӢпјҸfooter зёҪиЁҲеҲ—пјҸpager еҲҶй ҒеҲ—
         selected:[idx] й җйҒёеҲ—пјҸlive зңҹеҜҰ hoverпјҸinteractive й»һеҲ—еҲҮйҒёеҸ–пјҸmini зҹ©йҷЈе°ҸиЎЁпјҲеҺ»ж—Ҙжңҹж¬„гҖҒ3 еҲ—пјүпјҸsimHover йқңж…Ӣ hover еҲ— */
  function tblTable(variant,density,o){
    o=o||{};
    const rows=(o.data||(o.mini?TBL_DATA.slice(0,3):TBL_DATA)).map(d=>Object.assign({},d)); // иіҮж–ҷеүҜжң¬
    (o.selected||[]).forEach(i=>{if(rows[i])rows[i]._sel=true;});
    const zebra=variant==='striped'||!!o.zebra;                                    // v-striped жҲ– stripe й–Ӣй—ңйғҪз®—ж–‘йҰ¬зҙӢ
    const wrap=ce('div','tbl-wrap tbl-v-'+variant+' tbl-dn-'+density+(zebra?' tbl-zebra':'')+(o.live?' live':'')+(o.cellTypes?' tbl-celltypes':'')+(o.mini?' tbl-mini':''));
    const table=ce('table','tbl');wrap.appendChild(table);
    const cols=o.cellTypes?[                                                       // ж¬„дҪҚеһӢеҲҘеұ•зӨәиЎЁпјҡж–Үеӯ—пјҸTagпјҸж•ёеӯ—пјҸDropdownпјҸж–Үеӯ—жҢүйҲ•
      {key:'name',  lab:'е§“еҗҚ',  sortable:false,cls:'tbl-name'},
      {key:'status',lab:'зӢҖж…Ӣ',  sortable:false,cls:''},
      {key:'amount',lab:'йҮ‘йЎҚ',  sortable:false,cls:'tbl-num'},
      {key:'owner', lab:'иІ иІ¬дәә',sortable:false,cls:'tbl-owner'},
      {key:'action',lab:'ж“ҚдҪң',  sortable:false,cls:'tbl-action'},
    ]:[
      {key:'name',  lab:'е§“еҗҚ',sortable:true, cls:'tbl-name'},
      {key:'status',lab:'зӢҖж…Ӣ',sortable:false,cls:''},
      {key:'amount',lab:'йҮ‘йЎҚ',sortable:true, cls:'tbl-num'},
      {key:'date',  lab:'ж—Ҙжңҹ',sortable:true, cls:'tbl-mut'},
    ].filter(c=>!(o.mini&&c.key==='date'));                                        // зҹ©йҷЈе°ҸиЎЁжӢҝжҺүж—Ҙжңҹж¬„
    let sortKey=null,sortAsc=true;                                                 // жҺ’еәҸзӢҖж…ӢпјҲжҜҸејөиЎЁзҚЁз«Ӣпјү
    const interactive=!!o.live&&o.interactive!==false;

    const thead=ce('thead'),htr=ce('tr');thead.appendChild(htr);table.appendChild(thead);
    const tbody=ce('tbody');table.appendChild(tbody);
    let headCbx=null;

    function syncHead(){                                                           // е…ЁйҒёжЎҶдёүж…ӢеҗҢжӯҘпјҲйҮҚз”Ё .cbx st-indeterminateпјӢ.dashпјү
      if(!headCbx)return;
      const n=rows.filter(r=>r._sel).length;
      headCbx.classList.remove('st-checked','st-indeterminate','st-default');
      if(n===rows.length&&n>0){headCbx.classList.add('st-checked');headCbx.innerHTML=ICON_CHECK;}
      else if(n>0){headCbx.classList.add('st-indeterminate');headCbx.innerHTML='<span class="dash"></span>';}
      else{headCbx.classList.add('st-default');headCbx.innerHTML='';}}

    function renderHead(){                                                         // иЎЁй ӯпјҲжҺ’еәҸйҲ•йҮҚз”Ё .btn v-textпјү
      htr.innerHTML='';
      if(o.checkbox){
        const th=ce('th','tbl-th tbl-col-cbx');
        headCbx=tblCbxEl(density,false);
        if(interactive)headCbx.addEventListener('click',()=>{                      // й»һе…ЁйҒёжЎҶпјҡе…ЁйҒё вҶ” е…ЁдёҚйҒё
          const all=rows.every(r=>r._sel);
          rows.forEach(r=>{r._sel=!all;});renderBody();syncHead();});
        th.appendChild(headCbx);htr.appendChild(th);syncHead();}
      cols.forEach(c=>{
        const th=ce('th','tbl-th'+(c.key==='amount'?' tbl-num':''));
        if(o.sortable&&c.sortable){
          const cur=sortKey===c.key;
          const b=ce('button','btn v-text i-secondary sz-s live tbl-sortbtn'+(cur?' is-active':''));
          b.innerHTML='<span>'+c.lab+'</span><span class="tbl-sortic'+(cur&&sortAsc?' tbl-asc':'')+'">'
            +(cur?ICON_CARET:TBL_IC_SORT)+'</span>';                               // жҺ’еәҸдёӯпјҡcaret еҚҮпјҸйҷҚпјӣжңӘжҺ’еәҸпјҡдёӯжҖ§йӣҷз®ӯй ӯ
          b.addEventListener('click',()=>{
            if(sortKey===c.key)sortAsc=!sortAsc;else{sortKey=c.key;sortAsc=true;}
            renderHead();renderBody();});
          th.appendChild(b);
        }else{th.textContent=c.lab;}
        htr.appendChild(th);});}

    function renderBody(){                                                         // иіҮж–ҷеҲ—
      tbody.innerHTML='';
      const rs=rows.slice();
      if(sortKey){const k=sortKey;rs.sort((a,b)=>{
        let r;
        if(k==='amount')r=a.amount-b.amount;
        else if(k==='name')r=a.name.localeCompare(b.name,'zh-Hant');
        else r=a.date<b.date?-1:a.date>b.date?1:0;
        return sortAsc?r:-r;});}
      rs.forEach((d,i)=>{
        const tr=ce('tr','tbl-row'+(d._sel?' is-selected':'')+(o.simHover===i?' is-hover':''));
        if(o.checkbox){const td=ce('td','tbl-td tbl-col-cbx');td.appendChild(tblCbxEl(density,!!d._sel));tr.appendChild(td);}
        cols.forEach(c=>{
          const td=ce('td','tbl-td'+(c.cls?' '+c.cls:''));
          if(c.key==='status')td.appendChild(tblTagEl(d.status));
          else if(c.key==='amount')td.textContent=tblFmt(d.amount);
          else if(c.key==='owner')td.appendChild(tblOwnerEl());                     // Dropdown е„Іеӯҳж ј
          else if(c.key==='action')td.appendChild(tblActionEl());                   // ж–Үеӯ—жҢүйҲ•е„Іеӯҳж ј
          else td.textContent=d[c.key];
          tr.appendChild(td);});
        if(interactive){                                                           // й»һеҲ—еҲҮжҸӣйҒёеҸ–пјҢеӢҫйҒёжЎҶпјҸе…ЁйҒёжЎҶйҖЈеӢ•
          tr.style.cursor='pointer';
          tr.addEventListener('click',()=>{d._sel=!d._sel;renderBody();syncHead();});}
        tbody.appendChild(tr);});}

    renderHead();renderBody();

    if(o.footer){                                                                  // иЎЁе°ҫзёҪиЁҲеҲ—пјҲйҮ‘йЎҚеҸіе°ҚйҪҠ tabular-numsпјү
      const tfoot=ce('tfoot'),ftr=ce('tr');
      const lab=ce('td','tbl-td tbl-ft tbl-ft-lab');lab.colSpan=(o.checkbox?1:0)+2;lab.textContent='зёҪиЁҲ';
      const amt=ce('td','tbl-td tbl-ft tbl-num');amt.textContent=tblFmt(rows.reduce((s,d)=>s+d.amount,0));
      ftr.append(lab,amt);
      if(cols.some(c=>c.key==='date'))ftr.appendChild(ce('td','tbl-td tbl-ft'));
      tfoot.appendChild(ftr);table.appendChild(tfoot);}

    if(o.pager)wrap.appendChild(tblPagerEl());                                     // еҲҶй ҒеҲ—пјҲйҮҚз”Ё .btnпјү
    return wrap;}

/* ---- зҹ©йҷЈж јпјҡtblCell(variant,density) вҶ’ е°ҸиЎЁпјҲиЎЁй ӯпјӢ3 еҲ—пјҢе‘ҲзҸҫи©Ізө„еҗҲеӨ–и§Җпјү ---- */
  function tblCell(variant,density){
    return tblTable(variant,density,{mini:true});}

/* ---- й Ғйқўзө„иЈқ ---- */
  function buildTable(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component В· Table',title:'Table иіҮж–ҷиЎЁж ј',

      specRows:[['axes','<code>variant Г— density</code>'],['formula','<code>3 Г— 2 = 6</code>'],['token-policy','<code>semantic.*.table.*</code>'],['slots','headerпјҲsortableпјү/ rows / footerпјҲзёҪиЁҲпјҸеҲҶй Ғпјү']]});
    const axes=DIAL_SPECS.table.axes, zh=DIAL_SPECS.table.zh, active=CHOICE.table.active; // жҺҘдёӯеӨ® store

    const sc=section(body,'Showcase е®Ңж•ҙзҜ„дҫӢ','ж јз·ҡпјӢеҜ¬й¬Ҷзҡ„ж»ҝй…ҚиЎЁпјҡе·ҰеҒҙеӢҫйҒёж¬„пјҲе…ЁйҒёжЎҶж”ҜжҸҙ<b>еҚҠйҒё</b>дёүж…ӢпјүгҖҒе§“еҗҚпјҸйҮ‘йЎҚпјҸж—ҘжңҹиЎЁй ӯеҸҜй»һж“Ҡ<b>жҺ’еәҸ</b>пјҲеҚҮпјҸйҷҚ caret дё»иүІжҢҮзӨәпјүгҖҒзӢҖж…Ӣж¬„йҮҚз”Ё TagгҖҒйҮ‘йЎҚеҸіе°ҚйҪҠ tabular-numsгҖҒиЎЁе°ҫзёҪиЁҲпјӢеҲҶй ҒеҲ—пјҲйҮҚз”Ё ButtonпјүгҖӮж»‘йј з§»еҲ°еҲ—дёҠзңӢзңҹеҜҰ hoverпјҢ<b>й»һеҲ—</b>еҲҮжҸӣйҒёеҸ–пјҲж·Ўи—Қеә•пјӢеӢҫйҒёйҖЈеӢ•пјүгҖӮ');
    const demo=ce('div','tbl-demo');
    demo.appendChild(tblTable('bordered','comfortable',{checkbox:true,sortable:true,footer:true,pager:true,live:true,selected:[1]}));
    sc.appendChild(demo);

    // ---- еҜҰйҡӣдә’еӢ• Liveпјҡsegsпјқvariant/densityпјӣжҜҸеҖӢй–Ӣй—ңйғҪе°ҚжҮүеҸҜиҰӢжЁЈејҸ ----
    const sl=section(body,'еҜҰйҡӣдә’еӢ• Live','еҲҮ variantпјҸdensityпјҢеӢҫйҒёеҗ„ featureпјҡcheckbox еӢҫйҒёж¬„гҖҒsortable жҺ’еәҸиЎЁй ӯгҖҒstripe ж–‘йҰ¬зҙӢпјҲborderedпјҸplain дёҠз–ҠеҠ пјӣstriped жң¬иә«е·Іеҗ«пјүгҖҒfooter зёҪиЁҲеҲ—гҖҒselected йҒёеҸ–еҲ—зӨәж„ҸгҖӮй»һеҲ—еҸҜеҲҮжҸӣйҒёеҸ–пјҲеӢҫйҒёжЎҶиҲҮе…ЁйҒёжЎҶйҖЈеӢ•пјүгҖҒй»һиЎЁй ӯжҺ’еәҸгҖӮ');
    mountLive(sl,{
      initial:{variant:'bordered',density:'comfortable',checkbox:true,sortable:true,stripe:false,footer:true,selrow:true},
      segs:[
        {key:'variant',label:'Variant еһӢж…Ӣ',options:['bordered','striped','plain'],labels:['bordered ж јз·ҡ','striped ж–‘йҰ¬зҙӢ','plain з°ЎжҪ”']},
        {key:'density',label:'Density еҜҶеәҰ',options:['comfortable','compact'],labels:['comfortable еҜ¬й¬Ҷ','compact з·Ҡж№Ҡ']},
      ],
      bools:[
        {key:'checkbox',label:'checkbox еӢҫйҒёж¬„'},

      },

    });
  }

  /* ===== Table&Chart group build: chart ===== */
  /* ==================== Chart ең–иЎЁпјҲcht-пјү==================== */
  /* е„ҖиЎЁжқҝең–иЎЁпјҡstat зөұиЁҲж•ёеӯ—еҚЎпјӢ line жҠҳз·ҡпјҸbar й•·жўқпјҸdonut з”ңз”ңеңҲиҝ·дҪ ең–пјҢе…ЁйғЁ inline SVG жүӢеҲ»пјҲз„ЎеӨ–йғЁ libпјүгҖӮ
     variantпјҡstatпјҸlineпјҸbarпјҸdonut Г— sizeпјҡm жЁҷжә–пјҸs зІҫз°ЎпјҲзІҫз°Ўпјқsparkline ејҸз°Ўй…ҚпјҡжҠҳз·ҡж”¶жҺүж јз·ҡз«Ҝй»һгҖҒй•·жўқе–®зі»еҲ—гҖҒз”ңз”ңеңҲж”¶ең–дҫӢпјүгҖӮ
     йҮҚз”ЁеҺҹеӯҗпјҡstat еҚЎзӣҙжҺҘз”Ё prMetricElпјҲеҗ«жЁҷйЎҢпјӢи¶ЁеӢў deltaпјҢicon иө° IC_TRENDINGпјүпјӣең–дҫӢпјҸdelta з”Ё .tgпјӣ
     зі»еҲ—иүІдёҖеҫӢз¶Ғ tokenпјҡ--accentпјҸ--okпјҸ--warnпјҸ--i-dangerпјӣж јз·ҡ --lineгҖҒи»ёз·ҡ --line-strongпјӣж•ёеӯ— tabular-numsгҖӮ */

  /* --- зӨәж„ҸиіҮж–ҷжұ пјҲеӣәе®ҡдёҚйҡЁж©ҹпјҢж–№дҫҝжҳҺжҡ—пјҸе°әеҜёе°Қз…§пјү --- */
  const CHT_LINE_DATA=[42,54,48,66,60,78,72,92,86,108];      // жҠҳз·ҡпјҡиҝ‘ 10 жңҹдёҠеҚҮи¶ЁеӢў
  const CHT_BAR_A=[64,92,78,110,88,120,72];                  // й•·жўқзі»еҲ— AпјҲжң¬йҖұпјҢ--accentпјү
  const CHT_BAR_B=[48,70,90,84,64,96,58];                    // й•·жўқзі»еҲ— BпјҲдёҠйҖұпјҢ--okпјү
  const CHT_DONUT_SEGS=[                                     // з”ңз”ңеңҲеӣӣж®өпјҢеҗ„з¶ҒдёҖеҖӢ intent иүІ token
    {k:'е·Іе®ҢжҲҗ',v:46,c:'--accent',dot:'c-accent'},
    {k:'йҖІиЎҢдёӯ',v:26,c:'--ok',dot:'c-ok'},
    {k:'еҫ…иҷ•зҗҶ',v:18,c:'--warn',dot:'c-warn'},
    {k:'йҖҫжңҹ',v:10,c:'--i-danger',dot:'c-danger'}
  ];
  const CHT_XCATS=['1жңҲ','2жңҲ','3жңҲ','4жңҲ','5жңҲ','6жңҲ','7жңҲ','8жңҲ','9жңҲ','10жңҲ']; // жҠҳз·ҡ x йЎһеҲҘ
  const CHT_BAR_CATS=['йҖұдёҖ','йҖұдәҢ','йҖұдёү','йҖұеӣӣ','йҖұдә”','йҖұе…ӯ','йҖұж—Ҙ'];        // й•·жўқ x йЎһеҲҘ
  const SVGNS='http://www.w3.org/2000/svg';
  let chtUID=0; // жјёеұӨеЎ«е…… <linearGradient> е”ҜдёҖ id иЁҲж•ё

  /* --- еә§жЁҷи»ёз•ҷзҷҪпјҡyaxis й–ӢвҶ’е·ҰеҒҙз•ҷж•ёеҖјеҲ»еәҰгҖҒxaxis й–ӢвҶ’еә•йғЁз•ҷйЎһеҲҘ --- */
  function chtPad(o){return {L:o.yaxis?26:6, R:6, T:6, B:o.xaxis?15:6};}
  /* жҠҠиіҮж–ҷжҳ е°„еҲ° plot е…§еә§жЁҷпјҲbox зӮәжүЈжҺүз•ҷзҷҪеҫҢзҡ„з№Әең–еҚҖпјү */
  function chtPtsBox(data,box){
    const mx=Math.max.apply(null,data),mn=Math.min.apply(null,data),span=(mx-mn)||1;
    return data.map((v,i)=>[
      box.x+(data.length>1?i*box.w/(data.length-1):box.w/2),
      box.y+box.h-((v-mn)/span)*box.h
    ]);
  }
  /* y и»ёеҲ»еәҰ textпјҲtopвҶ’bottom з”ұеӨ§еҲ°е°ҸпјүпјӢx и»ёйЎһеҲҘ text */
  function chtAxisSVG(o,box,ticks,cats,catXs){
    let s='';
    if(o.yaxis)for(let i=0;i<ticks.length;i++){ // е·ҰеҒҙж•ёеҖјеҲ»еәҰпјҢеҸіе°ҚйҪҠиІјиҝ‘з№Әең–еҚҖ
      const y=(box.y+i*box.h/(ticks.length-1)).toFixed(1);
      s+='<text x="'+(box.x-4)+'" y="'+(+y+3).toFixed(1)+'" class="cht-axis" text-anchor="end">'+ticks[i]+'</text>';
    }
    if(o.xaxis)cats.forEach((c,i)=>{ // еә•йғЁйЎһеҲҘпјҢзҪ®дёӯе°ҚйҪҠеҗ„иіҮж–ҷй»һ
      s+='<text x="'+catXs[i].toFixed(1)+'" y="'+(o.h-4)+'" class="cht-axis" text-anchor="middle">'+c+'</text>';
    });
    return s;
  }

  /* Catmull-Rom вҶ’ cubic bezier е№іж»‘и·Ҝеҫ‘пјҲжӣІз·ҡең– curve з”Ёпјӣз«Ҝй»һд»ҘиҮӘиә«з•¶иҷӣж“¬жҺ§еҲ¶й»һпјү*/
  function chtSmoothPath(pts){
    if(pts.length<2)return '';
    let d='M'+pts[0][0].toFixed(1)+' '+pts[0][1].toFixed(1);
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[i-1]||pts[i],p1=pts[i],p2=pts[i+1],p3=pts[i+2]||pts[i+1];
      const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
      const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
      d+=' C'+c1x.toFixed(1)+' '+c1y.toFixed(1)+' '+c2x.toFixed(1)+' '+c2y.toFixed(1)+' '+p2[0].toFixed(1)+' '+p2[1].toFixed(1);
    }
    return d;
  }
  /* жҠҳз·ҡең–пјҡеӣһеӮі {svg, pts, box}пјӣдёҚеҶҚж°ёйҒ з•«з«Ҝй»һпјҲdots ж”№з”ұ hover йЎҜзӨәпјүпјӣo.smoothвҶ’е№іж»‘жӣІз·ҡ */
  function chtLineSVG(o){
    const w=o.w,h=o.h,data=o.data||CHT_LINE_DATA,p=chtPad(o);
    const box={x:p.L,y:p.T,w:w-p.L-p.R,h:h-p.T-p.B};
    const pts=chtPtsBox(data,box);
    const mx=Math.max.apply(null,data),mn=Math.min.apply(null,data);
    const d=o.smooth?chtSmoothPath(pts):pts.map((pt,i)=>(i?'L':'M')+pt[0].toFixed(1)+' '+pt[1].toFixed(1)).join(' ');
    const gid=o.grad?('chtGrad'+(++chtUID)):null; // жјёеұӨеЎ«е……е”ҜдёҖ id
    let s='<svg viewBox="0 0 '+w+' '+h+'" role="img" aria-label="жҠҳз·ҡең–пјҡиҝ‘ '+data.length+' жңҹе‘ҲдёҠеҚҮи¶ЁеӢў">';
    if(gid)s+='<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity=".32"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>';
    if(o.grid)for(let i=0;i<4;i++){ // 4 жўқж°ҙе№іж·Ўж јз·ҡпјҲ--lineпјү
      const y=(box.y+i*box.h/3).toFixed(1);
      s+='<line x1="'+box.x+'" y1="'+y+'" x2="'+(box.x+box.w)+'" y2="'+y+'" stroke="var(--line)" stroke-width="1"/>';
    }
    if(o.area) // йқўз©ҚеЎ«е……пјҡжҠҳз·ҡй–үеҗҲеҲ°еә•йӮҠпјҢaccent еҚҠйҖҸжҳҺ
      s+='<path d="'+d+' L'+pts[pts.length-1][0].toFixed(1)+' '+(box.y+box.h)+' L'+pts[0][0].toFixed(1)+' '+(box.y+box.h)+' Z" '+(gid?'fill="url(#'+gid+')"':'fill="var(--accent)" fill-opacity=".14"')+' stroke="none"/>';
    s+='<path d="'+d+'" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
    const ticks=[mx,Math.round(mx-(mx-mn)/3),Math.round(mn+(mx-mn)/3),mn]; // y еҲ»еәҰз”ұеӨ§еҲ°е°Ҹ
    s+=chtAxisSVG(o,box,ticks,CHT_XCATS.slice(0,data.length),pts.map(pt=>pt[0]));
    return {svg:s+'</svg>',pts,box};
  }
  /* жҠҳз·ҡең– DOM зҜҖй»һпјҡinteractiveвҶ’жҺӣ hoverпјҲйЎҜзӨәз«Ҝй»һпјӢеһӮзӣҙе°Һеј•пјӢtooltipпјү */
  function chtLineNode(o){
    const wrap=ce('div','cht-plot');const g=chtLineSVG(o);wrap.innerHTML=g.svg;
    if(o.interactive)chtHoverLine(wrap,o,g.pts,g.box,o.data||CHT_LINE_DATA);
    return wrap;
  }
  /* жҠҳз·ҡ hoverпјҡdotпјӢеһӮзӣҙз·ҡеҸӘеңЁж»‘еҲ°зҜҖй»һжҷӮеҮәзҸҫпјҲдёҚеҶҚж°ёйҒ йЎҜзӨәжҜҸеҖӢзҜҖй»һпјү */
  function chtHoverLine(wrap,o,pts,box,data){
    const svg=wrap.querySelector('svg'),vw=o.w,vh=o.h;
    const guide=document.createElementNS(SVGNS,'line');guide.setAttribute('class','cht-guide');guide.setAttribute('y1',box.y);guide.setAttribute('y2',box.y+box.h);guide.style.opacity='0';svg.appendChild(guide);
    const dot=document.createElementNS(SVGNS,'circle');dot.setAttribute('r','3.6');dot.setAttribute('class','cht-hdot');dot.style.opacity='0';svg.appendChild(dot);
    const tip=ce('div','cht-tip');wrap.appendChild(tip);
    function move(e){
      const r=svg.getBoundingClientRect();const relx=(e.clientX-r.left)/r.width*vw;
      let bi=0,bd=1e9;pts.forEach((pt,i)=>{const dd=Math.abs(pt[0]-relx);if(dd<bd){bd=dd;bi=i;}});
      const pt=pts[bi];
      dot.setAttribute('cx',pt[0]);dot.setAttribute('cy',pt[1]);dot.style.opacity='1';
      guide.setAttribute('x1',pt[0]);guide.setAttribute('x2',pt[0]);guide.style.opacity='1';
      tip.innerHTML='<b>'+data[bi]+'</b><span>'+CHT_XCATS[bi]+'</span>';
      tip.style.left=(pt[0]/vw*r.width)+'px';tip.style.top=(pt[1]/vh*r.height)+'px';tip.classList.add('on');
    }
    svg.addEventListener('mousemove',move);
    svg.addEventListener('mouseleave',()=>{dot.style.opacity='0';guide.style.opacity='0';tip.classList.remove('on');});
  }

  /* й•·жўқең–пјҡеӣһеӮі {svg, centers, box}пјӣcenters дҫӣ hover е®ҡдҪҚ */
  function chtBarSVG(o){
    const w=o.w,h=o.h,A=CHT_BAR_A,B=CHT_BAR_B,n=A.length,p=chtPad(o);
    const top=Math.max(p.T,o.vals?14:p.T);
    const box={x:p.L,y:top,w:w-p.L-p.R,h:h-top-p.B};
    const mx=Math.max.apply(null,o.series2?A.concat(B):A);
    const gw=box.w/n,centers=[];
    let s='<svg viewBox="0 0 '+w+' '+h+'" role="img" aria-label="й•·жўқең–пјҡиҝ‘ '+n+' жңҹ'+(o.series2?'йӣҷзі»еҲ—е°Қз…§':'ж•ёеҖј')+'">';
    if(o.grid)for(let i=0;i<4;i++){const y=(box.y+i*box.h/3).toFixed(1);
      s+='<line x1="'+box.x+'" y1="'+y+'" x2="'+(box.x+box.w)+'" y2="'+y+'" stroke="var(--line)" stroke-width="1"/>';}
    for(let i=0;i<n;i++){
      const cx=box.x+gw*i+gw/2;const bh=(A[i]/mx)*box.h;
      centers.push({cx,gw,a:A[i],b:B[i]});
      if(o.series2){
        const bw=Math.min(gw*0.30,10),bh2=(B[i]/mx)*box.h;
        s+='<rect x="'+(cx-bw-1).toFixed(1)+'" y="'+(box.y+box.h-bh).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="0" fill="var(--accent)"/>';
        s+='<rect x="'+(cx+1).toFixed(1)+'" y="'+(box.y+box.h-bh2).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh2.toFixed(1)+'" rx="0" fill="var(--ok)"/>';
        if(o.vals){
          s+='<text x="'+(cx-bw/2-1).toFixed(1)+'" y="'+(box.y+box.h-bh-3).toFixed(1)+'" class="cht-val" text-anchor="middle">'+A[i]+'</text>';
          s+='<text x="'+(cx+bw/2+1).toFixed(1)+'" y="'+(box.y+box.h-bh2-3).toFixed(1)+'" class="cht-val" text-anchor="middle">'+B[i]+'</text>';
        }
      }else{
        const bw=Math.min(gw*0.52,16);
        s+='<rect x="'+(cx-bw/2).toFixed(1)+'" y="'+(box.y+box.h-bh).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="0" fill="var(--accent)"/>';
        if(o.vals)s+='<text x="'+cx.toFixed(1)+'" y="'+(box.y+box.h-bh-3).toFixed(1)+'" class="cht-val" text-anchor="middle">'+A[i]+'</text>';
      }
    }
    s+='<line x1="'+box.x+'" y1="'+(box.y+box.h)+'" x2="'+(box.x+box.w)+'" y2="'+(box.y+box.h)+'" stroke="var(--line-strong)" stroke-width="1"/>';
    const ticks=[mx,Math.round(mx*2/3),Math.round(mx/3),0];
    s+=chtAxisSVG(o,box,ticks,CHT_BAR_CATS,centers.map(c=>c.cx));
    return {svg:s+'</svg>',centers,box};
  }
  /* й•·жўқең– DOM зҜҖй»һпјҡinteractiveвҶ’жҺӣ hoverпјҲhighlight и©Ізө„пјӢtooltipпјү */
  function chtBarNode(o){
    const wrap=ce('div','cht-plot');const g=chtBarSVG(o);wrap.innerHTML=g.svg;
    if(o.interactive)chtHoverBar(wrap,o,g.centers,g.box);
    return wrap;
  }
  function chtHoverBar(wrap,o,centers,box){
    const svg=wrap.querySelector('svg'),vw=o.w,vh=o.h;
    const hl=document.createElementNS(SVGNS,'rect');hl.setAttribute('class','cht-bhl');hl.setAttribute('rx','3');hl.setAttribute('fill-opacity','.12');hl.setAttribute('y',box.y);hl.setAttribute('height',box.h);hl.style.opacity='0';svg.insertBefore(hl,svg.firstChild);
    const tip=ce('div','cht-tip');wrap.appendChild(tip);
    function move(e){
      const r=svg.getBoundingClientRect();const relx=(e.clientX-r.left)/r.width*vw;
      let bi=0,bd=1e9;centers.forEach((c,i)=>{const dd=Math.abs(c.cx-relx);if(dd<bd){bd=dd;bi=i;}});
      const c=centers[bi];
      hl.setAttribute('x',c.cx-c.gw/2);hl.setAttribute('width',c.gw);hl.style.opacity='1';
      tip.innerHTML='<b>'+c.a+(o.series2?' В· '+c.b:'')+'</b><span>'+CHT_BAR_CATS[bi]+'</span>';
      tip.style.left=(c.cx/vw*r.width)+'px';tip.style.top=(box.y/vh*r.height)+'px';tip.classList.add('on');
    }
    svg.addEventListener('mousemove',move);
    svg.addEventListener('mouseleave',()=>{hl.style.opacity='0';tip.classList.remove('on');});
  }
  /* з”ңз”ңеңҲ SVGпјҡpathLength=100 пјӢ stroke-dasharray еҲҶж®өз•«з’°пјҲеҗ„ж®өз¶Ғ intent иүІ tokenпјүпјҢo.center йЎҜзӨәдёӯеӨ®зҷҫеҲҶжҜ” */
  function chtDonutSVG(o){
    let off=0,s='<svg viewBox="0 0 120 120" role="img" aria-label="з”ңз”ңеңҲең–пјҡд»»еӢҷзӢҖж…ӢеҲҶеёғпјҢе·Іе®ҢжҲҗ 46%гҖҒйҖІиЎҢдёӯ 26%гҖҒеҫ…иҷ•зҗҶ 18%гҖҒйҖҫжңҹ 10%">';
    s+='<g transform="rotate(-90 60 60)">'; // иҪү -90 еәҰи®“з¬¬дёҖж®өеҫһ 12 й»һйҗҳй–Ӣе§Ӣ
    CHT_DONUT_SEGS.forEach((g,gi)=>{
      s+='<circle class="cht-seg" data-i="'+gi+'" cx="60" cy="60" r="46" fill="none" stroke="var('+g.c+')" stroke-width="15" pathLength="100" stroke-dasharray="'+g.v+' '+(100-g.v)+'" stroke-dashoffset="'+(-off)+'"/>';
      off+=g.v;
    });
    s+='</g>';
    if(o.center)s+='<text x="60" y="58" class="cht-donut-num" text-anchor="middle">46%</text><text x="60" y="75" class="cht-donut-sub" text-anchor="middle">е®ҢжҲҗзҺҮ</text>';
    return s+'</svg>';
  }
  /* з”ңз”ңеңҲ hoverпјҡи·ҹжҠҳз·ҡпјҸй•·жўқдёҖжЁЈжө® .cht-tip tooltipпјҲlabelпјӢ%пјүпјҢдёҚеӢ•дёӯеӨ®ж•ёеӯ—гҖҒдёҚ focus ж®ө */
  function chtDonutHover(box){
    const segs=[...box.querySelectorAll('.cht-seg')];if(!segs.length)return;
    box.style.position='relative';
    const tip=ce('div','cht-tip');box.appendChild(tip);
    segs.forEach((c,i)=>{
      const g=CHT_DONUT_SEGS[i];
      const move=(e)=>{const r=box.getBoundingClientRect();
        tip.innerHTML='<b>'+g.v+'%</b><span>'+g.k+'</span>';
        tip.style.left=(e.clientX-r.left)+'px';tip.style.top=(e.clientY-r.top)+'px';tip.classList.add('on');};
      c.addEventListener('mouseenter',move);
      c.addEventListener('mousemove',move);
      c.addEventListener('mouseleave',()=>tip.classList.remove('on'));
    });
  }
  /* ең–дҫӢпјҡйҮҚз”Ё .tg еҺҹеӯҗпјҲv-soft i-neutralпјүпјҢеүҚзҪ® .cht-dot иүІй»һз¶Ғеҗ„зі»еҲ—иүІ token */
  function chtLegend(items){
    const lg=ce('div','cht-legend');
    (items||CHT_DONUT_SEGS).forEach(g=>{
      const t=ce('div','tg v-soft c-round i-neutral st-default');
      t.innerHTML='<span class="cht-dot '+g.dot+'"></span><span>'+g.k+(g.v!=null?' '+g.v+'%':'')+'</span>';
      lg.appendChild(t);
    });
    return lg;
  }

  /* --- ең–иЎЁе·Ҙе» пјҡchtChart(variant,size,o) вҶ’ .cht-box ---
     size жұәе®ҡй җиЁӯй…ҚзҪ®пјҲm жЁҷжә–пјқе®Ңж•ҙй…ҚзҪ®гҖҒs зІҫз°Ўпјқsparkline ејҸз°Ўй…ҚпјүпјҢo еҸҜйҖҗй …иҰҶеҜ«пјҲLive з”Ёпјүпјҡ
     stat {title,trend,unit}пјҸline {area,grid,xaxis,yaxis,interactive}пјҸbar {series2,vals,xaxis,yaxis,interactive}пјҸdonut {center,legend}
     ең–иЎЁеҠ еҜ¬пјҲm 340пјҸs 170пјүпјӣo.interactive й–Ӣ hover tooltipпјӢз«Ҝй»һпјӣo.xaxis/o.yaxis жҺ§еә§жЁҷи»ёйЎһеҲҘпјҸж•ёеҖј */
  function chtChart(variant,size,o){
    o=o||{};
    const s=size==='s';
    const box=ce('div','cht-box cht-'+variant+' cht-sz-'+size+(o.wide?' cht-wide':''));
    if(variant==='stat'){ // зөұиЁҲж•ёеӯ—еҚЎпјҡзӣҙжҺҘйҮҚз”Ё Number й Ғзҡ„ prMetricEl еҺҹеӯҗпјҲеҗ«и¶ЁеӢў deltaпјү
      box.appendChild(prMetricEl(s?'sm':'md',{
        title:o.title!==false,
        trend:o.trend===undefined?'up':o.trend,
        unit:o.unit
      }));
    }else if(variant==='line'){
      box.appendChild(chtLineNode({w:s?170:340,h:s?76:150,
        area:o.area===undefined?true:o.area,
        grid:o.grid===undefined?!s:o.grid,
        grad:!!o.grad,
        xaxis:!!o.xaxis,yaxis:!!o.yaxis,interactive:!!o.interactive}));
    }else if(variant==='curve'){ // жӣІз·ҡпјқжҠҳз·ҡзҡ„е№іж»‘зүҲпјҲCatmull-RomпјүпјҢйҒёй …жІҝз”Ё line
      box.appendChild(chtLineNode({w:s?170:340,h:s?76:150,smooth:true,
        area:o.area===undefined?true:o.area,
        grid:o.grid===undefined?!s:o.grid,
        grad:!!o.grad,
        xaxis:!!o.xaxis,yaxis:!!o.yaxis,interactive:!!o.interactive}));
    }else if(variant==='bar'){
      box.appendChild(chtBarNode({w:s?170:340,h:s?76:150,
        series2:o.series2===undefined?!s:o.series2,
        vals:!!o.vals,xaxis:!!o.xaxis,yaxis:!!o.yaxis,interactive:!!o.interactive}));
    }else{ // donut
      const center=o.center===undefined?true:o.center;
      box.innerHTML=chtDonutSVG({center});
      chtDonutHover(box); // ж»‘ж®өжө® tooltipпјҲеҗҢжҠҳз·ҡпјҸй•·жўқпјү
      if(o.legend===undefined?!s:o.legend)box.appendChild(chtLegend());
    }
    return box;
  }
  /* зҹ©йҷЈж јпјҡdashboard tileпјҲpanel еә•пјӢзҙ°йӮҠпјүеҢ…дёҖйЎҶе°ҚжҮү variant Г— size зҡ„е°Ҹең– */
  function chtCell(variant,size){
    const t=ce('div','cht-tile');
    t.appendChild(chtChart(variant,size,{}));
    return t;
  }

  /* --- Live еӢҫйҒёй … scoped жҺ§еҲ¶пјҡbools дҫқ variant йЎҜзӨәе°ҚжҮүйҒёй …пјҢйҒҝе…Қз©әиҪү ---
     mountLive жҺ§еҲ¶еҲ—еҸӘе»әдёҖж¬ЎпјҢж•…еңЁ render жҷӮдҫқ label ж–Үеӯ—жҜ”е°ҚгҖҒйҡұи—Ҹйқһз•¶еүҚ variant зҡ„еӢҫйҒёй … */
  const CHT_BOOL_SCOPE={
    'и¶ЁеӢў trend':'stat','е–®дҪҚ unit':'stat',
    'йқўз©ҚеЎ«е…… area':['line','curve'],'жјёеұӨеЎ«е…… gradient':['line','curve'],'ж јз·ҡ grid':['line','curve'],'X и»ёжңҲд»Ҫ':['line','curve'],'Y и»ёж•ёеҖј':['line','curve'],
    'з¬¬дәҢзі»еҲ— series2':'bar','ж•ёеҖјжЁҷ values':'bar','X и»ёжҳҹжңҹ':'bar','Y и»ёж•ёйҮҸ':'bar',
    'дёӯеӨ®ж•ёеӯ— center':'donut','ең–дҫӢ legend':'donut'
  };
  function chtScopeBools(host,variant){
    requestAnimationFrame(()=>{ // render еӣһеӮіеҫҢжҺ§еҲ¶еҲ—жүҚеңЁ DOMпјҢе»¶дёҖжӢҚеҶҚжҺғ
      host.querySelectorAll('.livewrap label.chk').forEach(l=>{
        const key=l.textContent.trim();
        const sc=CHT_BOOL_SCOPE[key];if(sc)l.style.display=((Array.isArray(sc)?sc.includes(variant):sc===variant))?'':'none';
      });
    });
  }

  function buildChart(view){
    const body=viewScaffold(view,{eyebrow:'L3 Component В· Chart',title:'Chart ең–иЎЁ',
      lede:'е„ҖиЎЁжқҝең–иЎЁдә”еһӢж…Ӣпјҡ<b>stat зөұиЁҲж•ёеӯ—</b>пјҲзӣҙжҺҘйҮҚз”Ё Number й Ғзҡ„ <b>prMetricEl</b> еҺҹеӯҗпјҢеҗ«жЁҷйЎҢпјӢи¶ЁеӢў deltaпјүгҖҒ<b>line жҠҳз·ҡ</b>пјҲж·Ўж јз·ҡпјӢaccent йқўз©ҚеЎ«е……пјӢз«Ҝй»һең“й»һпјүгҖҒ<b>curve жӣІз·ҡ</b>пјҲжҠҳз·ҡзҡ„е№іж»‘зүҲпјҢCatmull-Rom е…§жҸ’пјүгҖҒ<b>bar й•·жўқ</b>пјҲеҸҜйӣҷзі»еҲ—дёҰжҺ’е°Қз…§пјүгҖҒ<b>donut з”ңз”ңеңҲ</b>пјҲ<code>stroke-dasharray</code> еҲҶж®өз’°пјӢдёӯеӨ®зҷҫеҲҶжҜ”пјүгҖӮГ— е…©е°әеҜёпјҡ<b>m жЁҷжә–</b>пјқе®Ңж•ҙй…ҚзҪ®гҖҒ<b>s зІҫз°Ў</b>пјқsparkline ејҸз°Ўй…ҚпјҲж”¶ж јз·ҡз«Ҝй»һпјҸе–®зі»еҲ—пјҸж”¶ең–дҫӢпјүгҖӮе…ЁйғЁ <b>inline SVG жүӢеҲ»</b>гҖҒз„ЎеӨ–йғЁ libпјӣзі»еҲ—иүІз¶Ғ <code>--accentпјҸ--okпјҸ--warnпјҸ--i-danger</code>пјҢең–дҫӢиҲҮ delta йҮҚз”Ё <b>.tg</b>пјҢж•ёеӯ—дёҖеҫӢ <code>tabular-nums</code>гҖӮ',
      specRows:[['axes','<code>variant Г— size</code>'],['formula','<code>5 Г— 2 = 10</code>'],['token-policy','<code>--accent / --ok / --warn / --i-danger / --line</code>'],['tech','<code>inline SVG жүӢеҲ» В· pathLength з’° В· tabular-nums</code>']]});
    const axes=DIAL_SPECS.chart.axes, zh=DIAL_SPECS.chart.zh, active=CHOICE.chart.active; // жҺҘдёӯеӨ® store
    const VN={stat:['зөұиЁҲж•ёеӯ—','stat'],line:['жҠҳз·ҡ','line'],curve:['жӣІз·ҡ','curve'],bar:['й•·жўқ','bar'],donut:['з”ңз”ңеңҲ','donut']};
    const SZN={m:['жЁҷжә–','m'],s:['зІҫз°Ў','s']};
    let p;
    function renderM(){ if(!p)return; p.innerHTML='';
      const vs=axes.variant.filter(v=>active.variant.has(v));
      const ss=axes.size.filter(s=>active.size.has(s));
      p.appendChild(matrixPanel({badge:'chart',name:'Variant Г— Size',desc:'еҲ—пјқең–еһӢгҖҒж¬„пјқе°әеҜёпјӣжҜҸж јзӮәдёҖеЎҠ dashboard tile',
        rows:vs,cols:ss,
        rowLab:v=>labHTML(VN[v][0],VN[v][1]),
        colLab:s=>labHTML(SZN[s][0],SZN[s][1]),
        cell:(v,s)=>chtCell(v,s),mincol:240}));
    }
    mountDial(body,{axes,zh,active,onRender:renderM});
    const sec=section(body,'Variant Г— Size зҹ©йҷЈ','m жЁҷжә–пјқе®Ңж•ҙй…ҚзҪ®пјҲжҠҳз·ҡеҗ«ж јз·ҡпјӢз«Ҝй»һгҖҒй•·жўқйӣҷзі»еҲ—гҖҒз”ңз”ңеңҲеҗ«ең–дҫӢпјүпјӣs зІҫз°Ўпјқsparkline ејҸз°Ўй…ҚпјҢйҒ©еҗҲеЎһйҖІиЎЁж јеҲ—жҲ–з·Ҡж№ҠеҚЎзүҮгҖӮstat зӣҙжҺҘжІҝз”Ё prMetricEl зҡ„ smпјҸmd е…©зҙҡгҖӮ');

    /* showcaseпјҡдёҖзө„ dashboard дёҰжҺ’пјҲstat Г—2 пјӢ line пјӢ bar пјӢ donutпјүпјҢзӨәж„ҸзңҹеҜҰе„ҖиЎЁжқҝ */

    const dash=ce('div','cht-dash');
    /* dashboard еҚЎе·Ҙе» пјҡжЁҷйЎҢеҲ—пјҲmuted е°Ҹеӯ—пјӢеҸҜйҒё .tg deltaпјүпјӢең–иЎЁжң¬й«” */

        tg.innerHTML='<span>'+delta.txt+'</span>';h.appendChild(tg);

      c.append(h,node);return c;
    }
    dash.appendChild(dashCard('жң¬жңҲзҮҹж”¶',null,chtChart('stat','m',{title:false,trend:'up',unit:true})));
    dash.appendChild(dashCard('е®ўиЁҙжЎҲд»¶',null,chtChart('stat','m',{title:false,trend:'down'})));
    dash.appendChild(dashCard('д»»еӢҷзӢҖж…ӢеҲҶеёғ',null,chtChart('donut','m',{center:true,legend:true})));
    dash.appendChild(dashCard('иҝ‘ 10 жңҹзҮҹж”¶иө°еӢў',{up:true,txt:'+12.5%'},chtChart('line','m',{grid:true,area:true,xaxis:true,yaxis:true,interactive:true,wide:true}),3));
    const barCard=dashCard('жҜҸж—ҘиЁӮе–® жң¬йҖұ vs дёҠйҖұ',null,chtChart('bar','m',{series2:true,xaxis:true,yaxis:true,interactive:true,wide:true}),3);
    barCard.appendChild(chtLegend([{k:'жң¬йҖұ',dot:'c-accent'},{k:'дёҠйҖұ',dot:'c-ok'}])); // йӣҷзі»еҲ—ең–дҫӢпјҲ.tgпјӢиүІй»һпјү
    dash.appendChild(barCard);
    cs.appendChild(dash);

    /* Liveпјҡseg еҲҮ variantпјҸsizeпјӣbools дҫқ variant scoped йЎҜзӨәпјҲйҡұи—Ҹйқһз•¶еүҚең–еһӢзҡ„йҒёй …пјҢйҒҝе…Қз©әиҪүй–Ӣй—ңпјү */
    const sl=section(body,'еҜҰйҡӣдә’еӢ• Live','еҲҮең–еһӢиҲҮе°әеҜёпјӣеӢҫйҒёй …жңғйҡЁең–еһӢеҲҮжҸӣеҸӘз•ҷе°ҚжҮүйҒёй …вҖ”вҖ”жҠҳз·ҡжҺ§йқўз©ҚеЎ«е……пјҸж јз·ҡпјҸ<b>X и»ёжңҲд»Ҫ</b>пјҸ<b>Y и»ёж•ёеҖј</b>пјҢй•·жўқжҺ§з¬¬дәҢзі»еҲ—пјҸж•ёеҖјжЁҷпјҸ<b>X и»ёжҳҹжңҹ</b>пјҸ<b>Y и»ёж•ёйҮҸ</b>пјҢз”ңз”ңеңҲжҺ§дёӯеӨ®ж•ёеӯ—пјҸең–дҫӢпјҢзөұиЁҲж•ёеӯ—жҺ§и¶ЁеӢўпјҸе–®дҪҚгҖӮ<b>ж»‘йј з§»еҲ°жҠҳз·ҡпјҸй•·жўқдёҠ</b>жңғйЎҜзӨәи©Ій»һ tooltip ж•ёеҖјпјҢжҠҳз·ҡз«Ҝй»һеҸӘеңЁ hover жҷӮеҮәзҸҫгҖӮ');
    mountLive(sl,{
      initial:{variant:'line',size:'m',
        statTrend:true,statUnit:false,
        lineArea:true,lineGrid:true,lineXcat:true,lineYval:true,lineGrad:false,
        barSeries2:true,barVals:false,barXcat:true,barYval:true,
        donutCenter:true,donutLegend:true},
      segs:[{key:'variant',label:'Variant',options:['stat','line','curve','bar','donut'],labels:['зөұиЁҲж•ёеӯ—','жҠҳз·ҡ','жӣІз·ҡ','й•·жўқ','з”ңз”ңеңҲ']},
            {key:'size',label:'Size',options:['m','s'],labels:['M','S']}],
      bools:[{key:'statTrend',label:'и¶ЁеӢў trend'},{key:'statUnit',label:'е–®дҪҚ unit'},
             {key:'lineArea',label:'йқўз©ҚеЎ«е…… area'},{key:'lineGrad',label:'жјёеұӨеЎ«е…… gradient'},{key:'lineGrid',label:'ж јз·ҡ grid'},{key:'lineXcat',label:'X и»ёжңҲд»Ҫ'},{key:'lineYval',label:'Y и»ёж•ёеҖј'},
             {key:'barSeries2',label:'з¬¬дәҢзі»еҲ— series2'},{key:'barVals',label:'ж•ёеҖјжЁҷ values'},{key:'barXcat',label:'X и»ёжҳҹжңҹ'},{key:'barYval',label:'Y и»ёж•ёйҮҸ'},
             {key:'donutCenter',label:'дёӯеӨ®ж•ёеӯ— center'},{key:'donutLegend',label:'ең–дҫӢ legend'}],
      boolLabel:'йҒёй …пјҲдҫқең–еһӢпјү',
      render:st=>{
        chtScopeBools(sl,st.variant); // дҫқз•¶еүҚ variant еҸӘз•ҷе°ҚжҮүеӢҫйҒёй …
        const stage=ce('div','cht-live-stage');
        let node;
        if(st.variant==='stat')node=chtChart('stat',st.size,{title:true,trend:st.statTrend?'up':null,unit:st.statUnit});
        else if(st.variant==='line')node=chtChart('line',st.size,{area:st.lineArea,grad:st.lineGrad,grid:st.lineGrid,xaxis:st.lineXcat,yaxis:st.lineYval,interactive:true,wide:true});
        else if(st.variant==='curve')node=chtChart('curve',st.size,{area:st.lineArea,grad:st.lineGrad,grid:st.lineGrid,xaxis:st.lineXcat,yaxis:st.lineYval,interactive:true,wide:true});
        else if(st.variant==='bar')node=chtChart('bar',st.size,{series2:st.barSeries2,vals:st.barVals,xaxis:st.barXcat,yaxis:st.barYval,interactive:true,wide:true});
        else node=chtChart('donut',st.size,{center:st.donutCenter,legend:st.donutLegend});
        const tile=ce('div','cht-tile'+(st.variant==='line'||st.variant==='curve'||st.variant==='bar'?' cht-tile-wide':''));tile.appendChild(node);
        stage.appendChild(tile);
        return stage;
      },
      note:'вҶ“ еӣӣең–еһӢзІҫз°Ўе°әеҜёеҝ«йҖҹе°Қз…§пјҲsparkline ејҸз°Ўй…ҚпјүгҖӮзі»еҲ—иүІе…Ёз¶Ғ tokenпјҲ--accentпјҸ--okпјҸ--warnпјҸ--i-dangerпјүпјҢжҳҺжҡ—жЁЎејҸиҮӘеӢ•и·ҹеҲҮпјӣз”ңз”ңеңҲз’°з”Ё <code>pathLength=100</code>пјӢ<code>stroke-dasharray</code> еҲҶж®өгҖӮжҠҳз·ҡз«Ҝй»һиҲҮ tooltip зӮә hover й©…еӢ•пјҢйқһж°ёйҒ йЎҜзӨәгҖӮ',
      free:()=>['stat','line','curve','bar','donut'].map(v=>{const t=ce('div','cht-tile');t.appendChild(chtChart(v,'s',{}));return t;})
    });

/* ==================== Tree View жЁ№зӢҖпјҲtrv-пјү==================== */
/* йҮҚз”ЁеҺҹеӯҗпјҡICON_CARETпјҲеұ•й–Ӣз®ӯй ӯгғ»ж—ӢиҪүпјүгҖҒ.cbx + ICON_CHECKпјҲеӢҫйҒёжЁ№пјүгҖҒIC_FOLDER / IC_FILEпјҲеҲҶж”Ҝ/и‘үеӯҗ iconпјү
   з„Ўж–°еўһ icon constвҖ”вҖ”йңҖиҰҒзҡ„иіҮж–ҷеӨҫ/жӘ”жЎҲ icon дё»жӘ”йғҪе·ІеӯҳеңЁ */

/* е–®дёҖзҜҖй»һпјҲйҒһиҝҙе»ә liпјүпјҡd={name, ic:'folder'|'file', count, open, children, hover, sel, checked}
   o={variant:'lines'|'plain'|'checkbox', live, showIcon(й җиЁӯtrue), showCount(й җиЁӯtrue), onPick(row,d)} */
function trvNode(d,o){
  o=o||{};
  const hasKids=Array.isArray(d.children)&&d.children.length>0;
  const li=ce('li','trv-item'+((hasKids&&d.open)?' is-open':''));
  li.setAttribute('role','treeitem');
  if(hasKids)li.setAttribute('aria-expanded',d.open?'true':'false');

  const row=ce('div','trv-row'
    +(d.hover?' is-hover':'')                       // зҹ©йҷЈж јпјҡйқңж…ӢжЁЎж“¬ hover
    +(d.sel?' is-selected':'')
    +(o.live?' live':''));                          // Live/showcase жүҚеҗғзңҹеҜҰ :hover

  /* еұ•й–Ӣз®ӯй ӯпјҡжңүеӯҗзҜҖй»һжүҚжңүпјӣи‘үеӯҗж”ҫеҗҢеҜ¬ spacer и®“зё®жҺ’е°ҚйҪҠ */
  const car=ce('span','trv-caret'+(hasKids?'':' trv-blank'));
  if(hasKids)car.innerHTML=ICON_CARET;
  row.appendChild(car);

  /* checkbox variantпјҡеҲ—е…§йҮҚз”Ё .cbx еҺҹеӯҗпјҲsz-sпјү */
  if(o.variant==='checkbox'){
    const cb=ce('span','cbx sz-s '+(d.checked?'st-checked':'st-default'));
    if(d.checked)cb.innerHTML=ICON_CHECK;
    cb.setAttribute('role','checkbox');
    cb.setAttribute('aria-checked',d.checked?'true':'false');
    row.appendChild(cb);
  }

  /* еҲҶж”Ҝ/и‘үеӯҗ iconпјҡIC_FOLDER / IC_FILEпјҲshowIcon еҸҜй—ңпјү */
  if(o.showIcon!==false){
    const ic=ce('span','trv-ic');
    ic.innerHTML=(d.ic==='file'?IC_FILE:IC_FOLDER);
    row.appendChild(ic);
  }

  const nm=ce('span','trv-name');nm.textContent=d.name;row.appendChild(nm);

  /* еҸіеҒҙ countпјҸжӘ”жЎҲеӨ§е°ҸпјҲshowCount еҸҜй—ңпјү */
  if(o.showCount!==false&&d.count!=null){
    const ct=ce('span','trv-count');ct.textContent=d.count;row.appendChild(ct);
  }
  li.appendChild(row);

  if(hasKids){
    const ul=ce('ul','trv-children');
    ul.setAttribute('role','group');
    d.children.forEach(c=>ul.appendChild(trvNode(c,o)));
    li.appendChild(ul);
  }

  /* Live зңҹеҜҰдә’еӢ•пјҡй»һз®ӯй ӯеұ•й–Ӣ/ж”¶еҗҲпјҲдёҚи§ёзҷјйҒёеҸ–пјүгҖҒй»һеҲ—йҒёеҸ–гҖҒй»һ cbx еҸӘеҲҮжҸӣеӢҫйҒё */
  if(o.live){
    if(hasKids)car.addEventListener('click',e=>{
      e.stopPropagation();
      const open=li.classList.toggle('is-open');
      li.setAttribute('aria-expanded',open?'true':'false');
    });
    row.addEventListener('click',e=>{
      const cb=e.target.closest?e.target.closest('.cbx'):null;
      if(cb){                                        // еӢҫйҒёжЎҶпјҡеҸӘеҲҮжҸӣеӢҫйҒёгҖҒдёҚйҒёеҸ–еҲ—
        e.stopPropagation();
        const on=cb.classList.toggle('st-checked');
        cb.classList.toggle('st-default',!on);
        cb.innerHTML=on?ICON_CHECK:'';
        cb.setAttribute('aria-checked',on?'true':'false');
        return;
      }
      if(o.onPick)o.onPick(row,d);
    });
  }
  return li;
}

/* дёҖжЈөжЁ№пјҡdata=зҜҖй»һйҷЈеҲ—пјӣo еҗҢ trvNodeгҖӮlive жҷӮе…§е»әе–®йҒёдә’ж–ҘпјҲй»һеҲ—жё…жҺүе…¶д»– is-selectedпјү */
function trvTree(data,o){
  o=o||{};
  const ul=ce('ul','trv-tree trv-v-'+(o.variant||'plain'));
  ul.setAttribute('role','tree');
  if(o.live&&!o.onPick){
    o.onPick=row=>{
      ul.querySelectorAll('.trv-row.is-selected').forEach(r=>r.classList.remove('is-selected'));
      row.classList.add('is-selected');
    };
  }
  data.forEach(d=>ul.appendChild(trvNode(d,o)));
  return ul;
}

/* зҹ©йҷЈж јпјҡдёҖжЈөдёүеұӨе°ҸжЁ№йқңж…Ӣе‘ҲзҸҫи©І variant Г— stateпјӣhover/selected иҗҪеңЁгҖҢиЁӯиЁҲзЁҝгҖҚеҲ— */
function trvCell(v,s){
  const data=[
    {name:'е°ҲжЎҲж–Үд»¶',ic:'folder',count:'3',open:true,checked:v==='checkbox',children:[
      {name:'иЁӯиЁҲзЁҝ',ic:'folder',count:'2',open:true,

  box.appendChild(trvTree(data,{variant:v}));        // йқңж…ӢпјҡдёҚжҺӣ liveгҖҒдёҚз¶ҒдәӢд»¶
  return box;

function buildTreeView(view){
  const body=viewScaffold(view,{eyebrow:'L3 Component В· Tree View',title:'Tree View жЁ№зӢҖ',
    lede:'йҡҺеұӨиіҮж–ҷзҡ„<b>жЁ№зӢҖжё…е–®</b>пјҡеҸҜеұ•й–ӢпјҸж”¶еҗҲзҜҖй»һпјҲйҮҚз”Ё <b>ICON_CARET</b>пјҢж”¶еҗҲжҷӮиҪү -90В°пјүгҖҒдҫқ depth зё®жҺ’гҖҒиіҮж–ҷеӨҫпјҸжӘ”жЎҲ iconпјҲ<b>IC_FOLDERпјҸIC_FILE</b>пјүгҖҒйҒёеҸ–еҲ—ж·Ўи—Қеә•гҖӮдёү variantпјҡ<b>lines йҖЈжҺҘз·ҡ</b>пјҲL еҪўеј•е°Һз·ҡгғ»--line tokenпјүгҖҒ<b>plain з„Ўз·ҡ</b>(зҙ”зё®жҺ’)гҖҒ<b>checkbox еӢҫйҒёжЁ№</b>пјҲйҮҚз”Ё <b>.cbx</b> еҺҹеӯҗеӨҡйҒёпјүгҖӮ',
    specRows:[['axes','<code>variant Г— state</code>'],['formula','<code>3 Г— 3 = 9</code>'],['token-policy','<code>semantic.*.tree.*</code>'],['reuse','ICON_CARET / .cbx / IC_FOLDER / IC_FILE']]});
  const axes=DIAL_SPECS['tree-view'].axes, zh=DIAL_SPECS['tree-view'].zh, active=CHOICE['tree-view'].active; // жҺҘдёӯеӨ® storeпјҲhyphen id з”ЁжӢ¬иҷҹеҸ–еҖјпјү
  const VN={lines:['йҖЈжҺҘз·ҡ','lines'],plain:['з„Ўз·ҡ','plain'],checkbox:['еӢҫйҒёжЁ№','checkbox']};
  const STN={default:['й җиЁӯ','default'],hover:['ж»‘йҒҺ','hover'],selected:['йҒёеҸ–','selected']};
  let p;
  function renderM(){ if(!p)return; p.innerHTML='';
    const vs=axes.variant.filter(v=>active.variant.has(v));
    const ss=axes.state.filter(s=>active.state.has(s));
    p.appendChild(matrixPanel({badge:'tree-view',name:'Variant Г— State',rows:vs,cols:ss,
      rowLab:v=>labHTML(VN[v][0],VN[v][1]),
      colLab:s=>labHTML(STN[s][0],STN[s][1]),
      cell:(v,s)=>trvCell(v,s),mincol:250})); }
  mountDial(body,{axes,zh,active,onRender:renderM});
  const sec=section(body,'Variant Г— State зҹ©йҷЈ','еҲ—пјқдёү variantгҖҒж¬„пјқзӢҖж…ӢпјҲйқңж…Ӣе‘ҲзҸҫпјҢhover д»Ҙ is-hover жЁЎж“¬пјүгҖӮжҜҸж јзӮәдёҖжЈөдёүеұӨе°ҸжЁ№пјӣhoverпјҸselected зӢҖж…ӢиҗҪеңЁдёӯж®өгҖҢиЁӯиЁҲзЁҝгҖҚзҜҖй»һвҖ”вҖ”selected зӮәж·Ўи—Қеә•пјӢеҗҚзЁұиҪүдё»иүІгҖӮ');
  p=panelsIn(sec);renderM();

  /* ---- Showcaseпјҡдёү variant еҗ„дёҖжЈөе®Ңж•ҙеҸҜдә’еӢ•жЁ№ ---- */

  mountLive(sl,{

    bools:[

   IC_CLOCKпјҲtimeline жҷӮй–“еҲ—пјҢж—ўжңү iconпјүгҖӮз„Ўж–°еўһ icon constгҖӮ

   ж©«жўқпјҸдәӢд»¶еЎҠзі»еҲ—иүІдёҖеҫӢз¶Ғ tokenпјҲ--accent/--ok/--warn/--i-dangerпјүпјҢж јз·ҡ --lineгҖҒеӯ— --muted/--faintгҖӮ */

/* зӢҖж…Ӣ вҶ’ .tg жЁҷзұӨпјҲйҮҚз”Ё Tag еҺҹеӯҗпјҢдёҚйҮҚз•«пјү */
function gntTag(st){
  const map={active:['йҖІиЎҢдёӯ','i-brand','v-soft'],done:['е®ҢжҲҗ','i-neutral','v-soft'],
             delay:['е»¶йҒІ','i-danger','v-soft'],todo:['еҫ…й–Ӣе§Ӣ','i-neutral','v-outline']};
  const m=map[st]||map.active;
  const t=ce('div','tg '+m[2]+' c-round '+m[1]+' st-default');
  t.innerHTML='<span>'+m[0]+'</span>';
  return t;
}

/* --- зӨәж„ҸиіҮж–ҷ --- */
/* ganttпјҡs/eпјқиө·иЁ–ж—Ҙ indexпјҲ0-basedпјҢe дёҚеҗ«пјүпјӣcпјқзі»еҲ—иүІпјӣprogпјқйҖІеәҰ %пјӣstпјқзӢҖж…ӢпјҲжҺҘ .tgпјү */
const GNT_TASKS=[
